             <h1 data-v-7a806b22>
              <p>Paizo Printables: Month 2 &amp; Roadmap</p></h1>
             <div class="byline" data-v-7a806b22>
              <a href="/blog/a" title="More blog posts by Thurston Hillman" class="name disabled" data-v-7a806b22>Thurston Hillman</a><span class="postDate" data-v-7a806b22> - Yesterday, 05:00 pm</span>
