             <h1 data-v-7a806b22>
              <p>Player Core Preview: The Wizard, Remastered</p></h1>
             <div class="byline" data-v-7a806b22>
              <a href="/blog/author/JamesCase" title="More blog posts by James Case" class="name" data-v-7a806b22>James Case</a><span class="postDate" data-v-7a806b22> - Sep 19, 2023, 5:30 pm</span>
             </div>
            </div>
