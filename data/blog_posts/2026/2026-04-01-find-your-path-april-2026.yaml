           <div class="blog__article--component_wrapper" data-v-7a806b22>
            <div class="blog__paragraph" data-v-a2f23fca data-v-7a806b22>
             <div class="blog__paragraph__text" data-v-a2f23fca>
              <p>Greetings, ‘Finders! This month’s new releases bring a cantina party of ancestries to Starfinder Second Edition and take you to the frontlines of the Hellfire Crisis!</p>
              <p>Never miss a release with our <a href="https://store.paizo.com/subscriptions">Paizo Subscriptions</a>—for everything from rulebooks to accessories! Subscribers get a free PDF with purchase, early access to game content, and exclusive discounts for members with 4 or more active subscriptions.</p>
             </div>
            </div>
           </div>
           <div class="blog__article--component_wrapper" data-v-7a806b22>
            <div class="blog__paragraph" data-v-a2f23fca data-v-7a806b22>
             <figure class="blog__paragraph__image above" data-v-a2f23fca>
              <img src="https://cdn.paizo.com:443/a7d62ac8-7f03-00ef-f1f0-83fb8bf332e2/64d56051-260b-4d56-ad98-594ee8fad7c3/PZO22005_PEGalacticAncestries_3D.png?w=350" alt="Starfinder Second Edition Galactic Ancestries. The cover art features a starfinder goblin dressed in a space suit with a bandage covering a crack in their helmet, they have rocket launcher hefted to their shoulder. Standing behind them with bantrid, a short triangular alien with small wings at their back dressed in robes and glowing." data-v-a2f23fca><img src="https://cdn.paizo.com:443/a7d62ac8-7f03-00ef-f1f0-83fb8bf332e2/4741d350-50bf-42ab-9b96-b13d22cb4bd7/PZO22005_SKGalacticAncestries_3D.png?w=350" alt="Starfinder Second Edition Galactic Ancestries. The retailer exclusive book is inspired by retro videogame boxes with cover art featuring a starfinder goblin dressed in a space suit with a bandage covering a crack in their helmet, they have rocket launcher hefted to their shoulder. Standing behind them with bantrid, a short triangular alien with small wings at their back dressed in robes and glowing." data-v-a2f23fca><img src="https://cdn.paizo.com:443/a7d62ac8-7f03-00ef-f1f0-83fb8bf332e2/e9bb95ea-c154-4e1a-821a-fb9b9a328468/PZO22005_SEStarfinderGalacticAncestries_3D.png?w=350" alt="Starfinder Second Edition Galactic Ancestries. The special edition cover is a teal faux-leatherette with an embossed title and logo" data-v-a2f23fca>
             </figure>
             <div class="blog__paragraph__text" data-v-a2f23fca>
              <h2><a href="https://store.paizo.com/starfinder-galactic-ancestries/" data-new-window="true" target="_blank" rel="noopener noreferrer">Starfinder Galactic Ancestries</a></h2>
              <p>OUT OF THIS WORLD!</p>
              <p>This galactic compendium is packed full of playable alien ancestries for Starfinder Second Edition! Play as a fungal symbiote, a lucky blue humanoid, or a sapient ooze—or embrace the classics and play as a spacefaring dwarf or goblin! Versatile heritages and standardized ancestry feats let you customize any character, whether you want to create a Gap-touched elf, a xenometric android with a six-limbed body, or something far weirder.</p>
              <p>This book contains 21 new ancestries for Starfinder Second Edition, plus new options for Starfinder Player Core ancestries, Pathfinder Player Core ancestries, and versatile heritages.</p>
              <p>Starfinder Galactic Ancestries is available in standard hardcover, retro videogame inspired retailer exclusive hardcover, Special Edition faux-leatherette hardcover, and PDF formats.</p>
             </div>
            </div>
           </div>
           <div class="blog__article--component_wrapper" data-v-7a806b22>
            <div class="blog__paragraph" data-v-a2f23fca data-v-7a806b22>
             <figure class="blog__paragraph__image above" data-v-a2f23fca>
              <img src="https://cdn.paizo.com:443/a7d62ac8-7f03-00ef-f1f0-83fb8bf332e2/10dbf8e4-db85-4de2-8e2b-2253b2924dc4/PZO13008_SEHellfireDispatches_3D.png?w=350" alt="Pathfinder Hellfire Crisis: Lost Omens Hellfire Dispatches. The book is a blue faux-leatherette cover with silver embossed text and logo" data-v-a2f23fca><img src="https://cdn.paizo.com:443/a7d62ac8-7f03-00ef-f1f0-83fb8bf332e2/b57ae890-e10b-47cc-bb02-3c20dd3ddb36/PZO13008_HCHellfireDispatches_3D.png?w=350" alt="Pathfinder Hellfire Crisis: Lost Omens Hellfire Dispatches. The cover art shows an army attempting to climb over a wall but are being held at bay by decorative but highly deadly traps including a filigree decorated drop-plate covered in spikes and a filigree decorated rolling log of spikes" data-v-a2f23fca>
             </figure>
             <div class="blog__paragraph__text" data-v-a2f23fca>
              <h2><a href="https://store.paizo.com/pathfinder-lost-omens-hellfire-dispatches/" data-new-window="true" target="_blank" rel="noopener noreferrer">Pathfinder Lost Omens Hellfire Dispatches</a></h2>
              <p>EXTRA! EXTRA!</p>
              <p>A single spark has grown into the Hellfire Crisis, embroiling an entire region into the war between infernal Cheliax and its former holding of Andoran. Dispatches from each front reveal the past and present of the war, along with how the future might be changed by the right group of heroes. From the front lines to backroom intrigue and from grim reality to fantastical struggles, these dispatches cover the full range of the Hellfire Crisis.</p>
              <p>Pathfinder Lost Omens Hellfire Dispatches is available in standard hardcover, Special Edition faux leatherette hardcover, and PDF formats.</p>
             </div>
            </div>
           </div>
           <div class="blog__article--component_wrapper" data-v-7a806b22>
            <div class="blog__paragraph" style="clear:both;" data-v-a2f23fca data-v-7a806b22>
             <figure class="blog__paragraph__image left" data-v-a2f23fca>
              <img src="https://cdn.paizo.com:443/a7d62ac8-7f03-00ef-f1f0-83fb8bf332e2/b6e27061-feaa-430a-aafd-3e3ba002928d/PZO10013-MC2PawnBox.png?w=350" alt="Pathfinder Second Edition Monster Core 2 Pawn Box: The box art features raptors and large bat-like monsters fleeing from an armored skeletal giant looming in the background." data-v-a2f23fca>
             </figure>
             <div class="blog__paragraph__text" data-v-a2f23fca>
              <h2><a href="https://store.paizo.com/pathfinder-monster-core-2-pawn-box/" data-new-window="true" target="_blank" rel="noopener noreferrer">Pathfinder Monster Core 2 Pawn Box</a></h2>
              <p>Fearsome beasts, implausible aberrations, terrifying undead, and more! The vast variety of creatures from&nbsp;<em>Pathfinder Monster Core 2</em>&nbsp;come alive on your tabletop with this collection of more than&nbsp;<strong>550</strong>&nbsp;creature pawns for use with the Pathfinder Roleplaying Game or any tabletop fantasy RPG!</p>
              <p>Printed on sturdy cardstock, each double-sided pawn contains a beautiful full-color image of a creature from&nbsp;<em>Pathfinder Monster Core 2</em>. Each pawn slots into a size-appropriate plastic base, making them easy to mix with traditional metal or plastic miniatures.</p>
             </div>
            </div>
           </div>
           <div class="blog__article--component_wrapper" data-v-7a806b22>
            <div class="blog__paragraph" style="clear:both;" data-v-a2f23fca data-v-7a806b22>
             <figure class="blog__paragraph__image left" data-v-a2f23fca>
              <img src="https://cdn.paizo.com:443/a7d62ac8-7f03-00ef-f1f0-83fb8bf332e2/0689521e-e6bf-423f-a00c-12ebe292830d/PZO11036_FM.jpg?w=350" alt="Pathfinder Second Edition Flip-Mat: Ravages of War. The cover art shows a square tiled map of a desolate land" data-v-a2f23fca>
             </figure>
             <div class="blog__paragraph__text" data-v-a2f23fca>
              <h2><a href="https://store.paizo.com/pathfinder-flip-mat-ravages-of-war/" data-new-window="true" target="_blank" rel="noopener noreferrer">Pathfinder Flip-Mat: Ravages of War</a></h2>
              <p>The cruelty of war shapes nations and lives, but it also changes the land.&nbsp;<em>Pathfinder Flip-Mat: Ravages of War</em>&nbsp;provides you with the terrain to play through scenes of war. One side of this lavishly illustrated map presents a section of a besieged city with pinpoints of safety amid the destruction, while the other side shows a beachhead in the middle of assault. Rally the troops and jump into the action with&nbsp;<em>Pathfinder Flip-Mat: Ravages of War</em>!</p>
             </div>
            </div>
           </div>
           <div class="blog__article--component_wrapper" data-v-7a806b22>
            <div class="blog__paragraph" style="clear:both;" data-v-a2f23fca data-v-7a806b22>
             <figure class="blog__paragraph__image left" data-v-a2f23fca>
              <img src="https://cdn.paizo.com:443/a7d62ac8-7f03-00ef-f1f0-83fb8bf332e2/f2724a7e-a1a7-4f31-a3f0-6c0c78c5b72e/PZO160715E__06204.jpg?w=350" alt="Pathfinder Society Scenario #7-15: Within Antiquated Halls: The background art is of Zarta Dralneenm dressed in a smart red jacket, as she moves pieces around a battle map while her wayfinder illuminates the scene, with Pathfinders and Andoren soldiers moving in the background of a busy war camp. The overlaying art is of a tall, worn, statue of a human with a large insect on their shoulder." data-v-a2f23fca>
             </figure>
             <div class="blog__paragraph__text" data-v-a2f23fca>
              <h2><a href="https://store.paizo.com/pathfinder-society-scenario-7-15-within-antiquated-halls/" data-new-window="true" target="_blank" rel="noopener noreferrer">Pathfinder Society Scenario #7-15: Within Antiquated Halls</a></h2>
              <p>Emerging from the Arcadian Ocean is an amazing Azlanti temple, discovered by the Pathfinder's mobile lodge, the Grinning Pixie. It seems to be dedicated to an ancient Azlanti god and could hold untold treasures within its barnacle-crusted walls. The Pathfinders will need to get into the temple, overcome the ancient hazards and protectors, find what artifacts they can, and escape before the ocean reclaims its bounty!</p>
             </div>
            </div>
           </div>
           <div class="blog__article--component_wrapper" data-v-7a806b22>
            <div class="blog__paragraph" style="clear:both;" data-v-a2f23fca data-v-7a806b22>
             <figure class="blog__paragraph__image left" data-v-a2f23fca>
              <img src="https://cdn.paizo.com:443/a7d62ac8-7f03-00ef-f1f0-83fb8bf332e2/bda2ac7e-c966-4b1a-89b9-185433830f24/PZO260120E__83497.jpg?w=350" alt="Startinder Society Scenario #1-20: Magic Unleashed. The cover is two images, a large background illustration and a smaller single character overlayed above that image. The background image is First Seeker Sarmak and fellow Starfinder Zizenzi fighting off robots in front of a massive, alien starship. It’s dark, and the Starfinders are illuminated by aerial spotlights from an unknown source. The overlaying image is of  a wallaby-like alien creature, magically enhanced and conjured, it glares balefully as it’s slowly erased from reality, unspooling one strip at a time in a burst of magic." data-v-a2f23fca>
             </figure>
             <div class="blog__paragraph__text" data-v-a2f23fca>
              <h2><a href="https://store.paizo.com/starfinder-society-scenario-20-magic-unleashed/" data-new-window="true" target="_blank" rel="noopener noreferrer">Startinder Society Scenario #1-20: Magic Unleashed</a></h2>
              <p>Since its crash landing on the planet Akiton, the Wreck of the Returned has leaked volatile magic into the surrounding Sloughscar Hills. These effects have run the gamut from unseasonal storms, unnatural plant growth, and sudden bursts of magical energy to swaths of magically warped terrain, reality tears that transplant strange creatures, and regions of unstable reality that degrade matter entirely. In the ensuring months, these magical anomalies have become more frequent, more powerful, and more dangerous. When a sudden onslaught of magical catastrophes strikes all at once, First Seeker Sarmak dispatches teams of Starfinders to defend their allies, combat these threats, and counter this magical show of force with a concerted emergency response effort. When the dust settles, will the Starfinders stand strong and united? Or will they break under the magical assault?</p>
             </div>
            </div>
           </div>
           <div class="blog__article--component_wrapper" data-v-7a806b22>
            <div class="blog__paragraph" style="clear:both;" data-v-a2f23fca data-v-7a806b22>
             <figure class="blog__paragraph__image left" data-v-a2f23fca>
              <img src="https://cdn.paizo.com:443/a7d62ac8-7f03-00ef-f1f0-83fb8bf332e2/0a47605b-97ab-4022-b68f-dd360161bf6f/PZO160716E__16717.jpg?w=350" alt="Pathfinder Society Scenario #7-16: A Star’s Journey: The background art is of Zarta Dralneenm dressed in a smart red jacket, as she moves pieces around a battle map while her wayfinder illuminates the scene, with Pathfinders and Andoren soldiers moving in the background of a busy war camp. The overlaying art is of a humanoid automaton with no facial features other than two wide red and yellow eyes. It clutches its hands near its chest, cradling a ball of light." data-v-a2f23fca>
             </figure>
             <div class="blog__paragraph__text" data-v-a2f23fca>
              <h2><a href="https://store.paizo.com/pathfinder-society-scenario-7-16/" data-new-window="true" target="_blank" rel="noopener noreferrer">Pathfinder Society Scenario #7-16: A Star’s Journey</a></h2>
              <p>During the exploration of an ancient Jistkan ruin in Katapesh, the automaton Star goes missing, leaving their archeologist companions worried for their safety. The head archeologist calls upon the Pathfinder Society for assistance, but warns the agents that arrive that the ruin is filled with dangerous creatures and traps and that they should be careful while exploring. A strange frozen automaton meets the Pathfinders on each floor, slowly pointing the way deeper and deeper into the ruin. Will they find Star? Or does the automaton have more malicious motives?</p>
             </div>
            </div>
           </div>
           <div class="blog__article--component_wrapper" data-v-7a806b22>
            <div class="blog__paragraph" data-v-a2f23fca data-v-7a806b22>
             <div class="blog__paragraph__text" data-v-a2f23fca>
              <h2>From Our Partners</h2>
              <p>Our partners at Archives of Nethys, Demiplane, Fantasy Grounds, Hero Lab Online, and Roll20* are dropping new content this month as well! Buy your PDF on paizo.com to get a discount via the PaizoConnect API. Or pay full price on their platforms, sync your account, and get a complimentary PDF on the Paizo Store.</p>
              <p>*Roll20 is no longer a part of PaizoConnect and discounts and complimentary PDFs do not apply.</p>
              <p><br></p>
              <p>Bring Pathfinder and Starfinder to where you are, in person or online, and if you don’t have a favorite local game store, get books delivered to your door via a&nbsp;<a href="https://store.paizo.com/subscriptions">Paizo Subscription!</a> From rulebooks to adventures, accessories, and more, we’ve got subscriptions for every table! Subscribing to a line of books gets you the physical book and the PDF for one price! Subscribe to four lines or more to unlock exclusive discounts on subscriptions and added products.</p>
              <p>Thank you for playing Starfinder and Pathfinder!</p>
              <p>Shop the&nbsp;<a href="https://store.paizo.com/">Paizo Store</a>&nbsp;and your&nbsp;<a href="https://paizo.com/paizo/locator">favorite local game store</a>&nbsp;today!</p>
              <h3><a href="https://paizo.com/threads/rzs7y5x2?NEW-RELEASES-BLOG-April-2026">Excited for our newest releases? Join the conversation on the Paizo Forums!&nbsp;</a></h3>
             </div>
            </div>
           </div>
