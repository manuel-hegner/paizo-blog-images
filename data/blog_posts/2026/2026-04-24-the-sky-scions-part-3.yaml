           <div class="blog__article--component_wrapper" data-v-7a806b22>
            <div class="blog__paragraph" data-v-a2f23fca data-v-7a806b22>
             <div class="blog__paragraph__text" data-v-a2f23fca>
              <p>We’re over halfway through another Adventure Path, and the dwarves of Clan Firecask are ready to tell you about it!</p>
              <p>As we’ve discussed so far, <em>Sky King’s Tomb </em>has already set itself apart from other Adventure Paths, and marathon three continued that trend. Before we go into detail, get caught up if you need to:</p>
              <ul>
               <li><a href="https://paizo.com/blog/the-sky-scions">Introduction</a></li>
               <li><a href="https://paizo.com/blog/the-sky-scions-part-1">Part 1</a></li>
               <li><a href="https://paizo.com/blog/the-sky-scions-part-2">Part 2</a></li>
              </ul>
              <p>No project has had more guests than The Sky Scions<em>, </em>and this marathon added yet another new name. For over a decade now, we’ve shown off custom builds and terrain tailored to each Adventure Path. Looking back, it was at PaizoCon 2018 when we first met Morgan Rands of Black Bard Studios. We were gearing up for another marathon of The Azlant Odyssey at the time, and aquatic terrain was already presenting a challenge for us. We took Morgan’s business card and reached out: “Can you build an underwater art gallery?” The answer was a confident yes, and the rest was history. From precise scale versions of everything from the <a href="https://cdn.paizo.com/image/content/Blog/20180721-Lionfish2.jpg">Lionfish Gallery</a> to the iconic <a href="https://paizo.com/blog/the-abomination-arsenal">Gauntlight</a>, the union of Black Bard Studios and Order of the Amber Die has brought our best tabletops to the Paizo blog over the years. Yet it wasn’t until this marathon—winter 2026—that Morgan flew from Oregon to New Jersey with a crate full of terrain as luggage and joined us at the table for the first time!</p>
              <ul>
               <li><strong>Adventure</strong>: <em>Cult of the Cave Worm</em></li>
               <li><strong>Marathon Length</strong>: 59 hours, 40 min.</li>
               <li><strong>Session Hours</strong>: 38 hours, 20 min.</li>
              </ul>
              <p>During this adventure, our dwarven family continued their journey deep into the Darklands in search of the tomb of King Taargick, the Sky King. On the way, we had to venture into a fey city, get the information we needed, and then follow the <em>everywhen map </em>to the tomb. Easy! Just in case, though, we brought along a keg of Clan Firecask’s latest beer to help smooth over relations with the fey. The weather was bitterly cold outside, even for New Jersey, so we huddled in the studio and went on a grand tour of Nar-Voth, courtesy of author Scott D. Young!</p>
             </div>
             <figure class="blog__paragraph__image below" data-v-a2f23fca>
              <img src="https://cdn.paizo.com:443/a7d62ac8-7f03-00ef-f1f0-83fb8bf332e2/99be4309-14f1-44a5-8690-e481b296cdc7/OotAD_GroupShotFinal.jpg" alt="A group of Pathfinder players all standing around a table with a map covered in different miniature structures making up a dungeon." data-v-a2f23fca>
             </figure>
            </div>
           </div>
           <div class="blog__article--component_wrapper" data-v-7a806b22>
            <div class="blog__paragraph" data-v-a2f23fca data-v-7a806b22>
             <div class="blog__paragraph__text" data-v-a2f23fca>
              <h2><strong>Highlights from </strong><em><strong>Cult of the Cave Worm</strong></em><strong>:</strong></h2>
              <p>□ The Court of Ether, a fey city in the Darklands, was so memorable that it even had our vets adding it and then checking it off their bucket lists. “Party till we die” as the redcaps sing, but people did actually die at the party we went to. From the music of Shpongle to Tricky, our GM dimmed the lights and turned these hours into a blur. Somewhere in the middle of it all, we looked over to see Renck Firecask, our venerable bard, serenading and becoming engaged to the fey queen herself. We got what we needed, but what happened in the Court stays in the Court.</p>
              <p>□ Visit a fey city, and some of your party members might end up gambling. A satyr challenged us to a game of <a href="https://store.paizo.com/pathfinder-elemental-stones/">Elemental Stones</a>, and it got sweaty. Redcap spectators demanded we ante our teeth: the player who takes first place wins a magic item and walks with a full smile. For second through fourth place, we’d leave behind the corresponding number of pearly whites. We played the actual game in-session, and the four competitors were separated by only eight total points. Kragmarr and Durghal have beards so thick you can’t see their teeth anyway. Halco Firecask won and walked away with an <em>auspicious scepter</em>. Let’s go!</p>
              <p>□ For all those fans of classic dwarven scenes, we finally got our Mines of Moria moment. We were crossing the boundaries of the ancient dwarven kingdom of Tar Taargadth when morlocks descended upon us. At first, it was just a dozen, swiftly handled by axes in the dark with help from Kragmarr Firecask and his beastmaster archetype. Then we heard the strangest sound, and during the melee, we saw a morlock blow a horn made from an ancient shellfish. Another echoed its call. A dozen morlocks turned into two dozen, and then four! We took off using the Chase rules toward an ancient outpost, but we’ll continue that story below!</p>
              <p>□ Weeks into the Darklands, when the caverns began to blend and our minds began to drift, we happened upon some ghouls hosting an elaborate meal. Seriously, they had flipped an old temple of Kabriri into a cozy lodge and welcomed us once they saw we brought the beer. Our bard’s <em>binding muzzle </em>spell shut down their feast, so despite already having a table full of fresh meat to activate their best abilities, we had the damage stacking faster than calories.</p>
              <p>□ Black Bard Studios also helped carry our mission of making 2026 a year of firsts. In the photos, you’ll see the first terrain we’ve ever shown off that had ACTUAL water on it. We owe it to Morgan to say that it lasted through hours of play (including overnight, accidentally) and not a single drop leaked! Mentioned in one of the highlights above, we spent part of the marathon trying to outrun a morlock horde. The chase pushed us toward the outpost of Kheth Soldur, where we faced undead who were intelligent enough to rearm dwarven defenses against us, including the first fully functional rolling cylinder trap we’ve ever had on the table—that crashed into our minis!</p>
              <p><br></p>
              <p>We usually wait until the end of an Adventure Path to release data, but we decided to track some stats for this marathon only:</p>
              <ul>
               <li><strong>Encounters</strong>: 31</li>
               <li><strong>Natural 20s: </strong>61</li>
               <li><strong>Ability MVP: </strong><em>Shields of the spirit </em>champion aura, 139 damage in a single round to a whole host of morlocks</li>
               <li><strong>Highest single attack damage: </strong>210 damage total (to five party members) from an elite fey cultist troop with a three-action wild swing, plus eight more damage to itself</li>
               <li><strong>Highest single spell damage: </strong>Critical success with <em>holy light</em> against a pairaka div for 85 damage</li>
               <li><strong>Amber Die</strong>: a signature 20-20, after 46 rolls</li>
              </ul>
             </div>
             <figure class="blog__paragraph__image below" data-v-a2f23fca>
              <img src="https://cdn.paizo.com:443/a7d62ac8-7f03-00ef-f1f0-83fb8bf332e2/94a3fe8c-e0e3-4a0f-8ca4-cf58565e8195/OotAD_MorlocksFinalv2.jpg" alt="A scene made up of Pathfinder miniatures. The minis making up the heroes party are in a carved stone cavern, surounded by mocklocks" data-v-a2f23fca>
             </figure>
            </div>
           </div>
           <div class="blog__article--component_wrapper" data-v-7a806b22>
            <div class="blog__paragraph" data-v-a2f23fca data-v-7a806b22>
             <div class="blog__paragraph__text" data-v-a2f23fca>
              <h2>The Scions</h2>
              <p>Each marathon of this project features a legacy member of Order of the Amber Die who returns to the table with us, and this marathon saw the last of three founders from 1987: Christian Kelly. True story, Chris was the first player to ever sit across the screen from our GM, who at the time had a dictionary present to look up some of Gary Gygax’s chosen vocabulary. They played an adventure module as-written then started to add more players for their next session. Chris immediately stepped into a leadership role we coined “Player Captain.” You’ve heard a lot about this role in our blogs over the years, but Chris defined it from the beginning. What Chris understood, and tried to explain to new players, was that there were certain things only the GM could do (prep the adventure, for example). Therefore, everything a player could do, they should take off the GM’s plate. This would allow the GM to maximize their time spent preparing the adventure, and the whole group would benefit. Whether it’s the standard barrage of questions a GM gets from players before a session or just the food menu for game day, those can be handled by the Player Captain. The Player Captain essentially channels the voices of the players through a single mouthpiece to the GM, reducing load and allowing for more (and more efficient) play. The Player Captain role is a large part of what has enabled us to reach 171 published adventures played across thirty-nine years. Theodora is our current Player Captain, and she is the scion of what Chris created in 1987.</p>
              <h3><strong>Character Deaths:</strong></h3>
              <p>□ None. We debated about whether to say this or not: The Sky Scions<em> </em>has had our lowest overall death count of any project so far...</p>
              <p><br></p>
              <h3><strong>Best Quote from Marathon 3:</strong></h3>
              <p>(after what happened with the lampad queen)</p>
              <p>Salthrun Firecask: “We’re just leaving? She didn’t agree to postpone the wedding.”</p>
              <p>Renck Firecask: “Well, she never asked me to marry her, so it’s an interesting relationship.”</p>
              <p><br></p>
              <h3><strong>Current Situation:</strong></h3>
              <p>For better or worse, we became “Knights of the Court of Ether,” as bestowed by the fey queen herself. We used the title briefly, then took off for the hryngar city of Hagegaf with our magical map in hand. We also ended our marathon with one of the more unforgettable moments over the years, that we’ll preface with this: You don’t have to play an all-dwarven party in this adventure path. That being said, there have been some scenes just for us. In the ruins of Kheth Soldur, we encountered a deadly haunt—dwarves from our ancestors’ past—waiting to be relieved of their duty to hold the outpost’s stairs at any cost. But here we were, Clan Firecask, a Goldhilt clan no less, returning to what is ours once more! We proudly announced ourselves, and the four dwarven ghosts did so in return: Clan Grimmark, Clan Breakiron, Clan Stonefist, and CLAN FIRECASK!</p>
             </div>
             <figure class="blog__paragraph__image below" data-v-a2f23fca>
              <img src="https://cdn.paizo.com:443/a7d62ac8-7f03-00ef-f1f0-83fb8bf332e2/44dbcd79-58df-4b7b-8a01-ac8f5dd630b3/OotAD_GhoulsFinalv2.jpg?w=500" alt="A miniature set styled to look like a tavern. It's full of adventurers sitting around a table" data-v-a2f23fca><img src="https://cdn.paizo.com:443/a7d62ac8-7f03-00ef-f1f0-83fb8bf332e2/06d8ba82-a69c-4f22-8f5e-8068bf8b7028/OotAD_RollingBoulderFinal.jpg?w=500" alt="A miniature set of a castle wall. The miniatures representing the adventurers stand at the base of a wall and a 'boulder' is rolling down the wall and path towards them." data-v-a2f23fca>
             </figure>
            </div>
           </div>
           <div class="blog__article--component_wrapper" data-v-7a806b22>
            <div class="blog__paragraph" data-v-a2f23fca data-v-7a806b22>
             <div class="blog__paragraph__text" data-v-a2f23fca>
              <h2><strong>More Content:</strong></h2>
              <p>Brandon Gillam of Runehammer has been chronicling his experiences at our table during this project, as described in his most recent <a href="https://www.runehammer.online/post/amber-die-iii">blog</a>. In addition, our table was brought to life with the help of <a href="http://bluetablepainting.com/">Blue Table Painting</a> for the miniatures and <a href="https://www.blackbardstudios.com/">Black Bard Studios</a> for custom adventure-specific miniatures/terrain.</p>
              <p><br></p>
