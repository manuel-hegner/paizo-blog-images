           <div class="blog__article--component_wrapper" data-v-7a806b22>
            <div class="blog__paragraph" data-v-a2f23fca data-v-7a806b22>
             <div class="blog__paragraph__text" data-v-a2f23fca>
              <p>Hail and well met, ‘Finders! This month’s new releases explore the mysteries of the Vast, call for adventurers to help the citizens of Grayce, and welcome new players into the Pathfinder fold!</p>
              <p>Never miss a release with our <a href="https://store.paizo.com/subscriptions">Paizo Subscriptions</a>—for everything from rulebooks to accessories! Subscribers get a free PDF with purchase, early access to game content, and exclusive discounts for members with 4 or more active subscriptions.</p>
             </div>
            </div>
           </div>
           <div class="blog__article--component_wrapper" data-v-7a806b22>
            <div class="blog__paragraph" style="clear:both;" data-v-a2f23fca data-v-7a806b22>
             <figure class="blog__paragraph__image left" data-v-a2f23fca>
              <img src="https://cdn.paizo.com:443/a7d62ac8-7f03-00ef-f1f0-83fb8bf332e2/020755e8-5c49-4019-804b-711ef7732c89/PZO12013-BX_Beginner_Box_3D__67816.webp?w=350" alt="A 3D image of the Pathfinder Beginner Box: Secrets of the Unlit Star. It stands portrait height rather than the landscape orientation of the previous beginner box. On the front behind the Pathfinder logo and title is a dynamic scene of our trusty adventurers in a dungeon energetically fighting some kind of shadowy shades. The party consists of: Amiri, iconic Kellid human barbarian, screaming while swinging her giant sized bastard sword; Seoni, iconic Varisian human sorcerer, reaching high into the air while casting a star shaped spell; Sajan, iconic Vudrani monk, punching into the darkness; and Lem, iconic halfling bard, casting a golden web of a spell through playing his flute." data-v-a2f23fca>
             </figure>
             <div class="blog__paragraph__text" data-v-a2f23fca>
              <h2><a href="https://store.paizo.com/pathfinder-beginner-box-secrets-of-the-unlit-star/" data-new-window="true" target="_blank" rel="noopener noreferrer">Pathfinder Beginner Box</a></h2>
              <p>Take the first step into an amazing world of fantasy adventure!&nbsp;<em>Pathfinder Beginner Box: Secrets of the Unlit Star</em>&nbsp;contains everything you need to learn how to play the Pathfinder Roleplaying Game, including rules to create your own fantasy hero and tools to make your own amazing stories. This new version of the Beginner Box revitalizes player options, including more ancestries and four different classes, and includes all-new adventure scenarios, maps, and setting details for even more adventures!</p>
              <p>In addition to physical and PDF editions, Secrets of the Unlit Star is also included in the new 'Secrets of Grayce' deluxe anthology module for Foundry VTT.</p>
              <p>When you finish the Beginner Box, dive right into your next adventure with <em>Troubles in Grayce</em>!&nbsp;</p>
             </div>
            </div>
           </div>
           <div class="blog__article--component_wrapper" data-v-7a806b22>
            <div class="blog__paragraph" style="clear:both;" data-v-a2f23fca data-v-7a806b22>
             <figure class="blog__paragraph__image left" data-v-a2f23fca>
              <img src="https://cdn.paizo.com:443/a7d62ac8-7f03-00ef-f1f0-83fb8bf332e2/b7b36ce3-8283-41e7-a6ca-aed3a1706868/PZO14009-HC_Troubles_in_Grayce_2D-Print__29520.webp?w=350" alt="The standard cover for Troubles in Grayce, featuring dynamic art of Seoni, iconic Varisian human sorcerer, and Amiri, iconic Kellid human barbarian, swinging sword and casting spells across each other at two gargoyles in mid flight outside a stone castle in the middle of a storm." data-v-a2f23fca>
             </figure>
             <div class="blog__paragraph__text" data-v-a2f23fca>
              <h2><a href="https://store.paizo.com/pathfinder-adventure-troubles-in-grayce" data-new-window="true" target="_blank" rel="noopener noreferrer">Pathfinder Troubles in Grayce Adventure Anthology</a></h2>
              <p><strong>Adventure Awaits!</strong></p>
              <p>In recent weeks, the small farming town of Grayce in the fog-shrouded lands of Ustalav has been facing a host of struggles, challenges perfect for visiting adventurers to handle. This adventure anthology contains six standalone adventures that pit the PCs against dangers ranging from a mysterious cryptid to rampant sabotage to threats from a bitter vampire. The adventures in Troubles in Grayce are also the perfect follow-up to <em>Pathfinder Beginner Box: Secrets of the Unlit Star,</em> or as part of any low-level Pathfinder campaign!</p>
              <p><em>Pathfinder Troubles in Grayce </em>is available in standard hardcover, faux leatherette bound Special Edition, and PDF formats, as well as in the new 'Secrets of Grayce' deluxe anthology module for Foundry VTT.</p>
             </div>
            </div>
           </div>
           <div class="blog__article--component_wrapper" data-v-7a806b22>
            <div class="blog__paragraph" style="clear:both;" data-v-a2f23fca data-v-7a806b22>
             <figure class="blog__paragraph__image left" data-v-a2f23fca>
              <img src="https://cdn.paizo.com:443/a7d62ac8-7f03-00ef-f1f0-83fb8bf332e2/1f7d1c5b-a46f-457c-9738-5bb59cf7c99d/PZO24007-HC_Tales_from_the_Vast_2d-Print__66491.webp?w=350" alt="the standard cover for Starfinder Adventure: Tales from the Vast Adventure Anthology featuring dynamic art of an intense battle on an alien world." data-v-a2f23fca>
             </figure>
             <div class="blog__paragraph__text" data-v-a2f23fca>
              <h2><a href="https://store.paizo.com/starfinder-adventure-tales-from-the-vast/" data-new-window="true" target="_blank" rel="noopener noreferrer">Starfinder Tales from the Vast Adventure Anthology</a></h2>
              <p>Adventures from another universe!</p>
              <p>Explore distant planets full of peril and wonder in this adventure anthology for Starfinder Second Edition. This unpredictable thrill ride takes your tabletop group to four awesome locations in the legendary Desna’s Path galaxy.</p>
              <ul>
               <li>“Expedition to the Drowned Planet” is an exploration adventure that begins at level 1 and takes characters to level 3.</li>
               <li>“The Moonside-250 Terror” is a horror adventure starting at level 3 and ending at level 5.</li>
               <li>“Paradise Shutdown” is an investigation for characters from level 5 to level 7.</li>
               <li>“Sihedron Showdown” is a war-torn adventure for levels 7 to 9.</li>
              </ul>
              <p>Starfinder Tales from the Vast is available in standard hardcover, faux leatherette bound Special Edition, and PDF formats. &nbsp;</p>
             </div>
            </div>
           </div>
           <div class="blog__article--component_wrapper" data-v-7a806b22>
            <div class="blog__paragraph" style="clear:both;" data-v-a2f23fca data-v-7a806b22>
             <figure class="blog__paragraph__image left" data-v-a2f23fca>
              <img src="https://cdn.paizo.com:443/a7d62ac8-7f03-00ef-f1f0-83fb8bf332e2/654d18b4-7495-4d80-8f77-3cc845e90e6d/47_source_1762279900.jpg?w=350" alt="Pathfinder Second Edition Dark Archive. the cover art features the iconic Psychic and Thaumaturge as they face against a ghostly entity launching household objects at them " data-v-a2f23fca>
             </figure>
             <div class="blog__paragraph__text" data-v-a2f23fca>
              <h2><a href="https://store.paizo.com/pathfinder-dark-archive-remastered/" data-new-window="true" target="_blank" rel="noopener noreferrer">Pathfinder Dark Archive Remastered Pocket Edition</a></h2>
              <p>From the fringes, unknown beckons…</p>
              <p><em>Pathfinder Dark Archive (Remastered)</em>&nbsp;contains secrets that any player or GM can use to reveal the paranormal lurking in their Pathfinder games, all updated to work perfectly with the remastered Pathfinder Second Edition rules! This spine-tinglingly, secretive, <strong>224-page, </strong>hardcover rulebook presents two new character classes perfect for delving into the unexplained: Unleash the untold power of your mind as the psychic or leverage supernatural secrets and mystic implements as the thaumaturge!</p>
              <p>The Pocket Edition presents the same game content in an easy-to-transport, affordable softcover edition.</p>
             </div>
            </div>
           </div>
           <div class="blog__article--component_wrapper" data-v-7a806b22>
            <div class="blog__paragraph" style="clear:both;" data-v-a2f23fca data-v-7a806b22>
             <figure class="blog__paragraph__image left" data-v-a2f23fca>
              <img src="https://cdn.paizo.com:443/a7d62ac8-7f03-00ef-f1f0-83fb8bf332e2/e18a8eca-2ff9-4160-9ebe-1715ced798c3/PZO20005-MC__21170.webp?w=350" alt="A 3D image of the box for Starfinder Condition Cards featuring the Starfinder logo, product name, and a picture of Prisma the skittermander running into action." data-v-a2f23fca>
             </figure>
             <div class="blog__paragraph__text" data-v-a2f23fca>
              <h2><a href="https://store.paizo.com/starfinder-condition-cards-deck/" data-new-window="true" target="_blank" rel="noopener noreferrer">Starfinder Condition Cards Deck</a></h2>
              <p>Is your group's solarian dazzled by a rampaging laser wolf? Did the operative become invisible? Or was a brave soldier struck down, slipping closer to death? Pass out these cards to make remembering the rules simple! This 110-card deck include rules for the Starfinder Second Edition conditions, with prominent reminder text you can read at a glance. Multiple copies of the most crucial conditions mean there are enough for the whole table, and a set of tracking cards lets you easily monitor condition values and durations!</p>
             </div>
            </div>
           </div>
           <div class="blog__article--component_wrapper" data-v-7a806b22>
            <div class="blog__paragraph" style="clear:both;" data-v-a2f23fca data-v-7a806b22>
             <figure class="blog__paragraph__image left" data-v-a2f23fca>
              <img src="https://cdn.paizo.com:443/a7d62ac8-7f03-00ef-f1f0-83fb8bf332e2/13a3395c-96d3-4388-8eec-9ec78c220203/PZO11037_Training_Grounds__01754.webp?w=350" alt="Packaging cover for the Pathfinder Flip-Mat: Training Grounds, featuring a partial image of one of the included training ground maps." data-v-a2f23fca>
             </figure>
             <div class="blog__paragraph__text" data-v-a2f23fca>
              <h2><a href="https://store.paizo.com/pathfinder-flip-mat-training-grounds/" data-new-window="true" target="_blank" rel="noopener noreferrer">Pathfinder Flip-Mat: Training Grounds</a></h2>
              <p><strong>Get up, get on your feet!</strong></p>
              <p>The strongest armies are often the best trained, and&nbsp;<em>Pathfinder Flip-Mat: Training Grounds&nbsp;</em>gives officers a place to whip their recruits into shape. One side shows a martial academy where soldiers can learn about war and train for special engagements. The other side shows an open training ground complete with archery targets, fighting rings, and even tents for soldiers to get some R&amp;R. Spread&nbsp;<em>Pathfinder Flip-Mat: Training Grounds&nbsp;</em>out on your table and get into the action!</p>
             </div>
            </div>
           </div>
           <div class="blog__article--component_wrapper" data-v-7a806b22>
            <div class="blog__paragraph" style="clear:both;" data-v-a2f23fca data-v-7a806b22>
             <div class="blog__paragraph__text" data-v-a2f23fca>
              <h1>From Our Partners</h1>
              <p>Our partners at Archives of Nethys, Demiplane, Fantasy Grounds, Hero Lab Online, and Roll20* are dropping new content this month as well! Buy your PDF on paizo.com to get a discount via the PaizoConnect API. Or pay full price on their platforms, sync your account, and get a complimentary PDF on the Paizo Store.</p>
              <p>*Roll20 is no longer a part of PaizoConnect and discounts and complimentary PDFs do not apply.</p>
              <p><br></p>
              <p>Bring Pathfinder and Starfinder to where you are, in person or online, and if you don’t have a favorite local game store, get books delivered to your door via a&nbsp;<a href="https://store.paizo.com/subscriptions">Paizo Subscription!</a> From rulebooks to adventures, accessories, and more, we’ve got subscriptions for every table! Subscribing to a line of books gets you the physical book and the PDF for one price! Subscribe to four lines or more to unlock exclusive discounts on subscriptions and added products.</p>
              <p>Thank you for playing Starfinder and Pathfinder!</p>
              <p>Shop the&nbsp;<a href="https://store.paizo.com/">Paizo Store</a>&nbsp;and your&nbsp;<a href="https://paizo.com/paizo/locator">favorite local game store</a>&nbsp;today!</p>
              <h3><a href="https://paizo.com/threads/rzs842vn?NEW-RELEASES-BLOG-May-2026">Excited for all the new releases? Join the conversation on the Paizo Forums!</a></h3>
             </div>
            </div>
           </div>
