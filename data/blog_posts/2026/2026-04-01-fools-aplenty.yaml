           <div class="blog__article--component_wrapper" data-v-7a806b22>
            <div class="blog__paragraph" data-v-a2f23fca data-v-7a806b22>
             <div class="blog__paragraph__text" data-v-a2f23fca>
              <p>Greetings dearest ‘finders,</p>
              <p>I’ve once again crawled out of my cave to bring you the finest bounty of Paizo shenanigans. I’ve spent another year hard at work snooping through the ‘office’ chat rooms, finding funny tidbits to hoard until I present them, contextless, to my coworkers in early spring to inspire their funny bones to bring you some festive feats and heritages.<br>
                Maybe someday, if I can run faster than the NDA goblins, I’ll provide you all with The List. Until that day, I present some foolish morsels.</p>
              <p><strong>Maryssa Mari</strong><br><em>Senior Web Content Manager</em></p>
              <p><br></p>
              <h2><strong>Wombat Style</strong></h2>
              <p>2026 marks the 15-year anniversary of <em>Pathfinder RPG: Ultimate Combat</em>. It’s also the anniversary of that book’s lesser-known companion volume: Ultimate Wombat. While we’ve not remastered the whole book, I have written an updated version of its beloved monk feat chain. Now you, too, can batter foes with a reinforced rear and poop cubes!</p>
              <p><strong>Wombat Stance [One-Action]&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Feat 1<br>
                 Monk, Stance<br>
                 Requirements</strong> You are unarmored.</p>
              <p>You enter the stance of the implacable wombat, your reinforced backside ready to jostle and batter those who offend you. The only Strikes you can make are wombat butt unarmed attacks. These deal 1d8 bludgeoning damage; are in the brawling group; and have the hampering, nonlethal, parry, shove, and unarmed traits.</p>
              <p>While you are in Wombat Stance, you can't be flanked by enemies of your level or lower.</p>
              <p><br></p>
              <p><strong>Wombat Bastion [Two-Actions] Feat 6<br>
                 Monk<br>
                 Prerequisites</strong> Wombat Stance<br><strong>Requirements</strong> You are in Wombat Stance.</p>
              <p>You make a quick attack before retreating to safety. You either make a wombat butt Strike or Shove an adjacent creature, after which you can Step and Take Cover. If your Strike or Shove is a critical success, you also gain a +2 circumstance bonus to your Fortitude DC to avoid being Repositioned or Shoved until the end of your next turn.</p>
              <p><strong>Special</strong> If you have the Wombat Burrow feat, you can Burrow 5 feet instead of Stepping when using this feat.</p>
              <p><br></p>
              <p><strong>Wombat Burrow&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Feat 10<br>
                 Earth, Monk<br>
                 Prerequisites</strong> Incredible Movement, Wombat Stance</p>
              <p>While in Wombat Stance, you gain a Burrow speed equal to the Speed bonus granted by your Incredible Movement ability. You can Burrow through earth and soil, but not solid rock.</p>
             </div>
            </div>
           </div>
           <div class="blog__article--component_wrapper" data-v-7a806b22>
            <div class="blog__paragraph" style="clear:both;" data-v-a2f23fca data-v-7a806b22>
             <div class="blog__paragraph__text" data-v-a2f23fca>
              <h2><strong>Kobold Heritage:Three Kobolds in a Trench Coat</strong></h2>
              <p>Surprisingly Common</p>
              <p>You are actually three individual kobolds in a trench coat acting as a single entity. You are Medium instead of Small. You gain a +10 circumstance bonus to Deception checks to Impersonate not being three kobolds in a trench coat. You also gain the Trenchcoat Topple reaction.</p>
              <p><strong>Trenchcoat Topple</strong>&nbsp;[reaction]&nbsp;<strong>Frequency&nbsp;</strong>twice per day;&nbsp;<strong>Trigger&nbsp;</strong>You would be affected by an ability that permanently removes a body part, such as the decapitation effect of a&nbsp;<em>vorpal&nbsp;</em>weapon;&nbsp;<strong>Effect&nbsp;</strong>One of your kobolds jumps free of the trench coat, negating the effect.</p>
              <p><strong>Special&nbsp;</strong>The second time you use this in a day, your size is reduced to Small until your next daily preparations.</p>
              <p><br></p>
              <h2><strong>Dad Joke:</strong></h2>
              <p><strong>Dad Joke [one-action] or [two-actions]&nbsp;&nbsp;&nbsp; Feat 1</strong><br><strong>Auditory, General, Linguistic, Mental, Skill</strong></p>
              <p>Using the power of punnery, you deliver a lovingly tailored joke at a creature within 60 feet. Attempt a skill check using the skill that would be used to identify the creature (e.g. Religion for a fiend); you can instead attempt a Lore check with a +2 circumstance bonus if the target is trained in that Lore or could be identified by that Lore when Recalling Knowledge. If you target a creature that isn’t a family member, this ability gains the incapacitation trait. The target is then immune to your Dad Jokes for 1 hour.</p>
              <p>If you spend two actions to use this ability by setting up an especially elaborate punchline, your target also takes 1d4 mental damage, plus 1d4 additional damage at 3rd level and every 2 levels thereafter, with a basic Will save against the higher of your class DC or spell DC.</p>
              <p><strong>Critical Success</strong> The joke is so blindingly perfect-yet-awful that the target dissociates from reality. The creature is dazzled and stupefied 1 until the end of your next turn. Double the mental damage dealt to the target.</p>
              <p><strong>Success</strong> The target is stupefied 1 until the end of your next turn or until the creature targets you with a hostile effect, whichever happens first. The target takes full mental damage.</p>
              <p><strong>Failure</strong> The target is unaffected.</p>
              <p><strong>Critical Failure</strong> The target is unaffected. Your allies who hear the joke are so embarrassed by it that they can’t treat you as an ally for any effects until the end of your next turn.</p>
             </div>
            </div>
           </div>
