           <div class="blog__article--component_wrapper" data-v-7a806b22>
            <div class="blog__paragraph" data-v-a2f23fca data-v-7a806b22>
             <div class="blog__paragraph__text" data-v-a2f23fca>
              <p>We’ve mentioned before that every now and then, someone makes a typo and realizes that they’ve accidentally created a pun or joke so bad that they must immediately drop it into their team’s work chat, triggering a wave of snickering when we were in office, and now a wave of reaction gifs via the office chat. We’ve even statted them up for&nbsp;<a href="https://paizo.com/community/blog/v5748dyo6sh63?Foolish-Monsters-In-April">previous April Fools’ Day posts.</a></p>
              <p>It’s been so fun that I’ve started stashing&nbsp;<em>anything</em>&nbsp;I’ve deemed April Fools–worthy, to the point where if someone else deems it worthy of The List, I’m summoned to add it immediately. Around a month ago, I added to the goblins’ ever-full dance cards by releasing The List into the wilds of the Paizo Chat. So with a year’s worth of out-of-context inspiration, the goblins responded to me with this year’s foolish wonders!</p>
              <p><strong>Maryssa Mari</strong><br><em><strong>Web Content Manager</strong></em></p>
              <p><br></p>
             </div>
            </div>
           </div>
           <div class="blog__article--component_wrapper" data-v-7a806b22>
            <div class="blog__paragraph" data-v-a2f23fca data-v-7a806b22>
             <div class="blog__paragraph__text" data-v-a2f23fca>
              <h3>Wordsmith</h3>
              <p>With every strike of a wordsmith’s hammer, a new onomatopoeia is formed. They swiftly grab the word as it flies off the anvil before nailing it to the pages of our favorite comics.&nbsp;<em>POW! WHAM! SPLAT!</em>&nbsp;The hammer crafts each and every sound. The humble wordsmith is often overlooked by their artisan peers, whose pictures are the primary focus of readers. However, many don’t realize that while pictures can be sent to the printing press, sounds are not captured so easily on the page and must be hammered into place by a skilled wordsmith.</p>
              <p>While most wordsmiths are content to forge their words out of sight of the public, they are fierce defenders of their work and are quick to fight anyone who belittles it. They know the pen is mightier than the sword, but the hammer is mightiest of all, and they use it mercilessly to&nbsp;<em>SMASH!</em>&nbsp;through their foes.</p>
              <p>Though many wordsmiths are dwarves, they come from all kinds of backgrounds, each bringing their own unique sounds and noises from their culture. Tengu wordsmiths particularly favor onomatopoeias similar to bird calls like&nbsp;<em>caw</em>for crows or&nbsp;<em>okalee</em>&nbsp;for red-winged blackbirds. Meanwhile, leshy wordsmiths favor sounds inaudible to most non-plant creatures, such as the&nbsp;<em>tr-tr-tr</em>&nbsp;that reflects the sound of a plant growing</p>
              <p><strong>By Felix Dritz<br></strong><em><strong>Editor</strong></em></p>
             </div>
            </div>
           </div>
           <div class="blog__article--component_wrapper" data-v-7a806b22>
            <div class="blog__paragraph" data-v-a2f23fca data-v-7a806b22>
             <div class="blog__paragraph__text" data-v-a2f23fca>
              <p><strong>By Dustin Knight<br></strong><em><strong>Starfinder Developer</strong></em></p>
             </div>
            </div>
           </div>
           <div class="blog__article--component_wrapper" data-v-7a806b22>
            <div class="blog__paragraph" data-v-a2f23fca data-v-7a806b22>
             <figure class="blog__paragraph__image above" data-v-a2f23fca>
              <img src="https://cdn.paizo.com:443/a7d62ac8-7f03-00ef-f1f0-83fb8bf332e2/68377df1-0aa1-45dc-b4b6-54c587ebbc09/WritingSet_1700x2000.png?w=400" alt="A writing set and parchment" data-v-a2f23fca>
             </figure>
             <div class="blog__paragraph__text" data-v-a2f23fca>
              <h3>Chain Letters of Golarion</h3>
              <p>Armiger Khelum,<br>
                If this letter comes across my desk one more time, I’ll be reporting you to Lictor Stought. I understand the fear one carries when confronted with the possibility of hags, but I can reassure you that the&nbsp;<em>Bloddey Glass Hag</em>&nbsp;is not one to fear because she&nbsp;<em>does not exist</em>.</p>
              <p>“You are now cursed!! You must copy this letter and send it on or you will be killed!!! In a fortnight at twilight the Bloddey Glass Hag will crawl out from under your mattress! This isn’t a joke! She will stab your chest and pull out your eyeballs with a fork and if you don’t have eyeballs she will pull out your liver and if you don’t have a liver she will pull off your skin and use it to make a newe dress! And then she’ll take your corpse and she’ll stuff it under your bed or she’ll put you in the closet! What will your Maralictor tell your family??? It won’t be funny then! Send this letter to ten other Hellknights to break the curse! Remember, the Bloddey Glass Hag is watching you sleep!!!”</p>
              <p>This is ridiculous, armiger.</p>
              <p>I’ve sent copies of this to my fellow Paralictors, the Master of Blades, the Maralictors, and the Paravicar of our Order, just so they also have copies of this... ghost story of yours. I don’t want to see it again.</p>
              <p>Signed,<br>
                Paralictor Shudi Osra<br></p>
              <p><br></p>
              <p>Kreighton,<br>
                Never let it be said that I’m not grateful for the random bits and bobs that you’re able to submit to the archive that tell us more about pre–Age of Darkness Kyonin. But this one does seem a little... strange. Perhaps you could provide more context?</p>
              <p>— Gorm</p>
              <p><br></p>
              <p>“I was dining with my youngest child at the Viridian Crystal, and we had the most wonderful little cakes. I asked the chef’s familiar if we might have the recipe and the little jay twittered and said that while he couldn’t give away the lady’s recipe, I would be able to purchase it. Of course, being quite sensible I requested the price and was told ‘two pieces.’ This seemed very reasonable, so I accepted, and I was told it would be added to my bill.</p>
              <p>The next day, I was going through my letters and found my bill from the Crystal, and I was being charged two platinum, 32 silver. Of course, 20 silver for dinner, 12 silver for the lovely crystal tiara I purchased for my child, but apparently the two platinum were for the recipe for the little cakes! Well, I threatened to take this up with the Edasseril family, only to be told that I could put the recipe wherever I wanted, so here I am. I’m sharing this recipe with everyone I know and hoping that they’ll send it to everyone they know, and I hope that Chef Avie Vandlade enjoys her comeuppance!</p>
              <p>Viridian Crystal Cakes</p>
              <ul>
               <li>1 and a quarter cups flour, weighed</li>
               <li>Three-fourths cup and two tablespoons fine white sugar</li>
               <li>Three-fourths teaspoon baking powder</li>
               <li>One-fourth teaspoon baking soda</li>
               <li>One-fourth teaspoon salt</li>
               <li>Six tablespoons unsalted butter, soft</li>
               <li>Two tablespoons oil (vegetable)</li>
               <li>One whole egg and one egg yolk, at room temperature</li>
               <li>One and one-half teaspoons vanilla</li>
               <li>One-half teaspoon butter flavor</li>
               <li>One-half cup soured cream, room temperature</li>
              </ul>
              <p>Activate your fire elemental and put your oven at cake temperature. Well grease a half-foot round pan.</p>
              <p>Combine flour, sugar, baking powder, baking soda, and salt gently in a medium bowl. Add softened butter and oil and mix until it looks like delicate sand.</p>
              <p>In a small bowl, combine egg, yolk, vanilla, butter flavor, and soured cream. In batches of three, add the wet to the dry and beat until smooth. Scrape the bowl for any pockets of dry goods and make sure everything is fully combined. Once all thirds are in, beat for another half-minute until fully incorporated.</p>
              <p>Pour into round pan, bake for around 40 minutes, or until a skewer comes clean. Cool in the pan for ten minutes, then transfer to a rack to cool completely. Cut into small circles or squares. Top with chocolate frosting.”</p>
              <p>Dearest Gorm,<br>
                Yes, of course, I realize this letter was slightly obtuse. Cake temperature is 350 degrees Fahrenheit.<br>
                With care,<br>
                Kreighton</p>
              <p><br></p>
              <p><br></p>
              <p>Do YOU want to be RICHER than ABADAR? Do YOU want to be PRETTIER than SHELYN? Do YOU want to be STRONGER than KURGESS?</p>
              <p>Send my letter to your TEN CLOSEST FRIENDS and YOU will receive the BLESSINGS OF THE GODS!</p>
              <p>If you THROW THIS LETTER OUT then YOU will find NORGORBER in YOUR HOME in ONE WEEK!</p>
              <p><strong>By Shay Snow</strong><br><em><strong>Pathfinder Society Developer</strong></em></p>
             </div>
            </div>
