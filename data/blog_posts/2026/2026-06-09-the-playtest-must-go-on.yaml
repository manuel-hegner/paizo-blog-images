           <div class="blog__article--component_wrapper" data-v-7a806b22>
            <div class="blog__paragraph" data-v-a2f23fca data-v-7a806b22>
             <figure class="blog__paragraph__image right" data-v-a2f23fca>
              <img src="https://cdn.paizo.com:443/a7d62ac8-7f03-00ef-f1f0-83fb8bf332e2/c50044f7-0cbe-4d8e-afa2-10dfb0b7684c/PZO22005-BantridIdol.png?w=500" alt="A bantrid, a blue skinned, triangular alien with feathery tentacle arms and a disco ball lower half, is dressed in a frilly pink dress with white bows, holding a microphone high" data-v-a2f23fca>
             </figure>
             <div class="blog__paragraph__text" data-v-a2f23fca>
              <p>Can you believe <a href="http://www.starfinderplaytest.com">the luminary playtest</a> is already half-way done? The Starfinder team has been enthusiastically applauding our incredible luminaries during this playtest period and invites more of you to try our newest class and give us your feedback on our <a href="https://www.surveymonkey.com/r/starfinderplaytest" data-new-window="true" target="_blank" rel="noopener noreferrer">class survey</a> before the curtain falls on June 10th. We highly recommend you fill out your survey as soon as possible, as you can edit them later if future inspiration strikes. Please note that while we try to catch as many forum threads and influencers as possible, the survey is our primary resource when it comes to evaluating feedback on the class, so please don’t hold back if you’re worried what you have to say has already been said elsewhere! That goes for all those luminaries on the infosphere who’ve so graciously expressed their concerns in video format!</p>
              <p>Remember that our friends at Demiplane are also hosting a free character builder for the luminary class, available at <a href="https://app.demiplane.com/nexus/starfinder2e/playtest" data-new-window="true" target="_blank" rel="noopener noreferrer">www.starfindernexus.com/playtest</a>, for those of you interested in taking advantage of their digital toolset to generate your characters.</p>
             </div>
            </div>
           </div>
           <div class="blog__article--component_wrapper" data-v-7a806b22>
            <div class="blog__paragraph" data-v-a2f23fca data-v-7a806b22>
             <div class="blog__paragraph__text" data-v-a2f23fca>
              <h3><strong>Initial Playtest Reactions</strong></h3>
              <p>While we still await everyone’s data before deciding upon what improvements we want to implement, the design team generally agrees that the luminary can use an extra dash of sparkle, and we are investigating the many options available to let it really light up the stage! Fortunately, as the class stands, it has quite a bit of “power budget” for us to play with, and we are extremely grateful for the data that let us see the types of luminaries you want to play. We are especially grateful for all the feedback concerning the potential pain points of the spotlight and role features of the class, and we will continue to closely monitor possible adjustments to ensure it winds up both intuitively satisfying and mechanically impactful.</p>
              <p>Thank you again for being such a critical part of this playtest, as this class really is being co-designed by you, the community!</p>
              <p><strong>Dustin Knight (he/him)<br></strong><em><strong>Lead Designer</strong></em></p>
              <p><strong>Aras Yazgan (he/him)<br></strong><em><strong>Designer</strong></em></p>
              <h3><a href="https://paizo.com/threads/rzs8bje1?NEW-BLOG-The-Luminary-Playtest-Must-Go-On">Join the conversations on the new luminary class on the Paizo Forums!</a></h3>
             </div>
