name: Store images

on:
  schedule:
    - cron: '0 4,16 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven
      - name: Run Workflow
        run: |
          mvn compile exec:java -Dexec.mainClass="paizo.crawler.StoreImages" -Dexec.args="'${{ secrets.DISCORD_TOKEN }}' '${{ secrets.ANTI_PROTECTION_SECRET }}'"
          mvn clean
      - name: Commit files
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -A
          if [[ `git status --porcelain` ]]
          then
            git commit -m "Automatical store image update"
          fi
      - name: Push changes
        uses: ad-m/github-push-action@master
        
