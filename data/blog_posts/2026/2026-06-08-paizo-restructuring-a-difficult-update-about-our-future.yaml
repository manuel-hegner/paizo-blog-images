           <div class="blog__article--component_wrapper" data-v-7a806b22>
            <div class="blog__paragraph" data-v-a2f23fca data-v-7a806b22>
             <div class="blog__paragraph__text" data-v-a2f23fca>
              <p>Over the last year,&nbsp;Paizo&nbsp;has been navigating one of the most challenging periods in our company’s history. I want to speak to you directly about what happened, how it has affected us, and the steps&nbsp;we’re&nbsp;taking to protect the future of Pathfinder and&nbsp;Starfinder.&nbsp;</p>
              <p>This is a hard update. But you deserve clarity, and we&nbsp;remain&nbsp;committed to being open&nbsp;with&nbsp;our community.&nbsp;</p>
              <h2>How We Got Here&nbsp;</h2>
              <p>In January of last year, our longtime&nbsp;book‑trade&nbsp;distributor, Diamond Comics, declared bankruptcy. Diamond handled&nbsp;Paizo&nbsp;products for major retailers like Amazon, Barnes &amp; Noble, and Ingram, and our agreement with them was based on consignment&nbsp;(meaning we paid to ship products to their warehouse and were only paid when those products sold).&nbsp;</p>
              <p>When Diamond collapsed, the situation became far more complicated:&nbsp;</p>
              <ul>
               <li>JP Morgan Chase claimed&nbsp;a lien on&nbsp;all&nbsp;products stored in Diamond’s warehouse, including&nbsp;nearly $10 million&nbsp;in&nbsp;Paizo&nbsp;inventory.&nbsp;We cannot&nbsp;currently&nbsp;access&nbsp;this inventory,&nbsp;pending&nbsp;ongoing&nbsp;litigation.&nbsp;</li>
               <li>Paizo and dozens of other publishers have been in court ever since, fighting to reclaim our own products.&nbsp;</li>
               <li>Diamond’s exclusive contract prevented us from immediately moving to a new distributor, even after they stopped selling our books.&nbsp;A judge&nbsp;terminated&nbsp;that contract earlier this year, but Diamond has appealed, delaying resolution.&nbsp;</li>
              </ul>
              <p>The result has been devastating. Paizo lost&nbsp;nearly $2 million&nbsp;last year,&nbsp;had&nbsp;to&nbsp;write&nbsp;off&nbsp;nearly half&nbsp;a&nbsp;million&nbsp;in&nbsp;additional&nbsp;sales&nbsp;covered&nbsp;by the&nbsp;bankruptcy,&nbsp;and&nbsp;book‑trade&nbsp;sales&nbsp;remain&nbsp;far below historical levels.&nbsp;While sales through&nbsp;Paizo.com&nbsp;and hobby retailers have grown&nbsp;over the same period, they&nbsp;have not&nbsp;been sufficient&nbsp;to offset these losses.&nbsp;</p>
              <p>We are back in the book trade&nbsp;today&nbsp;with a new partner, but the&nbsp;book&nbsp;market has not&nbsp;yet recovered.&nbsp;We must make&nbsp;difficult&nbsp;decisions&nbsp;now.&nbsp;</p>
              <h2>Layoffs&nbsp;</h2>
              <p>As&nbsp;part&nbsp;of our efforts to&nbsp;address our&nbsp;core business and adapt to the current&nbsp;business environment,&nbsp;Paizo&nbsp;will be conducting layoffs&nbsp;impacting&nbsp;12&nbsp;employees.&nbsp;&nbsp;</p>
              <p>Acknowledging&nbsp;that&nbsp;layoffs&nbsp;are&nbsp;sometimes&nbsp;necessary,&nbsp;Paizo&nbsp;management and the&nbsp;United&nbsp;Paizo&nbsp;Workers&nbsp;union&nbsp;established&nbsp;a clear, fair process for&nbsp;implementing layoffs.&nbsp;Following&nbsp;those&nbsp;terms:&nbsp;</p>
              <ul>
               <li>Paizo&nbsp;has&nbsp;given&nbsp;the&nbsp;union&nbsp;twenty&nbsp;(20)&nbsp;business days’ notice&nbsp;of positions&nbsp;scheduled for&nbsp;reduction&nbsp;in force and&nbsp;may propose alternatives.&nbsp;</li>
               <li>Employees may volunteer for layoffs; otherwise, the&nbsp;least‑senior&nbsp;employee in each impacted business unit is affected.&nbsp;</li>
               <li>Impacted&nbsp;employees will receive one week of severance per year of service, with a minimum of two weeks.&nbsp;&nbsp;</li>
               <li>Those affected will have 18‑month recall rights.&nbsp;</li>
              </ul>
              <p>These decisions affect people we care about deeply. We are doing everything we can to support them through this transition.&nbsp;</p>
              <h2>Organized Play&nbsp;</h2>
              <p>Pathfinder Society and&nbsp;Starfinder&nbsp;Society have always been labors of love—programs&nbsp;we’ve&nbsp;supported as marketing investments to grow&nbsp;in‑person&nbsp;play at game stores and conventions. But the needs of retailers, conventions, and home groups have evolved over time, and the cost of producing scenarios has grown significantly.&nbsp;</p>
              <p>It's&nbsp;time to evolve Organized Play using a tool perfect for transitioning the campaigns to its dedicated players: the Open RPG Creative License (ORC) and the Pathfinder and&nbsp;Starfinder&nbsp;Infinite publishing programs.&nbsp;&nbsp;</p>
              <h3>Pathfinder Infinite &amp;&nbsp;Starfinder&nbsp;Infinite&nbsp;</h3>
              <p>We will be releasing new logos and adding dedicated Infinite sections to the&nbsp;Paizo&nbsp;Store, bringing&nbsp;independently&nbsp;created Pathfinder and&nbsp;Starfinder&nbsp;products directly&nbsp;into the&nbsp;spotlight on Paizo.com.&nbsp;&nbsp;</p>
              <p>Authors and members of the community&nbsp;interested in&nbsp;producing&nbsp;sanctioned&nbsp;independent&nbsp;adventure&nbsp;scenarios for use with the&nbsp;current Pathfinder&nbsp;Society and&nbsp;Starfinder&nbsp;Society&nbsp;programs will be able&nbsp;to do so&nbsp;under&nbsp;clear guidelines&nbsp;that we will release&nbsp;before Gen Con.&nbsp;</p>
              <h3>Official Scenarios&nbsp;</h3>
              <p>Paizo&nbsp;will continue publishing Pathfinder Society and&nbsp;Starfinder&nbsp;Society scenarios at the current rate as normal through October. After that, we will shift to two scenarios per month—one for Pathfinder Society and one for&nbsp;Starfinder&nbsp;Society. In addition to regular availability on Paizo.com, these monthly scenarios will be enhanced by our new Pathfinder Printables line of home-printed miniatures and will also appear as bonus content for subscribers to the Pathfinder Printables line on MyMiniFactory.com.&nbsp;&nbsp;</p>
              <p>We also have two major Organized Play themed hardcovers coming early next&nbsp;year:<em>&nbsp;</em><em><strong>The</strong></em><em>&nbsp;</em><em><strong>Chronicles of the Pathfinder Society Adventure Anthology&nbsp;</strong></em><strong>(March)&nbsp;</strong>presents 6 classic Pathfinder Society scenarios in updated and expanded Second Edition rules, with all adventures sanctioned for current PFS play.&nbsp;The&nbsp;<em><strong>Starfinder&nbsp;Invasion’s Edge Adventure Path</strong></em><strong>&nbsp;(April)&nbsp;</strong>collects more than a dozen popular scenarios from&nbsp;Starfinder&nbsp;Society’s debut season into an enhanced campaign you can play or replay as part of the&nbsp;Starfinder&nbsp;Society campaign.&nbsp;&nbsp;</p>
              <p>We&nbsp;know&nbsp;Organized&nbsp;Play&nbsp;has&nbsp;seen a lot of changes&nbsp;recently&nbsp;and&nbsp;that&nbsp;some&nbsp;of these&nbsp;have been frustrating&nbsp;or&nbsp;disruptive to&nbsp;our Venture Officers and&nbsp;player community.&nbsp;It is our earnest&nbsp;desire to&nbsp;stabilize&nbsp;both&nbsp;programs and&nbsp;expand them from a&nbsp;position of strength,&nbsp;but right now things are not&nbsp;working, and we need to&nbsp;fix them. Paizo&nbsp;remains&nbsp;committed to&nbsp;Organized Play&nbsp;in the&nbsp;long&nbsp;run&nbsp;and&nbsp;will&nbsp;continue to&nbsp;invest&nbsp;substantially&nbsp;in&nbsp;these programs&nbsp;as we move forward.&nbsp;</p>
              <h3>Free PDFs&nbsp;</h3>
              <p>Beginning July 1, we will end the automatic granting of free PDFs&nbsp;of&nbsp;non-Society&nbsp;Paizo&nbsp;products to&nbsp;volunteers.&nbsp;Venture officers will continue&nbsp;to receive free&nbsp;access to&nbsp;Paizo-produced&nbsp;Society&nbsp;scenarios,&nbsp;including&nbsp;those yet to be&nbsp;released,&nbsp;as we&nbsp;evaluate&nbsp;our&nbsp;current free&nbsp;PDF&nbsp;policies.&nbsp;We may still offer selective grants to venture officers&nbsp;when this&nbsp;audit is concluded, but the volume of free&nbsp;products&nbsp;we’ve&nbsp;been distributing is no longer financially&nbsp;viable.&nbsp;</p>
              <h3>Foundry Support&nbsp;</h3>
              <p>We’ve&nbsp;invested heavily in Foundry VTT modules for Organized Play&nbsp;scenarios, but sales have not covered development costs. We will finish the current season, then pause&nbsp;VTT support for new&nbsp;Society modules until we can either reduce costs or increase revenue.&nbsp;</p>
              <p>These changes are not a retreat—Paizo&nbsp;believes&nbsp;strongly in the power of&nbsp;Organized&nbsp;Play and&nbsp;always&nbsp;will,&nbsp;but the current&nbsp;publishing model&nbsp;for&nbsp;Society scenarios is&nbsp;not working&nbsp;and&nbsp;we need to&nbsp;slow down,&nbsp;stem&nbsp;the financial losses&nbsp;from a struggling&nbsp;program and&nbsp;evaluate where to&nbsp;go from here.&nbsp;&nbsp;</p>
              <h2><br></h2>
              <h2>What’s Next&nbsp;</h2>
              <p>Despite the challenges, there&nbsp;are real&nbsp;reasons for optimism&nbsp;in the medium&nbsp;term:&nbsp;</p>
              <ul>
               <li>We’ve&nbsp;partnered with&nbsp;Independent Publishers Group&nbsp;to rebuild our&nbsp;book‑trade&nbsp;presence.&nbsp;Sales are still recovering, but we are in a better position than we were&nbsp;in&nbsp;2025.&nbsp;</li>
               <li>The&nbsp;new&nbsp;Paizo&nbsp;Store&nbsp;is performing better than the old&nbsp;store&nbsp;and will soon allow us to launch a&nbsp;direct‑to‑retail&nbsp;program, enabling local game stores to order directly from&nbsp;Paizo—including&nbsp;a&nbsp;complete backlist&nbsp;catalog that&nbsp;has&nbsp;often been&nbsp;difficult to source&nbsp;through conventional channels.&nbsp;We expect your favorite local game store to be able to open a retailer account with Paizo in the next few months.&nbsp;</li>
              </ul>
              <p>These&nbsp;measures&nbsp;will take time to bear fruit. The&nbsp;difficult&nbsp;decisions&nbsp;we’re&nbsp;making now&nbsp;will&nbsp;ensure&nbsp;Paizo&nbsp;can continue to thrive in 2026 and beyond.&nbsp;</p>
              <p>To our customers, freelancers, partners, and volunteers: thank you. Your passion is the reason these worlds exist. We&nbsp;remain&nbsp;committed to the stories&nbsp;we’ve&nbsp;built together and to the people who bring them to life.&nbsp;</p>
              <p><strong>- Jim Butler&nbsp;</strong></p>
