             <figure class="blog__paragraph__image left" data-v-a2f23fca>
              <img src="https://cdn.paizo.com:443/a7d62ac8-7f03-00ef-f1f0-83fb8bf332e2/d8aae3c3-fa1c-4eda-942d-43cda27d79a3/051520_PaizoOP.png?w=300" alt="Organized Play logo, white text over blue golem graphic on orange background" data-v-a2f23fca>
             </figure>
             <div class="blog__paragraph__text" data-v-a2f23fca>
              <h1>Digital Adventure Releases</h1>
              <p>The following adventures will be released on May 6, 2026, and may be run at events beginning on that date.</p>
              <p><a href="https://store.paizo.com/pathfinder-society-scenario-7-17-perch-of-liberty/"><em>Pathfinder Society Scenario #7-17: Perch of Liberty</em></a><em><br></em><a href="https://store.paizo.com/pathfinder-society-scenario-7-18-freedom-on-the-sea/"><em>Pathfinder Society Scenario #7-18: Freedom on the Sea</em></a></p>
              <p><br></p>
              <p><a href="https://store.paizo.com/starfinder-society-scenario-1-21-breaching-the-wreck/"><em>Starfinder Society Scenario #1-21: Breaching the Wreck</em></a><em><br></em><a href="https://store.paizo.com/starfinder-society-scenario-1-22-rescue-in-the-wreck/"><em>Starfinder Society Scenario #1-22: Rescue in the Wreck</em></a></p>
              <h1><br>
                Sanctioning Updates</h1>
              <p>We’re still working on a refresh of our Pathfinder Society sanctioning document template, which we use to create chronicle sheets for our Adventures and Adventure Paths. The <a href="https://store.paizo.com/pathfinder-adventure-path-hellbreakers"><em>Hellbreakers</em></a><a href="https://store.paizo.com/pathfinder-adventure-path-hellbreakers"> Adventure Path</a>, as well as last month’s <a href="https://store.paizo.com/pathfinder-adventure-path-season-of-ghosts/"><em>Season of Ghosts</em></a><a href="https://store.paizo.com/pathfinder-adventure-path-season-of-ghosts/"> compilation</a>, will be sanctioned for Organized Play! I expect we’ll have these uploaded in the next few weeks.</p>
              <p>More importantly, we’ve got new rulebooks this month! Sanctioning for both <em>Starfinder Galactic Ancestries</em> and <em>Pathfinder Lost Omens Hellfire Dispatches</em> is now available on their programs’ respective character options pages. Enjoy a host of new aliens and Hellknights while you wait on adventure sanctioning documents!</p>
              <p>Now that <em>Galactic Ancestries</em> is available, we’ve made some minor updates to the Legacy Admittance boons. These boons now specifically grant access to all feats and heritages associated with that ancestry in their original printing, but not the full ancestry. This is to prevent mismatches for ancestries like androids which have minor differences between Pathfinder and Starfinder. Players who previously used this boon to build characters are grandfathered in, and do not need to own Galactic Ancestries to continue playing their characters.</p>
              <p>Oh, also, there are now boons to unlock Pathfinder options for humans, orcs, and androids, as well as runes from GM Core for archaic items!</p>
              <h2><br>
                Ownership Requirement Updates</h2>
              <p>In Organized Play, we require players to purchase rulebooks to use options in those rulebooks, outside of the core sources for each program. This is because, while we love our community and the work we do, unfortunately we continue to live under capitalism and must make money. It’s always been the policy that this exclusively permits physical copies of rulebooks or adventures, or a PDF purchased from Paizo, as those provide us with the most direct sources of revenue. However, we’re willing to change with the times.</p>
              <p>Beginning today, we are expanding the ownership requirements to read as follows:</p>
              <p>To use an option from any source other than those discussed above in Pathfinder/Starfinder Society play, you must bring any one of the following to your game table:</p>
              <ul>
               <li>A physical copy of the book you wish to use</li>
               <li><strong>Proof of purchase of a digital form of the relevant content, such as an official PDF, licensed VTT conversion or digital adaptation AND </strong>a copy of the rules you wish to use in the form of either electronic access to the Pathfinder Reference Document (paizo.com/prd), another official rules source such as <a href="https://app.demiplane.com/nexus/pathfinder2e">Pathfinder Nexus</a>, or a photocopy or printout of the relevant pages.</li>
              </ul>
              <p>The following do not satisfy this requirement:</p>
              <ul>
               <li>A photocopy of a physical book with no proof of purchase</li>
               <li>Printouts from electronic character builders such as Hero Lab</li>
               <li>Content reproduced in other sources under the Open Gaming License (OGL) <strong>or </strong>Open RPG<strong> </strong>Creative License (ORC License), such as an online reference document or a homemade omnibus</li>
              </ul>
              <p>This explicitly means that <em>any </em>digital adaptation of Paizo content fulfills the ownership requirements. This includes, but isn’t necessarily limited to, official VTT adaptations for Foundry, Roll20, Fantasy Grounds or the like; as well as official digital conversions of books such as those offered by Demiplane.</p>
              <p>The use of unofficial, unpaid sources (such as SRDs like Archives of Nethys or character builders) still does not qualify as owning source material. Neither do your secret pirated PDFs of rulebooks you got on the dark web, where did you even <em>get those</em>, those are probably <em>covered</em> in viruses.</p>
              <h1>Convention Updates</h1>
              <p>Convention season is ramping up once again, with dozens of events happening over the next few months. Find an event near you on <a href="https://paizo.com/conventions">our convention calendar</a>! If there aren’t any near you, why not join our online community at <a href="https://paizo.com/threads/rzs7r5lw?Announcing-Bridging-the-Gap-2026">Bridging the Gap 2026</a>? They’ve got over 100 tables in four different languages, as well as multiple author-run scenarios.</p>
              <h1><br>
                GM Recognition</h1>
              <h2>GM Ranks</h2>
              <p>Whether stars, novas, glyphs, or a secret fourth thing, achieving a 5 ranking in any program involves a substantial amount of time. To achieve the 5th milestone, a GM must run 150 games, of which at least 50 must be unique scenarios and 10 special scenarios, as well as run between one and three games for venture-captains (program dependent). A conservative estimate of the time needed to reach the 5th milestone is 650 hours!</p>
              <p>This month we had two GMs reach their fifth rank!</p>
              <p><strong>5th Glyph (PFS2)</strong>: Bret Indrelee, Kurt Wasiluk</p>
              <p>If you believe you’ve completed your 5th rank but haven’t been announced yet, please email me at <a href="mailto:organizedplay@paizo.com">organizedplay@paizo.com</a>.</p>
              <p><br></p>
              <p>Until next time - explore! report! cooperate! and go play a weird alien!</p>
              <p><strong>Alex Speidel<br></strong><em>Convention and Organized Play Manager</em></p>
              <p><br></p>
