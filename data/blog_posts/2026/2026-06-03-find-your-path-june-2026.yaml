           <div class="blog__article--component_wrapper" data-v-7a806b22>
            <div class="blog__paragraph" data-v-a2f23fca data-v-7a806b22>
             <div class="blog__paragraph__text" data-v-a2f23fca>
              <p>Hail and well met, ‘Finders! This month’s new releases challenge you to face off against the armies of Hell!</p>
              <p>Never miss a release with our <a href="https://store.paizo.com/subscriptions">Paizo Subscriptions</a>—for everything from rulebooks to accessories! Subscribers get a free PDF with purchase, early access to game content, and exclusive discounts for members with 4 or more active subscriptions.</p>
             </div>
            </div>
           </div>
           <div class="blog__article--component_wrapper" data-v-7a806b22>
            <div class="blog__paragraph" data-v-a2f23fca data-v-7a806b22>
             <figure class="blog__paragraph__image left" data-v-a2f23fca>
              <img src="https://cdn.paizo.com:443/a7d62ac8-7f03-00ef-f1f0-83fb8bf332e2/40852ba3-9a0e-438e-9ae5-0caadd9c59ba/PZO15223-HC_HellsDestiny.png?w=300" alt="Pathfinder Hellfire Crisis: Hell's Destiny Adventure Path. Iconic ranger, Harsk, and iconic commander, Ulka, are caught in the middle of two battling armies" data-v-a2f23fca>
             </figure>
             <div class="blog__paragraph__text" data-v-a2f23fca>
              <h2><a href="https://store.paizo.com/pathfinder-adventure-path-hell-s-destiny/"><strong>Pathfinder Adventure Path: Hell’s Destiny</strong></a></h2>
              <p><strong>War is Hell<br></strong>War between the Hell-sworn nation of Cheliax and its old enemy Andoran ripples across the Inner Sea, yet Cheliax’s greatest foe might be its own long-oppressed peoples—including several heroes trapped there when Cheliax declares martial law and seals its borders. These heroes won’t just free themselves; they’ll unite the infernal empire’s worst enemies to defeat Cheliax on land, by sea, and even in the depths of Hell itself! Hell’s Destiny is a complete Adventure Path for 10th–20th level characters.</p>
              <p>Hell’s Destiny is available in standard hardcover, Special Edition faux-leatherette hardcover, PDF, and VTT module formats.</p>
             </div>
            </div>
           </div>
           <div class="blog__article--component_wrapper" data-v-7a806b22>
            <div class="blog__paragraph" style="clear:both;" data-v-a2f23fca data-v-7a806b22>
             <figure class="blog__paragraph__image left" data-v-a2f23fca>
              <img src="https://cdn.paizo.com:443/a7d62ac8-7f03-00ef-f1f0-83fb8bf332e2/8c9c0bf6-cbfe-47f7-94e4-0de3bb4a813a/PZO11038-FM_WildernessCamps.jpg?w=300" alt="Pathfinder Flip-Mat: Wilderness Camps. A square tiled map of a small campsite with a fire pit on a rocky plain overlooking a ravine,
  ." data-v-a2f23fca>
             </figure>
             <div class="blog__paragraph__text" data-v-a2f23fca>
              <h2><a href="https://store.paizo.com/pathfinder-flip-mat-wilderness-camps"><strong>Pathfinder Flip-Mat: Wilderness Camps</strong></a></h2>
              <p><strong>Leave Only Tracks</strong></p>
              <p>Adventurers often brave the wilderness for extended expeditions, and Pathfinder Flip-Mat: Wilderness Camps gives GMs two campsites for when their party ventures far from home. The first side shows a hunting camp in the rugged badlands, while the other side presents a primal encampment nestled deep in a dense, humid jungle. Whether the PCs are setting their own camp or raiding a rival’s, Pathfinder Flip-Mat: Wilderness Camps has you covered!</p>
             </div>
            </div>
           </div>
           <div class="blog__article--component_wrapper" data-v-7a806b22>
            <div class="blog__paragraph" style="clear:both;" data-v-a2f23fca data-v-7a806b22>
             <figure class="blog__paragraph__image left" data-v-a2f23fca>
              <img src="https://cdn.paizo.com:443/a7d62ac8-7f03-00ef-f1f0-83fb8bf332e2/6c4b22e9-66ba-48cb-afd3-7f2465b0e5de/PZO260123E__80519.webp?w=300" alt="Starfinder Society Invasion's Edge: Psychic Echoes. The background image is First Seeker Sarmak and fellow Starfinder Zizenzi fighting off robots in front of a massive, alien starship. It’s dark, and the Starfinders are illuminated by aerial spotlights from an unknown source. " data-v-a2f23fca>
             </figure>
             <div class="blog__paragraph__text" data-v-a2f23fca>
              <h2><a href="https://store.paizo.com/starfinder-society-scenario-01-23/"><strong>Starfinder Society Scenario #1-23: Psychic Echoes</strong></a></h2>
              <p>In the aftermath of the Starfinder Society’s last trip to the frozen moon of Luvoth, in&nbsp;<a href="https://store.paizo.com/starfinder-society-scenario-1-02-mystery-of-the-frozen-moon"><em>Starfinder Society Scenario #1-02: Mystery of the Frozen Moon</em></a>, the lu-venon citizens of Luvoth have been liberated and reunited with friends and family. In the months since, they’ve attempted to reclaim their world and rebuild their crumbling society. To temper the danger of initial explorations, lu-venon leadership decided to reach out to the Starfinder Society, requesting their assistance with exploration efforts. Your first task? Explore a mysterious ice cave overflowing with psychic activity while accompanied by lu-venon researcher and Starfinder ally, Uloa Su-Tae.</p>
             </div>
            </div>
           </div>
           <div class="blog__article--component_wrapper" data-v-7a806b22>
            <div class="blog__paragraph" style="clear:both;" data-v-a2f23fca data-v-7a806b22>
             <figure class="blog__paragraph__image left" data-v-a2f23fca>
              <img src="https://cdn.paizo.com:443/a7d62ac8-7f03-00ef-f1f0-83fb8bf332e2/b028b3bf-2f57-4c66-855b-174f775b8712/PZO160719E__08602.webp?w=300" alt="Pathfinder Society The Year of Battle's Spark: The Lost Legacy:  A dragon composed of solid shadow sits upon a raised dais, menacingly preparing to strike." data-v-a2f23fca>
             </figure>
             <div class="blog__paragraph__text" data-v-a2f23fca>
              <h2><a href="https://store.paizo.com/pathfinder-society-scenario-7-19-the-lost-legacy/"><strong>Pathfinder Society Scenario #7-19: The Lost Legacy</strong></a></h2>
              <p>The PCs are sent to a remote fishing village on the southern shore of the Lake of Mists and Veils to investigate a hidden vault supposedly belonging to House Rogavaria, the former ruling house of Brevoy that went missing more than twenty years ago. The former Head Librarian of Restov’s largest library, Nephaira Savakress, spent years searching for the truth behind the myths and legends of Choral Rogavaria, also known as Choral the Conqueror. She found the location of the vault and of the history of Choral, but her source mysteriously disappeared. She has chosen to place her trust in the Pathfinder Society to retrieve this information. But there are forces at play that want the information to remain hidden, and they'll kill to do so.</p>
             </div>
            </div>
           </div>
           <div class="blog__article--component_wrapper" data-v-7a806b22>
            <div class="blog__paragraph" style="clear:both;" data-v-a2f23fca data-v-7a806b22>
             <figure class="blog__paragraph__image left" data-v-a2f23fca>
              <img src="https://cdn.paizo.com:443/a7d62ac8-7f03-00ef-f1f0-83fb8bf332e2/1644bdb9-5aa6-4828-b366-0a4fa53a4bbf/PZO260124E__10989.jpg?w=300" alt="Starfinder Society Invasion's Edge: Final Gambit Part One. The background image is First Seeker Sarmak and fellow Starfinder Zizenzi fighting off robots in front of a massive, alien starship. It’s dark, and the Starfinders are illuminated by aerial spotlights from an unknown source. " data-v-a2f23fca>
             </figure>
             <div class="blog__paragraph__text" data-v-a2f23fca>
              <h2><a href="https://store.paizo.com/starfinder-society-scenario-1-24-final-gambit-part-one/"><strong>Starfinder Society Scenario #1-24: The Final Gambit: Part One</strong></a></h2>
              <p>Despite being slowed by a disastrous crash landing, Elovai, master of the Wreck of the Returned, launched her invasion of the planet Akiton, using her nodocite armies, converted minions, and reality-warping magic. The Starfinder Society has worked hard to counter this invasion, partnering with numerous allies and working to secure intel and access to the Wreck. Recently, the Starfinders launched a rescue mission into the Wreck using a secret entrance, to liberate the innocents captured for conversion. Though they succeeded in their mission, they lost control of this entrance.</p>
              <p>Determined to defeat Elovai before her forces overrun Akiton, First Seeker Sarmak is left with no other choice but to perform a concerted assault on the Wreck of the Returned alongside his fellow Starfinders and the many allies the Starfinder Society has made this year. While this joint coalition launches their well-planned assault and punches a hole in the Wreck’s defenses, a team of Starfinders is tasked with slipping into the Wreck of the Returned, reaching the central core, and destroying Elovai. Without Elovai, this invasion by the First Ones will be thwarted, and the Wreck’s many forces will lack leadership, simultaneously saving Akiton and opening the Wreck of the Returned to future exploration. The fate of Akiton and the future of the Pact Worlds is in your hands!</p>
              <p>This is an adventure in the ongoing Invasion’s Edge metaplot and is part one of a two-part scenario series. This adventure’s direct sequel is&nbsp;<em>Starfinder Society Scenario #1-26: Final Gambit: Part Two</em>.</p>
             </div>
            </div>
           </div>
           <div class="blog__article--component_wrapper" data-v-7a806b22>
            <div class="blog__paragraph" style="clear:both;" data-v-a2f23fca data-v-7a806b22>
             <figure class="blog__paragraph__image left" data-v-a2f23fca>
              <img src="https://cdn.paizo.com:443/a7d62ac8-7f03-00ef-f1f0-83fb8bf332e2/cd077914-8212-4b0d-81e2-4bf1afbbc5be/PZO160720E__28428.jpg?w=300" alt="Pathfinder Second Edition Pathfinder Society The Year of Battle's Spark the Strings of Hell. The cover art includes an elegantly dressed female minotaur looking fearfully into the distance" data-v-a2f23fca>
             </figure>
             <div class="blog__paragraph__text" data-v-a2f23fca>
              <h2><a href="https://store.paizo.com/pathfinder-society-scenario-7-20-the-strings-of-hell/"><strong>Pathfinder Society Scenario #7-20: The Strings of Hell</strong></a></h2>
              <p>Within the Cairnlands of Absalom, a group of young minotaurs has vanished while on an important gathering quest. One of the members of Absalom's First Guards is quick to use his connections to the Pathfinder Society to call on them for assistance in finding these minotaurs and getting them home safely. However, out among the rusted siege engines and collapsed towers, the Pathfinders stumble upon a scheme that’s been hatching since the beginning of the Hellfire Crisis!</p>
             </div>
            </div>
           </div>
           <div class="blog__article--component_wrapper" data-v-7a806b22>
            <div class="blog__paragraph" style="clear:both;" data-v-a2f23fca data-v-7a806b22>
             <div class="blog__paragraph__text" data-v-a2f23fca>
              <p><strong>From Our Partners</strong></p>
              <p>Our partners at Archives of Nethys, Demiplane, Fantasy Grounds, Hero Lab Online, and Roll20* are dropping new content this month as well! Buy your PDF on paizo.com to get a discount via the PaizoConnect API. Or pay full price on their platforms, sync your account, and get a complimentary PDF on the Paizo Store.</p>
              <p>*Roll20 is no longer a part of PaizoConnect, and discounts and complimentary PDFs do not apply.</p>
              <p><br></p>
              <p>Bring Pathfinder and Starfinder to where you are, in person or online, and if you don’t have a favorite local game store, get books delivered to your door via a&nbsp;<a href="https://store.paizo.com/subscriptions">Paizo Subscription!</a> From rulebooks to adventures, accessories, and more, we’ve got subscriptions for every table! Subscribing to a line of books gets you the physical book and the PDF for one price! Subscribe to four lines or more to unlock exclusive discounts on subscriptions and added products.</p>
              <p>Thank you for playing Starfinder and Pathfinder!</p>
              <p>Shop the&nbsp;<a href="https://store.paizo.com/">Paizo Store</a>&nbsp;and your&nbsp;<a href="https://paizo.com/paizo/locator">favorite local game store</a>&nbsp;today!</p>
              <p><br></p>
             </div>
            </div>
           </div>
