             <h1 data-v-7a806b22>
              <p>Player Core 2 Preview: The Champion, Remastered</p></h1>
             <div class="byline" data-v-7a806b22>
              <a href="/blog/a" title="More blog posts by Logan Bonner" class="name disabled" data-v-7a806b22>Logan Bonner</a><span class="postDate" data-v-7a806b22> - Jun 12, 2024, 8:30 pm</span>
