            <div class="blog__paragraph" data-v-a2f23fca data-v-41cb3b80>
             <div class="blog__paragraph__text" data-v-a2f23fca>
              <h2><strong>Immunities, Weaknesses, and Resistances</strong></h2>
              <p>The original <em>Pathfinder Player Core</em> FAQs added earlier this month included a clarification on the weakness rules that received a large community response, much of which was negative. In listening to this discourse, it became clear the issue couldn’t be resolved without errata to the text, so the team went back to those rules and did some major surgery on that section. The intention was to make the rules less vague, easier to apply, and more in line with how people intuitively use weaknesses and resistances. This erratum now appears under the section for Player Core Errata (Spring 2026, 1st Printing). These changes will also appear in the next printing of <em>Starfinder Player Core</em>.</p>
              <p>Under the revised rules, each weakness and resistance can trigger only once during an effect (such as a single Strike or spell). A creature with weaknesses to both a damage type and special material can have them both activated at the same time. In a pretty substantial change from both the original rules and our interim guidance on the subject, resistance to all damage now applies only once as well. We also cover what happens when multiple resistances could apply to the same damage, as often happens when a character has both resistance to one type of damage and resistance to all damage. You can find some details on the reason for these changes in the erratum.</p>
              <p>We also added wording to several abilities and items that combine Strikes and spells so they combine the damage for weaknesses. These include Spellstrike, <em>spellstrike ammunition</em>, the eldritch archer’s Eldritch Shot, and the beast gunner’s Spellsling. These are the most prominent ones, but GMs can apply this change to similar abilities.</p>
              <p>The designers are still looking into making a comprehensive clarification entry later to cover the full process of applying immunities, weaknesses, and resistances. This is an extremely complicated and time-consuming process, so we are delaying that for now. As a general golden rule, we suggest GMs favor the attacker when applying weaknesses and the defender when applying resistances if the process isn’t clear from the existing erratum text.</p>
              <h2><strong>In Closing</strong></h2>
              <p>We hope these changes and clarifications will improve your Pathfinder games! As noted up front, if you run into any issues that aren’t already covered in the FAQs or previous errata threads, please post them in the <a href="https://paizo.com/threads/rzs7oywd?Pathfinder-Fall-2026-Errata-Suggestion-Thread">Fall 2026 Errata Suggestion Thread</a> to make sure your thoughts and suggestions make it to the team.</p>
              <p><strong>The Pathfinder Designers</strong></p>
              <h3><a href="https://paizo.com/threads/rzs7w3u5?Spring-2026-Errata-Update#1"><strong>Have Questions? Join the conversation on the Paizo Forums!</strong></a></h3>
