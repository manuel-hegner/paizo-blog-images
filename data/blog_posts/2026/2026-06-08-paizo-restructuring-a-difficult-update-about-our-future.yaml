             <h1 data-v-7a806b22>
              <p>Paizo Restructuring: A Difficult Update About Our Future&nbsp;</p></h1>
             <div class="byline" data-v-7a806b22>
              <a href="/blog/author/JimButler" title="More blog posts by Jim Butler" class="name" data-v-7a806b22>Jim Butler</a><span class="postDate" data-v-7a806b22> - 6 hours, 10 minutes ago</span>
