           <div class="blog__article--component_wrapper" data-v-7a806b22>
            <div class="blog__paragraph" data-v-a2f23fca data-v-7a806b22>
             <div class="blog__paragraph__text" data-v-a2f23fca>
              <p>If you haven’t heard, the rival nations of Andoran and Cheliax cast aside all pretense at peace last year as they declared open war against each other. The <a href="https://store.paizo.com/pathfinder/adventures/hellbreakers/">Hellbreakers Adventure Path</a> explored the struggle in Isger, Cheliax’s long-oppressed client state, which used the war to seize its independence at last. But that’s just one slice of the broad regional conflict.</p>
              <p>The Chelaxian port city Corentyn controls the narrow strait connecting the Inner Sea and Arcadian Ocean—a lucrative location, and Cheliax has always been on hand to demand its cut of the action. With the war reaching a taxing stalemate, Cheliax has extracted every silver piece it can from Corentyn’s coffers. Recent civil demonstrations against these measures provided Chelaxian officials the token justification needed to enact martial law and seize any neutral ships in the area.</p>
             </div>
             <figure class="blog__paragraph__image below" data-v-a2f23fca>
              <img src="https://cdn.paizo.com:443/a7d62ac8-7f03-00ef-f1f0-83fb8bf332e2/8388b94c-ba5a-42c1-a2a2-d4d3ab4cb135/HellsDestinyPlayersGuide_Cover.jpg?w=550" alt="Pathfinder Hellfire Crisis: Hell's Destiny Adventure Path Player's Guide. Iconic ranger, Harsk, and iconic commander, Ulka, are caught in the middle of two battling armies" data-v-a2f23fca>
             </figure>
            </div>
           </div>
           <div class="blog__article--component_wrapper" data-v-7a806b22>
            <div class="blog__paragraph" data-v-a2f23fca data-v-7a806b22>
             <div class="blog__paragraph__text" data-v-a2f23fca>
              <p>Whether you’re an accomplished merchant, a disillusioned local, a freedom fighter from abroad, or a mercenary with a moral compass, you’re among the unlucky souls trapped in Corentyn by this latest crackdown. But importantly, it’s not the first time your life and livelihood have been on the line; the PCs begin this Adventure Path as 10th-level characters! Be ready to destabilize Cheliax from within—beginning with Corentyn, recruiting an eclectic coalition of battle-hardened allies and ultimately confronting Cheliax’s armies head-on.</p>
              <p>Inside the <a href="https://downloads.paizo.com/HellsDestinyPlayersGuide.pdf" data-new-window="true" target="_blank" rel="noopener noreferrer">Hell’s Destiny Player’s Guide</a>, you’ll find player-friendly, spoiler-free lore and advice for creating exciting characters who can plunge the proverbial dagger directly into Hell’s heart. Contents include:</p>
              <p>• A summary of the war so far.</p>
              <p>• Character suggestions, including recommendations for ancestries, classes, languages, skills, and feats well suited to this Adventure Path.</p>
              <p>• Six new backgrounds specifically tailored to this Adventure Path, such as the Hell-Hunted, the Defiant Noble, and the Scholar of Battlefields.</p>
              <p>• Advice on the adventure’s subsystems, including the skirmish subsystem for commanding troops introduced in <a href="https://store.paizo.com/pathfinder-battlecry/?searchid=559923&amp;search_query=battlecry"><em>Pathfinder Battlecry</em></a>!.</p>
              <p><br></p>
              <p>Cry havoc!<br>
                John Compton<br>
                Lead Developer<br>
                Paizo, Inc.</p>
              <h2><a href="https://downloads.paizo.com/HellsDestinyPlayersGuide.pdf" data-new-window="true" target="_blank" rel="noopener noreferrer">Download The&nbsp;Hell’s Destiny Player’s Guide</a></h2>
              <p><br></p>
