           <div class="blog__article--component_wrapper" data-v-7a806b22>
            <div class="blog__paragraph" data-v-a2f23fca data-v-7a806b22>
             <div class="blog__paragraph__text" data-v-a2f23fca>
              <p>With&nbsp;<em>Pathfinder Player Core 2</em>&nbsp;releasing at the start of August, we know players are anticipating the remastered versions of some of their favorite classes! In a series of blogs starting right here, we’ll be alternating between talking about the changes to four of the classes and showing off some fun fiction and art starring the iconic characters of&nbsp;<em>Player Core 2</em>.</p>
              <p>The champion is the premier divine warrior, with some of the best armor and defenses in the game. They’re devoted to their deity and their tenets. One of the major changes to the remaster was dropping alignment, which the champion has always featured heavily, so we know everyone expects big changes to the class!</p>
              <p>We’ve already put basic compatibility rules for the champion in the&nbsp;<a href="https://paizo.com/pathfinder/faq">Pathfinder FAQ</a>—see&nbsp;<em>Pathfinder Core Rulebook</em>&nbsp;Errata (Remaster Compatibility)—but the&nbsp;<em>Player Core 2</em>&nbsp;version will present a much more thorough overhaul. So what do fans of this class have to look forward to?</p>
             </div>
             <figure class="blog__paragraph__image below" data-v-a2f23fca>
              <img src="https://cdn.paizo.com:443/a7d62ac8-7f03-00ef-f1f0-83fb8bf332e2/bf96939a-6c8c-49bd-a84e-bdbfb8a63dd1/PZO2103_Duels_2000.jpg" alt="Seelah, the iconic champion, battles a tyrant devil. Art by William Liu." data-v-a2f23fca>
              <figcaption class="style--match_paragraph" data-v-a2f23fca>
               <p>Seelah, the iconic champion, battles a tyrant devil. Art by William Liu.</p>
              </figcaption>
             </figure>
            </div>
           </div>
           <div class="blog__article--component_wrapper" data-v-7a806b22>
            <div class="blog__paragraph" data-v-a2f23fca data-v-7a806b22>
             <div class="blog__paragraph__text" data-v-a2f23fca>
              <p>Before the remaster, a champion’s alignment and their choice of champion cause established a strict set of hierarchical rules to be followed. Each good and evil alignment had a cause tied to it, like the lawful good paladin, chaotic good liberator, and neutral evil desecrator. The remastered version still has a cause, but the focus has shifted away from being so strict and static. Now we use edicts and anathema tied to different character choices to guide your roleplaying.</p>
              <p>Let’s take the paladin as an example. They used to follow the two tenets of good, two tenets of the lawful good paladin cause, and any edicts and anathema for their deity. A champion under the remastered rules would choose the justice cause. They would follow the edicts and anathema of their deity, plus the following from the cause of justice.</p>
              <p><strong>Edicts</strong>&nbsp;follow the law, respect legitimate authorities or leadership</p>
              <p><strong>Anathema</strong>&nbsp;take advantage of another, cheat</p>
              <p>More emphasis on edicts rather than an unbendable code loosens some of the restrictions on their roleplaying to allow more well-rounded, nuanced characters. There’s a better balance over “should nots” instead of all “must nots.”</p>
              <p>A champion can optionally choose a sanctification. If you’ve read&nbsp;<em>Pathfinder Player Core</em>, you’re familiar with holy and unholy sanctification—a choice based on your deity that lets you commit yourself to the battle for souls between the holy planes and unholy planes. Champions can choose sanctification based on their deity, though unholy sanctification is an uncommon option. Each sanctification gives you another edict and anathema, and adds the holy or unholy trait to all your Strikes.</p>
              <p>Some, but not all, champion causes require a certain sanctification. Justice, mentioned above, does not. The Player Core 2 causes are justice, liberation, and obedience (open to all); desecration and iniquity (open only to unholy champions); and redemption and grandeur (open only to holy champions). If you are already playing a champion and want to update them to the new options, you’ll probably be able to keep the core of that character. Though you can always shake things up with the new grandeur cause, which is based on the brilliant splendor of celestials.</p>
              <p><br></p>
              <h3>Other Changes</h3>
              <p>This class has seen a huge number of other changes we think will make it more satisfying to play, but we don’t want to keep you here all day with one blog post. So here’s the short version!</p>
              <ul>
               <li>You now have a defined champion’s aura for your reactions, aura feats, and other abilities, which lets other rules alter and refer to the range of your divine abilities more easily.</li>
               <li>The divine ally ability has been changed to blessing of the devoted, and the mount has moved to a 1st-level feat. You can instead choose the blessed swiftness option to move faster—whether you’re mounted or not.</li>
               <li>Feats saw a ton of change, like the new Defensive Advance feat and updated structure for Mercy. We focused on broadly useful feats plus maintaining some backward compatibility, but we did run out of room. You’ll see oath feats moved to&nbsp;<em>Lost Omens Divine Mysteries</em>. We’re hoping to find a book in which it would make sense to remaster litanies at some point, but we don’t have one that can hold them yet.</li>
               <li>You choose a focus spell based on your deity’s divine font options. As before the remaster, you can choose&nbsp;<em>lay on hands</em>&nbsp;if your deity allows the&nbsp;<em>heal</em>&nbsp;divine font or&nbsp;<em>touch of the void</em>&nbsp;(formerly&nbsp;<em>touch of corruption</em>) if they allow the&nbsp;<em>harm</em>&nbsp;divine font. However, there’s also a new option for a deity with any font, specially made for defense-minded characters. Introducing&nbsp;<em>shields of the spirit</em>!</li>
              </ul>
             </div>
            </div>
