           <div class="blog__article--component_wrapper" data-v-41cb3b80>
            <div class="blog__paragraph" data-v-a2f23fca data-v-41cb3b80>
             <div class="blog__paragraph__text" data-v-a2f23fca>
              <p>It’s that time of year again where we get to update the <a href="https://paizo.com/pathfinder/faq">Pathfinder FAQ page</a> with new errata changes and clarifications. While this is going to be a long post, we want to take a deeper look at some specific errata changes. If you’d rather just look at all the changes for yourself, feel free to jump to the <a href="https://paizo.com/pathfinder/faq">Pathfinder FAQ page</a>. Look for the Spring 2026 sections for <em>Pathfinder Player Core</em>, <em>Pathfinder GM Core</em>, <em>Pathfinder Player Core 2</em>, and <em>Pathfinder Guns &amp; Gears (Remastered)</em>. There’s also one change to Spellstrike in the <em>Pathfinder Secrets of Magic</em> Errata (Fall 2024) section.</p>
              <p>Before we get into the details, the team wants to extend our thanks to the folks who have taken the time to post errata and clarification suggestions on the <strong>paizo.com</strong> forums. Many of the changes and clarifications we’ve made were based on topics brought up there! There’s currently a <a href="https://paizo.com/threads/rzs7oywd?Pathfinder-Fall-2026-Errata-Suggestion-Thread">Fall 2026 Errata Suggestion Thread</a> already in progress. All issues brought up in previous threads have been logged in our internal system and will be considered for our Fall 2026 errata.</p>
              <h2><strong>Reprints</strong></h2>
              <p>We already put up pages for several books we recently reprinted. These went up before the planned spring errata so they would be current when people began getting 2nd printing copies of these books. These books were <em>Pathfinder Player Core</em>, <em>&nbsp;Pathfinder GM Core</em>, and <em>&nbsp;Pathfinder Guns &amp; Gears (Remastered)</em>. Most of these are cleaning up minor errors, but there are a few more notable changes.</p>
              <p><em><strong>Pathfinder</strong></em><em> </em><em><strong>Player Core</strong></em> <strong>FAQs </strong>include changes to the druid and ranger Mature Animal Companion feats to allow more types of movement, a rebalancing of the Resentment witch patron’s familiar ability, changes to the familiar rules and Pet feat to make replacing creatures easier, corrected heightened entries for condition-removing spells, adjusted several spells, updated the language for Take Cover, and a revision to how the stunned condition works when you become stunned during your turn.</p>
              <p><em><strong>GM Core</strong></em> had a fairly small number of changes, including updated language for the alchemical bomb rules and a corrected item Price for 5th-rank wands.</p>
              <p><em><strong>Guns &amp; Gears (Remastered)</strong></em> FAQs changed the failure of the inventor’s Overdrive to last 1 minute, defined how to treat the automaton ancestry’s Reinforced Chassis for abilities and runes, fixed the Inventor Dedication’s prerequisite, and updated several archetypes. The largest number of changes came to the firework technician archetype, which received a major revamp.</p>
              <h2><strong>Pathfinder Player Core 2</strong></h2>
              <p>Because the reprints took a lot of the team’s time, we needed to limit the number of titles we covered for the other errata for this spring to one: <em>Pathfinder Player Core 2</em>! Here are the highlights of the new FAQs released today.</p>
              <ul>
               <li><strong>Oracles’</strong> spell repertoire text was fixed to match the table, as well as an upgrade to <em>weapon trance</em>.</li>
               <li><strong>Qi spell feats</strong> can now be taken multiple times as intended.</li>
               <li><strong>Swashbuckler multiclass</strong> now has a use for panache in their dedication feat.</li>
               <li><strong>Mature animal companion feats</strong> were upgraded to allow more movement types, like their Player Core counterparts.</li>
               <li><strong>Alchemists</strong> had a large number of changes to research field abilities and feats, primarily to improve their action economy and integration between different abilities. Mutagenist field vials, the toxicologist field benefit, Revivifying Mutagen, Healing Bomb, Combine Elixirs, Sticky Bomb, Double Poison, and Eternal Elixir all saw changes.</li>
               <li><strong>Draconic sorcerers</strong> now have the details on how to update focus spells when using the Specific Draconic Exemplars option.</li>
              </ul>
             </div>
             <figure class="blog__paragraph__image below" data-v-a2f23fca>
              <img src="https://cdn.paizo.com:443/a7d62ac8-7f03-00ef-f1f0-83fb8bf332e2/5af043a7-d4bd-45bf-9f66-8faf56464563/PZO2109_Improvisedtechnology.png" alt="Art by Firat Solhan. Iconic fighter, Valeros, and iconic alchemist, Fumbus, are on a tropical beach surrounded by the wreckage of a sailing ship. Valeros is building a raft out of logs and vines, while Fumbus is pouring something into an upturned barrel." data-v-a2f23fca>
              <figcaption class="style--match_paragraph" data-v-a2f23fca>
               <p>The goblin alchemist Fumbus and human fighter Valeros prepare alchemical oil while building a raft on a deserted desert isle. It’s the fantasy adventure equivalent of preparing errata, but with better scenery. Art by Firat Solhan.</p>
              </figcaption>
             </figure>
