           <div class="blog__article--component_wrapper" data-v-41cb3b80>
            <div class="blog__paragraph" data-v-a2f23fca data-v-41cb3b80>
             <div class="blog__paragraph__text" data-v-a2f23fca>
              <p>Salutations to all our intrepid Starfinders and Pathfinders!</p>
              <p>It’s been over a year now since I began my journey as a champion for the community here at Paizo, and just like most things we love and enjoy, it felt incredibly short, and I wish I could marinate in it more. So, I have great news! I’m still here! Thank you all for welcoming me with open arms, and thank you as well for celebrating with me the diversity our worlds and team has to offer. Black History Month is a time of education, reflection, and admiration for the Black community internationally, so I encourage you all to continue to be allies to the Black voices around you in the tabletop space as best you’re able! Especially now, it’s important for you all to know that I am not just the Community and Social Media Specialist for Paizo. I am the Black and Agender Community and Social Media Specialist for Paizo, all year round, and this community means very much to me. I’m proud and honored to be a part of it.</p>
             </div>
            </div>
           </div>
           <div class="blog__article--component_wrapper" data-v-41cb3b80>
            <div class="blog__paragraph" data-v-a2f23fca data-v-41cb3b80>
             <div class="blog__paragraph__text" data-v-a2f23fca>
              <h2>Maya Coleman (xe/xem/they/them)</h2>
              <p>An avid musician and graduate from Oberlin College &amp; Conservatory with a degree in Film Music Composition, Maya has used their skills in organization in combination with a weaponization of their OCD and OCPD (literally) to flourish in the tabletop industry for over ten years. Starting as the sole employee at Goat, Wolf, &amp; Cabbage LLC, managing community for the board game Secret Hitler since its inception, they’ve gone on to manage communities at Skybound Tabletop, run projects on Kickstarter such as Trogdor!! The Board Game! and Trial by Trolley, and are now flourishing here at Paizo as the bridge that brings all our community together, our players, our team, and our partners.</p>
              <p>When they are not working in the industry, they are most commonly crocheting, including a Totoro sweater that their loyal service dog, Avalon, stole and slept on before they could even wear it themselves. Their favorite food is curry, and they're well versed in their second language, Korean, so trust them with the scissors and tongs at Korean BBQ.</p>
              <p><strong>You can find Maya at the following links:</strong></p>
              <ul>
               <li>Etsy: <a href="https://www.etsy.com/shop/MayagurumiCo">https://www.etsy.com/shop/MayagurumiCo</a></li>
               <li>Nintendo Friend Code: SW-6873-1301-1137</li>
              </ul>
             </div>
             <figure class="blog__paragraph__image below" data-v-a2f23fca>
              <img src="https://cdn.paizo.com:443/a7d62ac8-7f03-00ef-f1f0-83fb8bf332e2/5a875cfc-92cb-424b-a1fd-d32b862ac5de/BHM_Avalon.jpg?w=500" alt="Avalon, Maya Coleman’s dog" data-v-a2f23fca><img src="https://cdn.paizo.com:443/a7d62ac8-7f03-00ef-f1f0-83fb8bf332e2/9621dd98-b85a-4f9f-a639-79689f99c3a2/BHM_MayaCrochet.jpg?w=500" alt="Totoro sweater, crocheted by Maya Coleman" data-v-a2f23fca>
             </figure>
            </div>
           </div>
           <div class="blog__article--component_wrapper" data-v-41cb3b80>
            <div class="blog__paragraph" data-v-a2f23fca data-v-41cb3b80>
             <div class="blog__paragraph__text" data-v-a2f23fca>
              <h2>Shan Wolf (he/they)</h2>
              <p>My name is Shan Wolf (he/they), and I freelance for Pathfinder and Starfinder in various capacities. At a time like this, it can be hard to find your voice in the darkness. To want to play games and enjoy yourself because so many others are suffering. At least for me, I try to stand by an understanding that if I can inspire one person, if I can bring joy to one heart that's currently sad, I've done my job as a freelancer. I'm grateful every day to the hardworking people of Paizo, from the designers to the warehouse workers, for bringing these games to people and giving me chances to inspire, engage, and challenge.</p>
              <p>I'm excited to see a number of wonderful products I worked on in the hands of players, but one product I did not work on that I hope people enjoy: <a href="https://store.paizo.com/pathfinder-adventure-path-hellbreakers" data-new-window="true" target="_blank" rel="noopener noreferrer">Hellbreakers</a>. The battle for freedom against fascism is a historical fascination of mine, and I’m genuinely inspired by the tales of Black units during World War II like the 761st Tank Battalion (the Black Panthers), the 332nd Fighter group, the 477th bombardment group (the Tuskegee Airmen), and of course, the 369th Infantry Regiment (the Harlem Hellfighters). I’ll be looking to these for inspiration when building my Hellbreaker, and my Hellbreakers campaigns. I hope you do too.</p>
              <ul>
               <li><a href="https://bsky.app/profile/shanwolf.bsky.social" data-new-window="true" target="_blank" rel="noopener noreferrer">Shan Wolf on Bluesky</a></li>
              </ul>
             </div>
             <figure class="blog__paragraph__image below" data-v-a2f23fca>
              <img src="https://cdn.paizo.com:443/a7d62ac8-7f03-00ef-f1f0-83fb8bf332e2/62c8aad9-b747-4700-b430-6e51820cb0e2/BHM_Introduction.jpg" alt="Multiple human magic users battle a monstrous insect rising up ominously out of the forest" data-v-a2f23fca>
              <figcaption class="style--match_paragraph" data-v-a2f23fca>
               <p>Illustration by Will O'Brien</p>
              </figcaption>
             </figure>
            </div>
           </div>
           <div class="blog__article--component_wrapper" data-v-41cb3b80>
            <div class="blog__paragraph" data-v-a2f23fca data-v-41cb3b80>
             <div class="blog__paragraph__text" data-v-a2f23fca>
              <p>Thank you for taking the time to read this blog! Existing as a Black person in this world takes energy, so I’m appreciative that you also took energy to read our words! If you are a Black content creator in the Pathfinder or Starfinder space, we would love to hear from you, and learn about what you do! Send me an email at community@paizo.com and introduce yourselves. <br><br>
                In the words of the immortal Issa Rae, “I’m rooting for everybody Black.”</p>
              <p><strong>Maya Coleman (xe/xem/they/them)<br></strong><em><strong>Community and Social Media Specialist</strong></em></p>
              <h3><a href="https://paizo.com/threads/rzs7pjq5?NEW-BLOG-Celebrating-Black-History-Month-2026">Join us in the Paizo forums and celebrate many of the talented black voices at Paizo for Black History Month!</a></h3>
             </div>
