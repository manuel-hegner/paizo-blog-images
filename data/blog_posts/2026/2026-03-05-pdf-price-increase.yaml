            <div class="blog__paragraph" data-v-a2f23fca data-v-41cb3b80>
             <div class="blog__paragraph__text" data-v-a2f23fca>
              <p>It’s been more than three years since Paizo last adjusted PDF pricing, and the time has come once again for us to make updates to a few digital product categories. We’ve worked hard to hold the line as long as possible, even as development, art, and production costs have continued to rise.</p>
              <p>Effective March 16th, Paizo will increase prices on the following categories of products:</p>
              <table>
               <tbody>
                <tr>
                 <td><strong>Product Category</strong></td>
                 <td>&nbsp;</td>
                 <td><strong>Current</strong></td>
                 <td>&nbsp;</td>
                 <td><strong>2026</strong></td>
                 <td>&nbsp;</td>
                 <td><strong>Example Products</strong></td>
                </tr>
                <tr>
                 <td>Rulebooks</td>
                 <td><br></td>
                 <td>$19.99</td>
                 <td><br></td>
                 <td>$29.99</td>
                 <td><br></td>
                 <td><em>Pathfinder Player Core</em>, <em>Starfinder Player Core</em></td>
                </tr>
                <tr>
                 <td>Adventures (128 pages)</td>
                 <td><br></td>
                 <td>$19.99</td>
                 <td><br></td>
                 <td>$29.99</td>
                 <td><br></td>
                 <td><em>Prey for Death</em>, <em>Claws of the Tyrant</em></td>
                </tr>
                <tr>
                 <td>Adventures (256 pages)</td>
                 <td><br></td>
                 <td>$39.99</td>
                 <td><br></td>
                 <td>$49.99</td>
                 <td><br></td>
                 <td><em>Hellbreakers</em>, hardcover APs</td>
                </tr>
               </tbody>
              </table>
              <h1><br></h1>
              <h1>What’s Not Changing</h1>
              <p>We want to be clear about what remains the same. These categories are not increasing in price:</p>
              <ul>
               <li>64 &amp; 96‑page Adventure Path volumes</li>
               <li>Flip‑mats and map products</li>
               <li>Accessories</li>
               <li>Bounties and Quests</li>
               <li>Pawns</li>
               <li>Card products</li>
               <li>Society Scenarios*</li>
              </ul>
              <p><br></p>
              <p>* We have changed format and reduced the size and price of Society scenarios. The team is still collecting feedback on this change from players.</p>
              <p>Digital sales play a vital role in supporting Paizo’s work, and your purchase of PDFs helps us continue creating the Pathfinder and Starfinder releases you enjoy. While price changes are never welcome, we remain committed to keeping increases as limited as possible and holding the line for as long as we can.</p>
              <p>As always, thank you for your ongoing support of Paizo.</p>
              <p>Good Gaming!</p>
              <p><strong>Jim Butler, CEO<br></strong><em><strong>Paizo Inc.</strong></em></p>
              <p><br></p>
