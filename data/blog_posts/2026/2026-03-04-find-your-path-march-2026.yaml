           <div class="blog__article--component_wrapper" data-v-41cb3b80>
            <div class="blog__paragraph" data-v-a2f23fca data-v-41cb3b80>
             <div class="blog__paragraph__text" data-v-a2f23fca>
              <p>Hail and well met, ‘Finders! This month’s new releases pit wizard students up against silly situations and ask for your aid in Isger’s fight for freedom!</p>
              <p>Never miss a release with our <a href="https://store.paizo.com/subscriptions">Paizo Subscriptions</a>—for everything from rulebooks to accessories! Subscribers get a free PDF with purchase, early access to game content, and exclusive discounts for members with four or more active subscriptions.</p>
             </div>
            </div>
           </div>
           <div class="blog__article--component_wrapper" data-v-41cb3b80>
            <div class="blog__video" data-v-41cb3b80>
             <div data-v-41cb3b80>
              <iframe type="text/html" src="https://www.youtube.com/embed/JA-5ltQ1ofw" frameborder="0" data-v-41cb3b80></iframe>
             </div>
            </div>
           </div>
           <div class="blog__article--component_wrapper" data-v-41cb3b80>
            <div class="blog__paragraph" style="clear:both;" data-v-a2f23fca data-v-41cb3b80>
             <figure class="blog__paragraph__image left" data-v-a2f23fca>
              <img src="https://cdn.paizo.com:443/a7d62ac8-7f03-00ef-f1f0-83fb8bf332e2/df11bd15-ae17-4317-ad87-60b16883b549/196_source_1761931698.png?w=300" alt="Pathfinder Second Edition Hellfire Crisis. An armored human wielding a long chain with a mace at the end battling a hellknight. " data-v-a2f23fca>
             </figure>
             <div class="blog__paragraph__text" data-v-a2f23fca>
              <h2><a href="https://store.paizo.com/pathfinder-adventure-path-hellbreakers/" data-new-window="true" target="_blank" rel="noopener noreferrer">Pathfinder Adventure Path: Hellbreakers</a></h2>
              <p><strong>Revolution awaits!</strong></p>
              <p>As war sparks between Andoran and Cheliax, the Hellbreakers League rises in Isger to wage their own war against Cheliax for the freedom of their nation. Join the Hellbreakers on daring missions, murder investigations, and prison breaks as they ­fight for a free Isger. But Cheliax is not the only enemy to deal with, as ancient foes ­and the chaos of the Hell­fire Crisis to be the perfect opportunity for their own nefarious schemes. Can the Hellbreakers protect Isger from the enemies within? Hellbreakers is a complete Path­finder campaign for 1st–9th level characters.</p>
              <p>Pathfinder Adventure Path: Hellbreakers is available in standard hardcover, special edition faux-leatherette hardcover, PDF, and Foundry VTT formats.</p>
             </div>
            </div>
           </div>
           <div class="blog__article--component_wrapper" data-v-41cb3b80>
            <div class="blog__paragraph" style="clear:both;" data-v-a2f23fca data-v-41cb3b80>
             <div class="blog__paragraph__text" data-v-a2f23fca>
              <p><br></p>
             </div>
            </div>
           </div>
           <div class="blog__article--component_wrapper" data-v-41cb3b80>
            <div class="blog__video" data-v-41cb3b80>
             <div data-v-41cb3b80>
              <iframe type="text/html" src="https://www.youtube.com/embed/jRaY5ExCV_4" frameborder="0" data-v-41cb3b80></iframe>
             </div>
            </div>
           </div>
           <div class="blog__article--component_wrapper" data-v-41cb3b80>
            <div class="blog__paragraph" style="clear:both;" data-v-a2f23fca data-v-41cb3b80>
             <figure class="blog__paragraph__image left" data-v-a2f23fca>
              <img src="https://cdn.paizo.com:443/a7d62ac8-7f03-00ef-f1f0-83fb8bf332e2/04a0f4e1-8e34-4825-b500-5d068b838ded/PZO17003-BC__88556.png?w=300" alt="Pathfinder Second Edition: Spellfinder, a silly spellmaking game by Joe Pasini. The box art is a stylized blue color with faux gold and brass decor" data-v-a2f23fca>
             </figure>
             <div class="blog__paragraph__text" data-v-a2f23fca>
              <h2><a href="https://store.paizo.com/spellfinder/" data-new-window="true" target="_blank" rel="noopener noreferrer">Spellfinder Card Game</a></h2>
              <p><strong>Makeshift magical mayhem!</strong></p>
              <p>In Spellfinder, you and your friends are student wizards at a prestigious magical university, tasked with mashing up magic words to create problem-solving spells! With tens of thousands of possible scenarios and spells, you’ll have a blast coming up with zany magical solutions to the perils that plague high fantasy townsfolk—from the mundane to the mystical—and you’ll never play the same game twice</p>
             </div>
            </div>
           </div>
           <div class="blog__article--component_wrapper" data-v-41cb3b80>
            <div class="blog__paragraph" style="clear:both;" data-v-a2f23fca data-v-41cb3b80>
             <figure class="blog__paragraph__image left" data-v-a2f23fca>
              <img src="https://cdn.paizo.com:443/a7d62ac8-7f03-00ef-f1f0-83fb8bf332e2/fb3704a1-901c-4cb7-9ce8-71f5bee9c19a/PZO18005-HC.png?w=300" alt="Pathfinder Second Edition Operation Hellmouth by Chris A. Jackson: Pathfinder iconic fighter, Valeros, and a knight dressed in silver and gold plate armor battle a huge, red scaled dragon with two large horns protruding from its temple and wrapping forward towards its open mouth." data-v-a2f23fca>
             </figure>
             <div class="blog__paragraph__text" data-v-a2f23fca>
              <h2><a href="https://store.paizo.com/operation-hellmouth-a-pathfinder-novel" data-new-window="true" target="_blank" rel="noopener noreferrer">Operation Hellmouth, A Pathfinder Novel</a></h2>
              <p>From fan-favorite fantasy author Chris A. Jackson (Pirate's Honor, Pirate's Promise, Pirate's Prophecy), Operation Hellmouth promises an unforgettable adventure of infernal plotting and family drama on the high seas, set in the award-winning Age of Lost Omens setting for the Pathfinder Roleplaying Game. Operation Hellmouth is the perfect entry point to the Hellfire Crisis event within the Pathfinder setting, a multi-year conflict that will pit the world’s most powerful nations into all-out war.</p>
             </div>
            </div>
           </div>
           <div class="blog__article--component_wrapper" data-v-41cb3b80>
            <div class="blog__paragraph" style="clear:both;" data-v-a2f23fca data-v-41cb3b80>
             <figure class="blog__paragraph__image left" data-v-a2f23fca>
              <img src="https://cdn.paizo.com:443/a7d62ac8-7f03-00ef-f1f0-83fb8bf332e2/4e02428f-d2cb-4c5f-bb06-7297c3edbaa4/PZO12009-HC.png?w=300" alt="Pathfinder Second Edition Monster Core 2: The cover art features raptors and large bat-like monsters fleeing from an armored skeletal giant looming in the background." data-v-a2f23fca>
             </figure>
             <div class="blog__paragraph__text" data-v-a2f23fca>
              <h2><a href="https://store.paizo.com/pathfinder-monster-core-2/" data-new-window="true" target="_blank" rel="noopener noreferrer">Pathfinder Monster Core 2 Pocket Edition</a></h2>
              <p>Despite how far heroes travel or how many times they save the day, there are always new monsters lurking just around the corner.&nbsp;<em>Pathfinder Monster Core 2</em>&nbsp;is a&nbsp;<strong>376-page</strong>&nbsp;hardcover bursting with brand-new creatures as well as updated Pathfinder classics waiting to find a place at your table. The lavishly illustrated tome also includes guidelines for reading monster entries and adjusting existing monsters to tailor-fit your story! This book is a must-have for Game Masters ready to bring new and exciting challenges to their games!</p>
              <p>The pocket edition presents the same content as the original hardcover in an affordable, easy-to-carry softcover.</p>
             </div>
            </div>
           </div>
           <div class="blog__article--component_wrapper" data-v-41cb3b80>
            <div class="blog__paragraph" style="clear:both;" data-v-a2f23fca data-v-41cb3b80>
             <figure class="blog__paragraph__image left" data-v-a2f23fca>
              <img src="https://cdn.paizo.com:443/a7d62ac8-7f03-00ef-f1f0-83fb8bf332e2/724c2d2e-a179-4cf9-8cd7-b5d1b6c95143/PZO21010-FM__49725.jpg?w=300" alt="Starfinder Second Edition Flip-Mat Cantina: the cover art is two maps showing off two different styled cantinas, one brightly lit and the other dark and lit with neon lights." data-v-a2f23fca>
             </figure>
             <div class="blog__paragraph__text" data-v-a2f23fca>
              <h2><a href="https://store.paizo.com/starfinder-flip-mat-cantina/" data-new-window="true" target="_blank" rel="noopener noreferrer">Starfinder Flip-Mat: Cantina</a></h2>
              <p><strong>The cantina is open!</strong></p>
              <p>Drinks and danger are on the house with&nbsp;<em>Starfinder Flip-Mat: Cantina</em>. One side of the mat shows off a neon dive bar where dirty deeds and backroom deals go down while clubgoers carouse and party. The other side of the mat features a ritzy rooftop lounge that’s perfect as the scene of a daring heist or perilous high-rise battle. Either side is perfect for when the party needs a nightlife spot to enjoy some downtime or get into trouble!</p>
             </div>
            </div>
           </div>
           <div class="blog__article--component_wrapper" data-v-41cb3b80>
            <div class="blog__paragraph" style="clear:both;" data-v-a2f23fca data-v-41cb3b80>
             <figure class="blog__paragraph__image left" data-v-a2f23fca>
              <img src="https://cdn.paizo.com:443/a7d62ac8-7f03-00ef-f1f0-83fb8bf332e2/e4f2e92f-a94c-458b-b938-224f0d5357f5/PZO11035-FM__01068.jpg?w=300" alt="Pathfinder Second Edition Flip-Mat: Grand Mansion Multi-Pack. The cover art features a spread of four different maps showing off the interior and exterior grounds of large sprawling mansions" data-v-a2f23fca>
             </figure>
             <div class="blog__paragraph__text" data-v-a2f23fca>
              <h2><a href="https://store.paizo.com/pathfinder-flip-mat-grand-mansion-multi-pack" data-new-window="true" target="_blank" rel="noopener noreferrer">Pathfinder Flip-Mat: Grand Mansion Multi-Pack</a></h2>
              <p>Whether your party is attending a fancy gala for a noted celebrity or they’re planning the heist of a lifetime, you might need a well-appointed mansion for them to explore, and this Pathfinder Flip-Mat Multi-Pack has you covered. Two of the four sides show the ground floor and upper floors of the mansion, while the other two depict the basement and the lavish garden grounds. Instead of brushing up on your architecture skills, spread out&nbsp;<em>Pathfinder Flip-Mat: Grand Mansion Multi-Pack</em>&nbsp;on your table and get to the adventure!</p>
             </div>
            </div>
           </div>
           <div class="blog__article--component_wrapper" data-v-41cb3b80>
            <div class="blog__paragraph" style="clear:both;" data-v-a2f23fca data-v-41cb3b80>
             <figure class="blog__paragraph__image left" data-v-a2f23fca>
              <img src="https://cdn.paizo.com:443/a7d62ac8-7f03-00ef-f1f0-83fb8bf332e2/bac89e17-92ae-4cf6-b1e9-6fbcf0024e16/PZO260117E__35826.jpg?w=300" alt="Starfinder Society Scenario 1-17: Corpse Fleet Conflict. The cover is two images, a large background illustration and a smaller single character overlayed above that image. The background image is First Seeker Sarmak and fellow Starfinder Zizenzi fighting off robots in front of a massive, alien starship. It’s dark, and the Starfinders are illuminated by aerial spotlights from an unknown source. The overlaying image is of a corpsefolk wearing the uniform of an officer in the Corpse Fleet casts a spell, sending a disk of condensed gravity flying through the air. She wears her stringy hair up in a tight bun and keeps her uniform pristine. Some of her teeth and a piece of her mandible are visible through the gaps in her rotting cheek." data-v-a2f23fca>
             </figure>
             <div class="blog__paragraph__text" data-v-a2f23fca>
              <h2><a href="https://store.paizo.com/starfinder-society-scenario-1-17-corpse-fleet-conflict/" data-new-window="true" target="_blank" rel="noopener noreferrer">Starfinder Society Scenario #1-17: Corpse Fleet Conflict</a></h2>
              <p>When a team of Starfinders happen upon a civilian starship under attack by the Corpse Fleet in the Diaspora, it’s up to them to heroically drive off the undead attackers, board the starship, and rescue any survivors. But as the motives behind this attack come to light, the PCs find themselves embroiled in a corporate conspiracy with deadly stakes.<br><br>
                Will you survive this conflict with the Corpse Fleet?</p>
             </div>
            </div>
           </div>
           <div class="blog__article--component_wrapper" data-v-41cb3b80>
            <div class="blog__paragraph" style="clear:both;" data-v-a2f23fca data-v-41cb3b80>
             <figure class="blog__paragraph__image left" data-v-a2f23fca>
              <img src="https://cdn.paizo.com:443/a7d62ac8-7f03-00ef-f1f0-83fb8bf332e2/5d0e9099-8eb4-42f6-99fe-d79d3608f1f0/PZO160713E__41749.jpg?w=300" alt="Pathfinder Society Scenario #7-10: Shattered Blades: The background art is of Zarta Dralneenm dressed in a smart red jacket, as she moves pieces around a battle map while her wayfinder illuminates the scene, with Pathfinders and Andoren soldiers moving in the background of a busy war camp. The overlaying art is of a tall bald human with a spiked head dress, wearing leather and wielding chains" data-v-a2f23fca>
             </figure>
             <div class="blog__paragraph__text" data-v-a2f23fca>
              <h2><a href="https://store.paizo.com/pathfinder-society-scenario-7-13-ancient-beyond-imagining/" data-new-window="true" target="_blank" rel="noopener noreferrer">Pathfinder Society Scenario #7-13: Ancient Beyond Imagining</a></h2>
              <p>The self-proclaimed Runelord and newly minted venture-captain Zinthyra Tannol has finally gotten her lodge set up within Kaer Maga. The purpose is to explore a site beneath the City of Strangers that an Azlanti wizard sealed, and which hasn't been opened since. While Venture-Captain Tannol is an expert on all things Azlanti and Thassilonian, she does not know what lies beyond the door, nor why it was sealed. Thus, it falls to some of the most experienced agents to explore this site and see what can be learned.</p>
             </div>
            </div>
           </div>
           <div class="blog__article--component_wrapper" data-v-41cb3b80>
            <div class="blog__paragraph" style="clear:both;" data-v-a2f23fca data-v-41cb3b80>
             <figure class="blog__paragraph__image left" data-v-a2f23fca>
              <img src="https://cdn.paizo.com:443/a7d62ac8-7f03-00ef-f1f0-83fb8bf332e2/a66fac83-637e-4b9b-aa94-b3983415ec41/PZO260118E__54421.jpg?w=300" alt="Starfinder Society: Invasion's Edge, Midnights in Maro. The cover is two images, a large background illustration and a smaller single character overlayed above that image. The background image is First Seeker Sarmak and fellow Starfinder Zizenzi fighting off robots in front of a massive, alien starship. It’s dark, and the Starfinders are illuminated by aerial spotlights from an unknown source. The overlaying image is of a robotic orb with three claw-like appendages, lifting two sharp knives over its body" data-v-a2f23fca>
             </figure>
             <div class="blog__paragraph__text" data-v-a2f23fca>
              <h2><a href="https://store.paizo.com/starfinder-society-scenario-1-18-midnights-in-maro/" data-new-window="true" target="_blank" rel="noopener noreferrer">Starfinder Society Scenario #1-18: Midnights in Maro</a></h2>
              <p>As the danger posed by the Wreck of the Returned increases and the enemies arrayed against the Starfinder Society grow bolder, First Seeker Sarmak dispatches a team to the Akitonian city of Maro to find Nima, a former member of a mercenary company called the Rust Wraiths who were among the first to explore the Wreck of the Returned. Nima has gone into hiding, as she’s being hunted by numerous foes allied with the Wreck, including nodocites, converted, and agents of the Functionary. If the PCs can find and protect Nima from their shared enemies, Nima can give the PCs valuable information on the Wreck of the Returned, including insight into the motives of the mysterious being at its heart: Elovai.</p>
             </div>
            </div>
           </div>
           <div class="blog__article--component_wrapper" data-v-41cb3b80>
            <div class="blog__paragraph" style="clear:both;" data-v-a2f23fca data-v-41cb3b80>
             <figure class="blog__paragraph__image left" data-v-a2f23fca>
              <img src="https://cdn.paizo.com:443/a7d62ac8-7f03-00ef-f1f0-83fb8bf332e2/d784573d-1e57-4e37-8fa8-77f6b433c87f/PZO160714E__49791.jpg?w=300" alt="Pathfinder Society The year of the Battle's Spark: Brastlewark at War, Part 2: The Gnome Liberation. The background art is of Zarta Dralneenm dressed in a smart red jacket, as she moves pieces around a battle map while her wayfinder illuminates the scene, with Pathfinders and Andoren soldiers moving in the background of a busy war camp. The overlaying art is of a dog-like monster with purple skin, large teeth, and glowing red eyes" data-v-a2f23fca>
             </figure>
             <div class="blog__paragraph__text" data-v-a2f23fca>
              <h2><a href="https://store.paizo.com/pathfinder-society-scenario-7-14-brastlewark-at-war-part-2-the-gnome-liberation/" data-new-window="true" target="_blank" rel="noopener noreferrer">Pathfinder Society Scenario #7-14: Brastlewark at War, Part 2: The Gnome Liberation</a></h2>
              <p>A group of gnomes fleeing harsher restrictions in Brastlewark, one of the largest gnome settlements, as well as one nominally ruled by a Thrune sympathizer, has brought terrible news—the self-proclaimed ruler of Brastlewark, King Drum Thornfiddle, has been using Hellknight enforcers to crack down on the gnome citizens, as well as forcing many to use their primal magics to mix with diabolical ones in the creation of weapons of war, such as the Jaws of Hell, which saw use in the Battle of Hellknight Hill.</p>
              <p>The Andoran Army has pushed far enough into Cheliax that destruction of these facilities and liberation of the gnomes is now possible, but they can't do both. It's up to you and your fellow Pathfinders to see that the gnomes are safe, and that they can know true freedom, away from the tyranny of Cheliax and House Thrune.</p>
             </div>
