               </svg>
              </div><span data-v-7a806b22>Back to Blog</span></a>
            </div>
            <section class="tags" data-v-7a806b22>
             <svg aria-hidden="true" focusable="false" data-prefix="fas" data-icon="tags" role="img" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 512" class="fa-lg svg-inline--fa fa-tags fa-w-20" data-v-7a806b22>
              <path fill="currentColor" d="M497.941 225.941L286.059 14.059A48 48 0 0 0 252.118 0H48C21.49 0 0 21.49 0 48v204.118a48 48 0 0 0 14.059 33.941l211.882 211.882c18.744 18.745 49.136 18.746 67.882 0l204.118-204.118c18.745-18.745 18.745-49.137 0-67.882zM112 160c-26.51 0-48-21.49-48-48s21.49-48 48-48 48 21.49 48 48-21.49 48-48 48zm513.941 133.823L421.823 497.941c-18.745 18.745-49.137 18.745-67.882 0l-.36-.36L527.64 323.522c16.999-16.999 26.36-39.6 26.36-63.64s-9.362-46.641-26.36-63.64L331.397 0h48.721a48 48 0 0 1 33.941 14.059l211.882 211.882c18.745 18.745 18.745 49.137 0 67.882z" data-v-7a806b22></path>
             </svg><a href="/blog/tags/humble_bundle" class="link--tag" data-v-7a806b22>Humble Bundle</a><a href="/blog/tags/pathfinder_roleplaying_game" class="link--tag" data-v-7a806b22>Pathfinder Roleplaying Game</a><a href="/blog/tags/pathfinder_adventure_path" class="link--tag" data-v-7a806b22>Pathfinder Adventure Path</a><a href="/blog/tags/agents_of_edgewatch" class="link--tag" data-v-7a806b22>Agents of Edgewatch</a><a href="/blog/tags/pathfinder_second_edition" class="link--tag" data-v-7a806b22>Pathfinder Second Edition</a>
            </section>
           </div>
           <div class="blog__article--component_wrapper" data-v-7a806b22>
            <div class="blog__paragraph" data-v-a2f23fca data-v-7a806b22>
             <div class="blog__paragraph__text" data-v-a2f23fca>
              <p>Today, Paizo is proud to kick off the <a href="https://www.humblebundle.com/books/pathfinder-second-edition-bundle-at-center-world-paizo-inc-books" data-new-window="true" target="_blank" rel="noopener noreferrer">Pathfinder Second Edition Bundle at the Center of the World</a> with our partners at Humble Bundle. This highly discounted intro bundle gives players and Game Masters everything they need to get started in Pathfinder Second Edition with the full Agents of Edgewatch Adventure Path and tons of supporting materials perfect for bringing the teeming metropolis of Absalom to life. And best of all, a portion of all sales goes to help Comic Books for Kids (at checkout, you can select what percentage of your bundle goes to the charity, Humble Bundle, and Paizo).</p>
             </div>
             <figure class="blog__paragraph__image below" data-v-a2f23fca>
              <img src="https://cdn.paizo.com:443/a7d62ac8-7f03-00ef-f1f0-83fb8bf332e2/40003101-a357-4e6d-b3b8-4fbed244e99c/pathfindersecondeditionbundleatcenterworldpaizoinc_bookbundle-logo-dark.png?w=650" data-v-a2f23fca><img src="https://cdn.paizo.com:443/a7d62ac8-7f03-00ef-f1f0-83fb8bf332e2/c463cc44-749d-48e5-beb1-15a1c76216d6/120720_ComicbooksForKidsBanner.jpg?w=650" alt="Red Banner reading 'Comic Books for Kids! Providing comic books to kids in hospitals and cancer centers' the text in accompanied by an image of a child in a hospital bed reading from a stack of comics" data-v-a2f23fca>
             </figure>
            </div>
           </div>
           <div class="blog__article--component_wrapper" data-v-7a806b22>
            <div class="blog__paragraph" data-v-a2f23fca data-v-7a806b22>
             <div class="blog__paragraph__text" data-v-a2f23fca>
              <p>The basic $5 bundle is the perfect toe in the proverbial Pathfinder water with the remastered <em>Pathfinder Beginner Box</em>; <em>Pathfinder Player Core</em>; <em>Pathfinder GM Core</em>; the <em>Pathfinder Core GM Screen </em>for quick rules reference; the <em>City of Lost Omens Poster Map Folio</em>; and the Absalom-based adventure, <em>Little Trouble in Big Absalom</em>. Additionally, you’ll get the “Lord of Penance” short story and <em>Gears of Faith </em>novel, both set in the City of Lost Omens! This $117 value is yours for only $5.</p>
             </div>
             <figure class="blog__paragraph__image below" data-v-a2f23fca>
              <img src="https://cdn.paizo.com:443/a7d62ac8-7f03-00ef-f1f0-83fb8bf332e2/4ac56ddd-b0d1-4098-adbe-abf3a6d60fef/PZO2106.png?w=300" alt="Pathfinder Beginner Box (Remastered Edition): The Box cover art is the Pathfinder Iconics battle a green dragon flying low above their heads." data-v-a2f23fca><img src="https://cdn.paizo.com:443/a7d62ac8-7f03-00ef-f1f0-83fb8bf332e2/2ac579ae-3c54-4c29-b415-7763ec28891a/PZO12001_PEPathfinderPlayerCore.png?w=300" alt="Pathfinder Remaster Player Core: Pathfinder iconics battle a large red dragon on the steps of a crumbling ruin" data-v-a2f23fca><img src="https://cdn.paizo.com:443/a7d62ac8-7f03-00ef-f1f0-83fb8bf332e2/3d3ccbd5-ce18-4b8f-b64e-a6a5cf72816e/PZO9305_CityofLostOmens_PosterMapFolio.jpg?w=300" alt="Pathfinder Second Edition City of Lost Omens Poster Map Folio. The cover art is a top down view of the large Absalom City, its port, and surrounding land" data-v-a2f23fca>
             </figure>
            </div>
           </div>
           <div class="blog__article--component_wrapper" data-v-7a806b22>
            <div class="blog__paragraph" data-v-a2f23fca data-v-7a806b22>
             <div class="blog__paragraph__text" data-v-a2f23fca>
              <p>At the $15 tier, you’ll get everything above plus the <em>Pathfinder Agents of Edgewatch Pawn Collection</em>; <em>Pathfinder Quest: The Broken Scales</em>; and a complete Absalom-based story arc from the Pathfinder Society Organized Play campaign, including scenarios 3–01<em> Intro: Year of Shattered Sanctuaries</em>; 3–06 <em>Struck by Shadows</em>; 3–17 <em>Dreams of a Dustbound Isle</em>; 3–19 <em>Mean Streets of Shadow Absalom</em>; as well as bonus Absalom scenarios 3–18 <em>Dacilane Academy’s Delightful Disaster</em>; 4–16 <em>Dacilane Academy’s First Great Prank War</em>; and 5–07 <em>Sewer Dragon Crisis</em>. This tier also includes PDFs of all the Pathfinder map products featured in these scenarios, including <em>Pathfinder Flip-Tiles: Dungeon Starter Set</em> and <em>Urban Sewers Expansion</em>; <em>Pathfinder Flip-Mats: Bigger Island</em>, <em>City Sites Multi-Pack</em>, <em>Haunted Dungeon</em>, <em>Haunted Dungeons Multi-Pack</em>, <em>Pathfinder Lodge</em>, <em>Tavern Multi-Pack</em>, and <em>Theater</em>. This $161 value, combined with the previous tier, nets you nearly $280 in Pathfinder releases for just $15.</p>
             </div>
             <figure class="blog__paragraph__image below" data-v-a2f23fca>
              <img src="https://cdn.paizo.com:443/a7d62ac8-7f03-00ef-f1f0-83fb8bf332e2/3fcdd900-205d-473a-b6b6-ef6a4c7a0cea/PZO1042.png?w=300" alt="Pathfinder Agents of Edgewatch Pawn Collection" data-v-a2f23fca><img src="https://cdn.paizo.com:443/a7d62ac8-7f03-00ef-f1f0-83fb8bf332e2/493b2d4b-fa64-4a47-b799-0df39a43d50e/PZOPFQ0010E_58439.jpg?w=300" alt="Year of the Open Road: Pathfinder Society The Broken Scales by Amber Stewart. A lizard-folk wearing a headdress with a large blue gem in the center stands at the ready with a sword and shield " data-v-a2f23fca><img src="https://cdn.paizo.com:443/a7d62ac8-7f03-00ef-f1f0-83fb8bf332e2/98eb87b3-3464-456b-84e1-1f056bb0d5d6/PZO30111.png?w=300" alt="Pathfinder Second Edition Flip-Mat: City Sites Multi-Pack. The cover art is a stack of multiple square tiled maps showing off different parts of a city" data-v-a2f23fca>
             </figure>
            </div>
           </div>
           <div class="blog__article--component_wrapper" data-v-7a806b22>
            <div class="blog__paragraph" data-v-a2f23fca data-v-7a806b22>
             <div class="blog__paragraph__text" data-v-a2f23fca>
              <p>At the $30 tier, you’ll get everything above plus PDFs of <em>Pathfinder Player Core 2</em>;<em> Pathfinder NPC Core</em>; <em>Pathfinder Monster Core</em>; <em>Absalom, City of Lost Omens</em>; <em>Pathfinder Lost Omens Grand Bazaar</em>; <em>Pathfinder Lost Omens Pathfinder Society Guide,</em> and the full six-part Agents of Edgewatch Adventure Path, including the player's guide, which takes characters from 1st to 20th level as they work to rid the City of Lost Omens of a terrible criminal threat. Additionally, you’ll get <em>Pathfinder Society Scenario 4–07: A Most Wondrous Exchange!</em>, which features Absalom’s popular Grand Bazaar. All told, this $308 value brings the bundle’s total digital MSRP to $588.62.</p>
             </div>
             <figure class="blog__paragraph__image below" data-v-a2f23fca>
              <img src="https://cdn.paizo.com:443/a7d62ac8-7f03-00ef-f1f0-83fb8bf332e2/3095be70-b016-495d-8e8f-2c9d367e59d6/PZO9304.jpg?w=300" alt="Absalom City of Lost Omens: The iconics battle red robed cultists in a city square while a large monster lurks behind them" data-v-a2f23fca><img src="https://cdn.paizo.com:443/a7d62ac8-7f03-00ef-f1f0-83fb8bf332e2/6c2380f1-9997-42c2-ac7e-b1363b6735e0/PZO12007_PEPathfinder_NPCCore.png?w=300" alt="Pathfinder Second Edition Remaster NPC Core Pocket Edition: a large crowd on the steps of a fancy building. A finely dressed man gestures out as he speaks to the crowd while his guards keep the crowd at bay." data-v-a2f23fca><img src="https://cdn.paizo.com:443/a7d62ac8-7f03-00ef-f1f0-83fb8bf332e2/1af36c03-91ae-4e40-96c0-89d4a503d352/PZO90157_DevilattheDreamingPalace.png?w=300" alt="Pathfinder Second Edition Agents of Edgewatch Adventure Path: Devil at the Dreaming Palace by Jamie L Sutter. The cover art features Pathfinder Iconics Lem the bard and Sajan the monk battling a monster in a town market." data-v-a2f23fca>
             </figure>
            </div>
           </div>
           <div class="blog__article--component_wrapper" data-v-7a806b22>
            <div class="blog__paragraph" data-v-a2f23fca data-v-7a806b22>
             <div class="blog__paragraph__text" data-v-a2f23fca>
              <p>For fans of physical releases, we are also offering a standard hardcover edition of <em>Pathfinder NPC Core </em>for an additional $15 ($45 or more total donation to Humble Bundle) plus shipping and handling. This is a $69.99 book and the best deal you’re going to get on it, especially if you’re already buying the $30 digital bundle.</p>
              <p>The City of Lost Omens awaits, so don’t miss your ticket to adventure! The Pathfinder Second Edition Bundle at the Center of the World runs through 11 a.m. PDT on April 30, 2026.</p>
              <h3>Get the <a href="https://www.humblebundle.com/books/pathfinder-second-edition-bundle-at-center-world-paizo-inc-books" data-new-window="true" target="_blank" rel="noopener noreferrer"><strong>Pathfinder Second Edition Bundle at the Center of the World</strong></a> today!</h3>
              <h3><a href="https://paizo.com/threads/rzs80jk1?NEW-BLOG-Explore-the-City-of-Lost-Omens-for">Excited for the Humble Bundle? Join the conversation on the Paizo Forums!</a></h3>
             </div>
            </div>
           </div>
