           <div class="blog__article--component_wrapper" data-v-7a806b22>
            <div class="blog__paragraph" data-v-a2f23fca data-v-7a806b22>
             <div class="blog__paragraph__text" data-v-a2f23fca>
              <p>Paizo Printables is now live! You can sign up now to get over 35 3D printable miniature files for some of your favorite Pathfinder characters and creatures hosted on MyMiniFactory.</p>
             </div>
             <figure class="blog__paragraph__image below" data-v-a2f23fca>
              <img src="https://cdn.paizo.com:443/a7d62ac8-7f03-00ef-f1f0-83fb8bf332e2/c5721aef-ba1f-4b6c-8b4b-65f2823b7b56/Paizo_Pathfinder_Printables_Cover_Image.jpg" alt="Paizo Printables Pathfinder Minis: on the left of the banner is an illustration of the Pathfinder iconics battling a large green dragon. On the right of the banner is 3D miniatures renderings of the Pathfinder iconics" data-v-a2f23fca>
              <figcaption class="style--match_paragraph" data-v-a2f23fca>
               <h1><a href="https://www.myminifactory.com/?bonusCampaign=7?utm_source=Creator&amp;utm_medium=Newsletter&amp;utm_campaign=01-04-2026_IC_PaizoPrintables_Campaign_MMF&amp;pk_campaign=01-04-2026_IC_PaizoPrintables_Campaign_MMF&amp;pk_kwd=Newsletter" data-new-window="true" target="_blank" rel="noopener noreferrer">Back Paizo Printables Now!</a></h1>
              </figcaption>
             </figure>
            </div>
           </div>
           <div class="blog__article--component_wrapper" data-v-7a806b22>
            <div class="blog__paragraph" data-v-a2f23fca data-v-7a806b22>
             <div class="blog__paragraph__text" data-v-a2f23fca>
              <p>Along with the miniatures, we’re also including new PDFs built for Paizo Printables with short adventures, stat blocks for miniatures, tactics, and more! Sign up now to also get a digital copy of <em>Pathfinder Player Core </em>and a digital copy of the <em>Pathfinder Beginner Box </em>(remastered). We’ve also partnered with several companies to provide discounts to your favorite hobby spaces, including a one-time 15% discount code off paizo.com that you’ll receive upon sign-up!</p>
              <p>On top of everything, MyMiniFactory is also providing a special link that if you sign up with, you’ll get $10 in store credit on the MyMiniFactory platform. You can use credit right away to purchase some of the amazing content already available from Paizo Printables (or other stores on the platform).</p>
              <p>Join on <a href="https://www.myminifactory.com/?bonusCampaign=7?utm_source=Creator&amp;utm_medium=Newsletter&amp;utm_campaign=01-04-2026_IC_PaizoPrintables_Campaign_MMF&amp;pk_campaign=01-04-2026_IC_PaizoPrintables_Campaign_MMF&amp;pk_kwd=Newsletter">MyMiniFactory</a> or <a href="https://www.patreon.com/cw/PaizoPrintables">Patreon</a> today and start your Paizo Printables adventure!</p>
              <p>You can learn more about Paizo Printables by <a href="http://www.paizo.com/paizoprintables">Clicking Here</a>.</p>
              <h3><a href="https://paizo.com/threads/rzs7ycuw?NEW-BLOG-Paizo-Printables-Live-Now-3D">Build your adventure and join the conversation over on the Paizo Forums!</a></h3>
             </div>
             <figure class="blog__paragraph__image below" data-v-a2f23fca>
              <img src="https://cdn.paizo.com:443/a7d62ac8-7f03-00ef-f1f0-83fb8bf332e2/eab6074a-6dee-4cf3-b871-d8f5d2aa641a/PaizoPrintables_GrowingWelcomePack_01.png" alt="Paizo Printables Growing Welcome Pack: various sized minis of the pathfinder iconics and monsters over a stylized background" data-v-a2f23fca><img src="https://cdn.paizo.com:443/a7d62ac8-7f03-00ef-f1f0-83fb8bf332e2/3ed655ee-6444-4a7a-8b5a-d9a4b880a12c/PaizoPrintables_Mastercrafted_Releases_01.png" alt="Paizo Printables Mastercrafted Releases: a lineup of a various monsters and humanoid characters including a large, tentacle armed, sarglagon looming in the background" data-v-a2f23fca><img src="https://cdn.paizo.com:443/a7d62ac8-7f03-00ef-f1f0-83fb8bf332e2/c67c3bd0-82a3-4dea-b0d2-2e6911dc0c06/PaizoPrintables_ExceptionalLoot_01.png" alt="Paizo Printables Exceptional Loot: A lineup of miniatures, printer resin, paints, and pathfinder rulebooks" data-v-a2f23fca>
             </figure>
