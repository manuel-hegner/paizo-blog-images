           <div class="blog__article--component_wrapper" data-v-7a806b22>
            <div class="blog__paragraph" data-v-a2f23fca data-v-7a806b22>
             <div class="blog__paragraph__text" data-v-a2f23fca>
              <p>Hello, Starfinders!</p>
              <p>As our first season of Starfinder Society approaches its conclusion, and we prepare to bring <em>Invasion’s Edge</em> to an end, it’s time to cast our eyes to the future to see what next season has in store!</p>
             </div>
             <figure class="blog__paragraph__image below" data-v-a2f23fca>
              <img src="https://cdn.paizo.com:443/a7d62ac8-7f03-00ef-f1f0-83fb8bf332e2/5668fedf-a4ad-483c-8ea2-39380ad034ac/SFS_S2HalfPager_BeyondtheBlood.jpg" alt="Starfinder Society Season 2 Half Pager Beyond the Blood Door, artist Julio Reyna: A roiling sphere of magical energy hovers over the streets of Absalom Station, spawning dangerous, dog-like monsters formed of bone and blood. Venture-captains Arvin and Naiaj stand ready to face this onslaught. Arvin, a male lashunta with a green mohawk, casts out his hands, sending a blast of holy magic at the creatures. Naiaj, a female bleachling gnome, fires a zero cannon at them, which shoots a line of ice. They look stern and heroic while battling to save the citizens of Absalom Station from dangerous bloodspawned beasts." data-v-a2f23fca>
              <figcaption class="style--match_paragraph" data-v-a2f23fca>
               <p>Illustration by Julio Reyna</p>
              </figcaption>
             </figure>
            </div>
           </div>
           <div class="blog__article--component_wrapper" data-v-7a806b22>
            <div class="blog__paragraph" data-v-a2f23fca data-v-7a806b22>
             <div class="blog__paragraph__text" data-v-a2f23fca>
              <p>Absalom Station is the heart of the Pact Worlds, a hub of culture and commerce, and a safe harbor in a dangerous Universe. Among its most identifiable landmarks is the Lorespire Complex, base of operations for the Starfinder Society.</p>
              <p>Absalom Station’s peace and prosperity is shattered when a mysterious transmission is seen across every screen on Absalom Station: an aged dwarven man with an eyepatch bellowing something rendered incomprehensible by glitching audio and garbled interference. Moments later, large spheres of roiling magical energy appear across Absalom Station, each raining blood on their surroundings. Where blood lands, monsters are spawned, which violently turn on the populace.</p>
              <p>Absalom Station is under attack and it’s up to you to battle bloodspawned beasts to put a stop to it! But as the dust settles and the blood dries, it’s clear this strange attack was a part of something greater. Someone wants to make Absalom Station bleed…</p>
              <p><br></p>
              <h2>Welcome to <strong>Beyond the Blood Door</strong>!</h2>
              <p>Beyond the Blood Door is the second season of the Starfinder Society for Starfinder Second Edition! It’s a story of urban intrigue, heroic rescues, uncovered mysteries, and profane magic that pits the Starfinder Society against a villainous foe and their followers. If you keep a close eye out, you might even uncover some clues about the Gap and the fate of fabled lost Golarion.</p>
              <p>Beyond the Blood Door begins at GenCon 2026 with <em>Starfinder Society Scenario #2-01: The First Cut</em>, a 1st- through 2nd-level adventure written by Matt Duvall!</p>
             </div>
             <figure class="blog__paragraph__image below" data-v-a2f23fca>
              <img src="https://cdn.paizo.com:443/a7d62ac8-7f03-00ef-f1f0-83fb8bf332e2/f6d1b0a8-e913-4b21-abab-62b55f1c2a30/SFS_S2SYMBOL_BeyondTheBlood.png?w=500" alt="Starfinder Society Year 2 Symbol Beyond the Blood Door, artist Nicolas Espinoza: A stylized image of Absalom Station has been vandalized with red graffiti that depicts monstrous teeth gnawing on the station. The graffiti drips, looking unsettlingly like blood." data-v-a2f23fca>
             </figure>
            </div>
           </div>
           <div class="blog__article--component_wrapper" data-v-7a806b22>
            <div class="blog__paragraph" data-v-a2f23fca data-v-7a806b22>
             <div class="blog__paragraph__text" data-v-a2f23fca>
              <p>We’re launching this season alongside the <em>Beyond the Blood Door Player’s Guide</em>, a quick start guide for Starfinder Society that gives players all the information they need to get started in the Starfinder Society, as well as new backgrounds tied to this season and one new ancestry that calls Absalom Station home. …But we’ll keep that ancestry a secret for now!</p>
              <p>This season you’ll also see a few new additions to the campaign, including new boons in our boon store and a generic adventure sanctioning document, which will allow players to gain XP for their Starfinder Society characters while playing longer Starfinder adventures.</p>
              <p>That’s all the news I’ve got for you today, Starfinders, but I look forward to sharing more about Beyond the Blood Door in the coming months. Until then, I hope you enjoy the climactic conclusion to Invasion’s Edge!</p>
              <p>Take care of each other out there, Starfinders!</p>
              <p><br></p>
              <p><strong>Jessica Catalan<br></strong><em>Starfinder Society Developer</em></p>
              <p><br></p>
