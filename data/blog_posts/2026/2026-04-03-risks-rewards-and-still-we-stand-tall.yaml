           <div class="blog__article--component_wrapper" data-v-7a806b22>
            <div class="blog__paragraph" data-v-a2f23fca data-v-7a806b22>
             <div class="blog__paragraph__text" data-v-a2f23fca>
              <p>Time certainly does fly, and it has flown us to the final days of the Risks &amp; Rewards Playtest! We’ve seen a steady flow of feedback so far, but if you haven’t gotten yours in it, now is the time. Come next Friday, April 10, the playtest will be closed!</p>
              <p>Those of you who have been enjoying the playtest might be wondering how the daredevil and the slayer will change in their final iterations. While we haven’t yet begun that work, there a couple of things that we are looking at improving in the coming months. First, we are going to reconsider some of the restrictions on the daredevil, granting them a bit more freedom in combat to do the things they love to do. Second, we are going to keep a close eye on the slayer’s consistency across game styles to ensure one doesn’t become the strongest choice. Both will likely involve changes both large and small throughout each class.</p>
             </div>
             <figure class="blog__paragraph__image below" data-v-a2f23fca>
              <img src="https://cdn.paizo.com:443/a7d62ac8-7f03-00ef-f1f0-83fb8bf332e2/280b6890-f2b8-4253-84e6-73cde9bca6a2/PZO90164_AdventurerOpener_1500x2000.jpg?w=600" alt="Art by Cristoph Peters. Two slug-like monsters, called grothluts, block a long winding staircase down into a dungeon." data-v-a2f23fca>
              <figcaption class="style--match_paragraph" data-v-a2f23fca>
               <p>A pair of grothluts guard a foreboding staircase. Art by Cristoph Peters.</p>
              </figcaption>
             </figure>
            </div>
           </div>
           <div class="blog__article--component_wrapper" data-v-7a806b22>
            <div class="blog__paragraph" data-v-a2f23fca data-v-7a806b22>
             <div class="blog__paragraph__text" data-v-a2f23fca>
              <p>So take this final week to submit your feedback on these two new classes at <a href="https://www.surveymonkey.com/r/RisksAndRewardsClassSurvey" data-new-window="true" target="_blank" rel="noopener noreferrer">the class survey</a> and <a href="https://www.surveymonkey.com/r/RisksAndRewardsOpenResponse" data-new-window="true" target="_blank" rel="noopener noreferrer">the open response survey</a>! Once the survey is closed, we’ll need some time to collect and pore over the data before we can polish off these classes. And be sure to keep an eye on your socials for the eventual announcement of the book they will appear in!</p>
              <p><strong>Jason Keeley (he/him)<br></strong><em><strong>Senior Designer</strong></em></p>
              <h3><a href="https://paizo.com/threads/rzs7z6y1?NEW-BLOG-Risks-and-Rewards-Playtest-Has-One">Once you've submitted your feedback in the surveys, don't forget to join the conversation on the Paizo Forums!</a></h3>
             </div>
