           <div class="blog__article--component_wrapper" data-v-7a806b22>
            <div class="blog__paragraph" data-v-a2f23fca data-v-7a806b22>
             <div class="blog__paragraph__text" data-v-a2f23fca>
              <p>First off, Paizo and Titan Forge would like to thank everyone for their overwhelming support of the newly launched Paizo Printables line. This has exceeded our expectations, and we’re so excited to continue providing new 3D-printable miniatures, as well as exciting new content in the months to come.&nbsp;</p>
              <p>Today, I wanted to talk a bit about what you can expect in Month 2 for Paizo Printables and provide a preview of the months to follow.&nbsp;</p>
              <p>What You Can Get Now!&nbsp;</p>
              <p>Remember, you still have a chance to back Paizo Printables TODAY! If you do so before May 1st, you’ll get access to all the initial files, including the start of the Hellfire Crisis season, as well as being counted for our 3-month loyalty reward that will be released during Month 3—which includes Queen Abrogail Thrune and a particularly “huge” miniature.&nbsp;</p>
              <h3><a href="https://www.myminifactory.com/users/PaizoPrintables?show=tribe" data-new-window="true" target="_blank" rel="noopener noreferrer">&nbsp;MyMiniFactory</a><strong> |</strong>&nbsp;<a href="https://www.patreon.com/cw/PaizoPrintables" data-new-window="true" target="_blank" rel="noopener noreferrer"><strong>Patreon</strong></a></h3>
              <p><br></p>
              <p><br></p>
              <h2>&nbsp;Month 2 Releases&nbsp;</h2>
              <p>Starting in May, backers of Paizo Printables are set to receive the second wave of Hellfire Crisis miniatures. This incredible set includes some stunning miniature sculpts:&nbsp;</p>
              <ul>
               <li>Andoren Soldier (3 variants)&nbsp;</li>
               <li>Chelaxian Solder (3 variants)&nbsp;</li>
               <li>Hellbreaker&nbsp;</li>
               <li>Gylou (Handmaiden Devil)&nbsp;</li>
               <li>Phistophilus (Contract Devil)&nbsp;</li>
               <li>Talmandor&nbsp;</li>
              </ul>
              <p>With troops to supplement either side of the Andoran-Cheliax war, this set also provides yet more devils for GMs to use in their campaigns. The centerpiece of this month is Talmandor himself, a large celestial who is also the patron of the nation of Andoran—a centerpiece for any Andoran force and a notable presence in the Hell’s Destiny Adventure Path.&nbsp;</p>
             </div>
             <figure class="blog__paragraph__image below" data-v-a2f23fca>
              <img src="https://cdn.paizo.com:443/a7d62ac8-7f03-00ef-f1f0-83fb8bf332e2/005afcec-33df-4647-be85-4966cec61884/PaizoPrintables_1g3.png?w=500" alt="Four miniatures of different Pathfinder fiends including a tall humanoid with wings for arms and taloned feet, a humanoid being with tentacles for hair and legs, a nephilim surrounded by scrolls, and a human dressed in plate armor, holding a sword." data-v-a2f23fca><img src="https://cdn.paizo.com:443/a7d62ac8-7f03-00ef-f1f0-83fb8bf332e2/974328d8-2aba-408a-adf7-8f0503217f20/PaizoPrintables_3g1.png?w=500" alt="A lineup of pathfinder miniatures including three fully armored soldiers armed with tridents and three soldiers dressed in fine but light uniforms wielding swords" data-v-a2f23fca>
             </figure>
            </div>
           </div>
           <div class="blog__article--component_wrapper" data-v-7a806b22>
            <div class="blog__paragraph" data-v-a2f23fca data-v-7a806b22>
             <div class="blog__paragraph__text" data-v-a2f23fca>
              <p>&nbsp;<em>**Salesman Voice Engaged**&nbsp;</em></p>
              <p>“BUT THAT’S NOT ALL!”&nbsp;</p>
              <p>Backers are also set to receive a large-sized upgrade to the Welcome Pack, including five additional creatures, with four of them in the large size category. These new miniatures include:&nbsp;</p>
              <ul>
               <li>Arboreal Warden&nbsp;</li>
               <li>Balisse Angel&nbsp;</li>
               <li>Leukodaemon&nbsp;</li>
               <li>Rekhep Archon&nbsp;</li>
               <li>Vidileth Alghollthu&nbsp;</li>
              </ul>
              <p>These are some serious heavy hitters to add to your games! I, personally, really enjoy the scale of the Arboreal Warden and the dynamic posing of the Vidileth (which comes with its own cool unique base). We’ve heard the requests for larger creatures, and this update is set to provide!&nbsp;</p>
             </div>
             <figure class="blog__paragraph__image below" data-v-a2f23fca>
              <img src="https://cdn.paizo.com:443/a7d62ac8-7f03-00ef-f1f0-83fb8bf332e2/c63af9cf-7c06-4dc2-90ce-2f8a68da6bc6/PaizoPrintables_2g3.png?w=600" alt="A mix of five different sized pathfinder monster miniatures including humanoid and beastly angels, a large tentacled sea serpent, a bi-pedal tree monster, and a beastly creature with a humanoid body, hooves for feet and a skeletal head." data-v-a2f23fca>
             </figure>
            </div>
           </div>
           <div class="blog__article--component_wrapper" data-v-7a806b22>
            <div class="blog__paragraph" data-v-a2f23fca data-v-7a806b22>
             <div class="blog__paragraph__text" data-v-a2f23fca>
              <p>These five new miniatures join the existing Welcome Pack roster, meaning that even if you don’t back before May 1st, you’ll still get these in addition to the 25 miniatures that are part of the existing Welcome Pack, bringing the total to 30 miniatures—though you will miss out on all the cool Hellfire Crisis minis from the first month, so don’t delay ordering!&nbsp;</p>
              <h1>Roadmap Forward&nbsp;</h1>
              <p>Going back to the opening of this post, we at Paizo and Titan Forge want to express our absolute appreciation for the amazing response we’ve received so far. With any new venture, it’s hard to gauge interest, but we’re so glad that the Pathfinder and 3D-printing communities have put their support behind us. Buoyed by your enthusiasm, we’re committed to increasing our support over the coming months.&nbsp;</p>
              <p>Now where does that lead us?&nbsp;</p>
              <h2>Release Content&nbsp;</h2>
              <p>Over the remainder of 2026, we’re committed to delivering more content every month. Right now, we’re on track to deliver 100 new 3D-printable miniatures to our backers by the end of 2026.&nbsp;</p>
              <p><strong>Rest of Season 1 (May-June)&nbsp;<br></strong>We’re continuing support on the Hellfire Crisis through to the end of June, which will encompass our first Season. This means that in June there will be one last set of 6 new miniatures dedicated to the Hellfire Crisis along with two special miniatures for those who’ve remained subscribed for the full three-month period.&nbsp;</p>
              <p><strong>Season 2 (July-August-September)&nbsp;<br></strong>Starting in July, we’ll be switching over to Season 2, which is set to change themes. This will continue with at least 6 new miniature releases a month, along with a short encounter-based adventure and a bonus loyalty miniature and associated PDF at the end. We’ll talk more about Season 2 and what theme to expect next month.&nbsp;</p>
              <p><strong>Season 3 (October-November-December)&nbsp;<br></strong>With the exciting amount of support we’ve received, we’ll be amping up Paizo’s support starting in Season 3, which begins in October. Every month starting in October, our plan is to <strong>include larger adventures</strong>, more akin to our Pathfinder Society scenarios in terms of length (~5,000 words) with supporting miniatures and maps. We’re also looking at making these adventures fully legal for use in Organized Play, meaning they’ll count for full credit for players who play in Society but also work just as well as stand-alone adventures for your home tables.&nbsp;</p>
              <p><strong>Welcome (Pack) Again, and Again… and Again!&nbsp;<br></strong>As with the increase in May, our plan is to steadily increase the Welcome Pack offerings over the coming months. As long as our numbers keep rising, we’ll keep providing more miniatures for the Welcome Pack every month. Regardless, we’re planning on larger updates with the launch of each season. So expect to see some <em>Player Core 2 </em>iconics join the set at the start of Season 2 in July!&nbsp;</p>
              <h2>Other Future Plans&nbsp;</h2>
              <p><strong>Adventure Paths&nbsp;<br></strong>Paizo is known for its many Adventure Paths, and so there’s an understandable desire for Adventure Path creatures to become part of Paizo Printables. We’ve heard this feedback but also want to be open that we don’t think Patreon/Tribes are the place for these products. Even for our new all-in-one hardback Adventure Paths, like the recently released <em>Hellbreakers</em>, just the first 3 chapters would require about 40 distinct models (not including variants) for the combat encounters. Devoting our monthly releases to a single Adventure Path would keep us too focused and risk turning people off if the theme wasn’t to their liking. Still, we see the value in providing miniatures keyed to Adventure Paths and might look at new <em>frontiers </em>to deliver those. Keep an eye out for more news on this front in the coming months.&nbsp;</p>
              <p><strong>Terrain&nbsp;<br></strong>There’s been some interest shown for terrain pieces. We’d love to get a sense of what people would be interested in seeing from Paizo Printables on this front. Would centerpiece terrain elements, like a collapsed Runelord statue used to embellish tables, be appropriate? Would you maybe prefer we take a look at our old Flip-Tiles product line and create 3D-versions of those? How about some smaller scatter pieces that could be used to create cover and block line of sight on our existing Flip-Mats? Let us know your thoughts, as we’re excited to explore this but want to make sure we tackle the community’s needs!&nbsp;</p>
              <p><strong>New Mechanics&nbsp;<br></strong>There’s been some requests to expand outside of just adventures in the included PDF content and provide new Pathfinder mechanics. We’re interested in exploring this space,&nbsp;</p>
              <p>though it may take some time to happen. Ideally, we’d love to release something like a new ancestry (or update an old one) via Paizo Printables, so we can include a few sculpts of that ancestry to help support it. This is something we want to investigate, so please give us some time on this front.&nbsp;</p>
              <h2>One Last Thing… From Space!&nbsp;</h2>
              <p>We’ve heard the community's interest in Starfinder miniatures. We don’t have anything to announce yet, but we definitely want to explore a full range of support for Starfinder. The ongoing support for Pathfinder Printables has shown that there’s an interest, so we’re starting work on what a more robust offering for Starfinder could look like. More on what this could look like in the coming months, but it’s something we’re keen on exploring.&nbsp;</p>
              <p>Until then, thank you one and all for your amazing support for Paizo Printables!&nbsp;</p>
              <p><strong>Thurston Hillman&nbsp;<br></strong><em>Associate Publisher&nbsp;</em></p>
             </div>
