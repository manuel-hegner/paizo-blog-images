           <div class="blog__article--component_wrapper" data-v-41cb3b80>
            <div class="blog__paragraph" data-v-a2f23fca data-v-41cb3b80>
             <div class="blog__paragraph__text" data-v-a2f23fca>
              <p>Hello, Starfinders!</p>
              <p>We start this month off with a simple delivery mission turned rescue! Answering a distress signal leads a team of Starfinders to a civilian shuttle that’s being boarded by the villainous Corpse Fleet. It’s time to buckle up and take your battle stations. If we can drive off the Corpse Fleet’s starship, we might be able to board the shuttle, defeat the boarders, and rescue any survivors.</p>
              <p><a href="https://store.paizo.com/starfinder-society-scenario-1-17-corpse-fleet-conflict/"><em>Starfinder Society Scenario #1-17: Corpse Fleet Conflict</em></a> is a scenario for 3rd- through 4th-level characters written by Letterio Mammoliti.</p>
             </div>
             <figure class="blog__paragraph__image below" data-v-a2f23fca>
              <img src="https://cdn.paizo.com:443/a7d62ac8-7f03-00ef-f1f0-83fb8bf332e2/136522c5-ca5d-4a1b-9f7d-79adb558ca50/ViraDroven.png?w=450" alt="Vira Dorven, artist Ernst Eskelsen: A corpsefolk wearing the uniform of an officer in the Corpse Fleet casts a spell, sending a disk of condensed gravity flying through the air. She wears her stringy hair up in a tight bun and keeps her uniform pristine. Some of her teeth and a piece of her mandible are visible through the gaps in her rotting cheek." data-v-a2f23fca><img src="https://cdn.paizo.com:443/a7d62ac8-7f03-00ef-f1f0-83fb8bf332e2/f9a73a45-fa3c-4e83-aa59-b373717153d1/PZO22004_Akito..png?w=450" alt="Akiton View, artist Pixoloid Studios: A glimpse of the city of Maro, where buildings and skyscrapers climb the walls of a deep and narrow canyon. The city is cast in near eternal twilight thanks to the shadows of the canyon’s walls, and lit by countless neon lights, holo ads, and streetlamps." data-v-a2f23fca>
              <figcaption class="style--match_paragraph" data-v-a2f23fca>
               <p>Left to right: illustrations by Ernst Eskelsen and Pixoloid Studios:</p>
              </figcaption>
             </figure>
            </div>
           </div>
           <div class="blog__article--component_wrapper" data-v-41cb3b80>
            <div class="blog__paragraph" data-v-a2f23fca data-v-41cb3b80>
             <div class="blog__paragraph__text" data-v-a2f23fca>
              <p>Meanwhile, back on Akiton, we head to the city of Maro to track down an ikeshti named Nima. Nima’s an ex-member of the Rust Wraiths mercenary company and she’s supposedly got important information on both the nature of the Wreck of the Returned and the being at its heart. There’s just a few problems… like the fact that Nima’s gone missing, and not even her pal Bo-Shek has heard from her. What’s more, this information she’s got? It sounds like the kind of thing the Wreck’s forces might want to suppress, doesn’t it? Best get a move on, Starfinders! I don’t think you’ll be the only one looking for Nima…</p>
              <p><a href="https://store.paizo.com/starfinder-society-scenario-1-18-midnights-in-maro/"><em>Starfinder Society Scenario #1-18: Midnights in Maro</em></a> is an <em>Invasion’s Edge</em> metaplot scenario for 3rd- through 4th-level characters written by Rigby Bendele.</p>
              <p>Take care of each out there, Starfinders! It’s a dangerous galaxy, but we can make it a little brighter if we work together.</p>
              <p><br></p>
              <p><strong>Jessica Catalan<br></strong><em>Starfinder Society Developer</em></p>
             </div>
            </div>
           </div>
           <div class="blog__article--component_wrapper" data-v-41cb3b80>
            <div class="blog__paragraph" data-v-a2f23fca data-v-41cb3b80>
             <div class="blog__paragraph__text" data-v-a2f23fca>
              <p>Greetings, Pathfinders!</p>
              <p>The end of winter is in sight, and things are certainly heating up in Golarion. First, we go to Kaer Maga, where everyone’s favorite sprite, self-proclaimed Runelord, and now Venture-Captain (thanks to the efforts of some of our dedicated agents in <em>Pathfinder Society Scenario #6-15: Lost and Forgotten</em>) Zinthyra Tannol has started off the exploration of the vast Azlanti site beneath the City of Strangers that an Azlanti wizard sealed before the Age of Darkness over 10,000 years ago. With her lodge now in working order, it can now serve its purpose of exploring the Azlanti wizard Lesolethe’s sealed vaults. Venture-Captain Zinthyra does not know what lies beyond the door, nor why it was sealed. Thus it falls to some of the most experienced agents to explore this site and see what can be learned.</p>
              <p><a href="https://store.paizo.com/pathfinder-society-scenario-7-13-ancient-beyond-imagining/?searchid=267359&amp;search_query=ancient+beyond+imagining"><em>Pathfinder Society Scenario #7-13: Ancient Beyond Imagining</em></a> is a scenario for 9th- through 10th-level characters written by Bill Fischer.</p>
              <p><br></p>
             </div>
             <figure class="blog__paragraph__image below" data-v-a2f23fca>
              <img src="https://cdn.paizo.com:443/a7d62ac8-7f03-00ef-f1f0-83fb8bf332e2/4726fe95-555f-4bf5-9b79-f594605d471e/PZ0160615_ZINTHYRA_TANNOL.png?w=450" alt="Zinthyra Tannol, artist Sammy Khalid: A blue-skinned sprite with dragonfly wings flutters agilely. She holds a magical staff, and is dressed in greens and golds." data-v-a2f23fca><img src="https://cdn.paizo.com:443/a7d62ac8-7f03-00ef-f1f0-83fb8bf332e2/c6e8fb83-cd40-4c3e-b563-cab1c2a9e045/PZO160714_DRUMSEXPERIMENT.png?w=450" alt="Drum’s Experiment, artist Raphael Madureira: A wolflike creature has been transformed into a weapon by foul magic. It has growths all over its body that can fire diabolic energy. Its eyes glow with anger." data-v-a2f23fca>
              <figcaption class="style--match_paragraph" data-v-a2f23fca>
               <p>Left to right, illustrations by Sammy Khalid and Raphael Madureira</p>
              </figcaption>
             </figure>
            </div>
           </div>
           <div class="blog__article--component_wrapper" data-v-41cb3b80>
            <div class="blog__paragraph" data-v-a2f23fca data-v-41cb3b80>
             <div class="blog__paragraph__text" data-v-a2f23fca>
              <p>Then we turn back to the Hellfire Crisis in our second scenario of the month. Earlier this year, Pathfinder agents on a training exercise were called upon to rescue a group of gnomes fleeing harsher restrictions in Brastlewark (<em>Pathfinder Society Scenario #7-06: Brastlework at War Part I - the Gnome Defection</em>). Brastlewark is one of the largest gnome settlements on Golarion, but is nominally ruled by a Thrune sympathizer. These gnome defectors had critical but worrying intelligence: The self-proclaimed ruler of Brastlewark, King Drum Thornfiddle has been using Hellknight enforcers to crack down on the gnome citizens, as well as forcing many to use their primal magics to mix with diabolical ones in the creation of weapons of war. One such weapon being the Jaws of Hell, which saw use in the Battle of Hellknight Hill, both Andoren command and the Pathfinder Society took particular note, having both lost people to these terrible weapons. What’s worse, apparently the next generation of weapons would be some sort of living creature.</p>
              <p>The Andoran Army has pushed far enough into Cheliax that destruction of these facilities and liberation of the gnomes is now possible, but they can't do both. It's up to you and your fellow Pathfinders to see that the gnomes are safe, and that they can know true freedom, away from the tyranny of Cheliax and House Thrune.</p>
              <p><a href="https://store.paizo.com/pathfinder-society-scenario-7-14-brastlewark-at-war-part-2-the-gnome-liberation/"><em>Pathfinder Society Scenario #7-14: Brastlewark at War Part II - The Gnome Liberation</em></a> is a scenario for 3rd- to 4th-level characters written by Shan Wolf.</p>
              <p><strong>Josh Foster<br></strong><em>Pathfinder Society Developer</em></p>
              <p><strong>Shay Snow<br></strong><em>Pathfinder Society Developer</em></p>
