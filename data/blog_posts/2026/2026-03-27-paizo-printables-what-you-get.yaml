  \          <div class=\"blog__paragraph\" data-v-a2f23fca data-v-41cb3b80>\n   \
  \        <div class=\"blog__paragraph__text\" data-v-a2f23fca>\n            <p>Paizo\
  \ recently announced its partnership with <a href=\"https://titan-forge.com/\">Titan\
  \ Forge</a> to provide a new monthly release of Pathfinder 3D printable miniatures\
  \ under a program called Paizo Printables. While Paizo provides the Pathfinder brand\
  \ you’ve come to know and love (along with some new bespoke PDF content), Titan\
  \ Forge provides a plethora of new miniatures for use in your campaigns.</p>\n \
  \           <p>Paizo Printables will launch April 2nd on <a href=\"https://www.myminifactory.com/frontier/paizo-printables-tribe-5403\"\
  >MyMiniFactory</a> and on <a href=\"https://patreon.com/PaizoPrintables\">Patreon</a>.</p>\n\
  \            <p>Prior to our launch on those platforms, we wanted to provide an\
  \ overview of the offerings you can expect at launch and going forward.</p>\n  \
  \          <p>Paizo Printables starts with two tiers: Initiate and Field Agent.\
  \ These support tiers come in at $5 and $10 USD, respectively. Since Field Agents\
  \ get everything, we’ll provide an overview of that tier.</p>\n            <h1>Field\
  \ Agent Tier</h1>\n            <p>Every month, Field Agent backers can expect to\
  \ receive the following content:</p>\n            <ul>\n             <li>6+ New\
  \ 3D Printable Miniatures (STL files; both supported and unsupported)</li>\n   \
  \          <li>Adventure Pack PDF</li>\n             <li>Loyalty Reward Bonus (after\
  \ 3 months) \n              <ul>\n               <li>Extra Centerpiece Miniature(s)</li>\n\
  \               <li>Bonus PDF</li>\n              </ul></li>\n            </ul>\n\
  \            <p>Every month, Field Agents receive at least six new STL miniatures,\
  \ along with an accompanying Adventure Pack PDF. Miniatures are themed to a three-month\
  \ season, starting with the <a href=\"https://paizo.com/pathfinder/hellfirecrisis\"\
  >Hellfire Crisis</a>. The Adventure Pack PDF includes a summary of the miniatures,\
  \ statblocks for every miniature, and a short adventure intended for quick play\
  \ using the presented miniatures.</p>\n           </div>\n           <figure class=\"\
  blog__paragraph__image below\" data-v-a2f23fca>\n            <img src=\"https://cdn.paizo.com:443/a7d62ac8-7f03-00ef-f1f0-83fb8bf332e2/e7aef6b5-ca3f-43bb-8b4b-567ea2e43d8a/PaizoPrintables_mastercrafted.jpg\"\
  \ alt=\"PaizoPrintabled Mastercrafted Releases for April 2026: a lineup of large\
  \ and medium sized 3D modeled miniatures including adventurers and monsters\" data-v-a2f23fca>\n\
  \           </figure>\n          </div>\n         </div>\n         <div class=\"\
  blog__article--component_wrapper\" data-v-41cb3b80>\n          <div class=\"blog__paragraph\"\
  \ data-v-a2f23fca data-v-41cb3b80>\n           <figure class=\"blog__paragraph__image\
  \ right\" data-v-a2f23fca>\n            <img src=\"https://cdn.paizo.com:443/a7d62ac8-7f03-00ef-f1f0-83fb8bf332e2/81096a1f-f0b6-49f2-8c7c-93a8b76709f0/paizoprintables_abrogailthrune.png?w=400\"\
  \ alt=\"A 3D modeled miniature of Abrogail Thrune, a human woman wearing an ominous\
  \ gown and headdress, standing with a sword and malevolent smile\" data-v-a2f23fca>\n\
  \           </figure>\n           <div class=\"blog__paragraph__text\" data-v-a2f23fca>\n\
  \            <p>At the end of every season, members who subscribed for the entire\
  \ season receive a loyalty reward bonus. This bonus includes a centerpiece miniature(s)\
  \ and an associated PDF. The contents of this will vary, but we’re pleased to showcase\
  \ Queen Abrogail Thrune as our first loyalty reward. Of course, a medium-sized miniature—\
  even as impressive as Queen Abrogail—didn’t seem enough for our first set, so we’\
  ll also be including a suitably ‘Huge-er’ sized miniature in our first loyalty reward\
  \ in June.</p>\n            <p><strong>The Welcome Pack</strong></p>\n         \
  \   <p>Alongside the monthly releases, we’re also incentivizing people to sign up\
  \ for Paizo Printables by offering an expanding Welcome Pack of miniatures and game\
  \ content. This is a large array of additional miniatures and content that we plan\
  \ to expand on as Paizo Printables grows.</p>\n            <p>The initial Welcome\
  \ Pack launch slate includes 28 miniatures, including the eight iconic characters\
  \ from <a href=\"https://store.paizo.com/pathfinder-player-core/\">Pathfinder Player\
  \ Core</a> (plus two associated companions), three Large dragons, a Huge centerpiece\
  \ mirage dragon, and countless useful creatures and characters for any game!</p>\n\
  \           </div>\n          </div>\n         </div>\n         <div class=\"blog__article--component_wrapper\"\
  \ data-v-41cb3b80>\n          <div class=\"blog__paragraph\" style=\"clear:both;\"\
  \ data-v-a2f23fca data-v-41cb3b80>\n           <figure class=\"blog__paragraph__image\
  \ above\" data-v-a2f23fca>\n            <img src=\"https://cdn.paizo.com:443/a7d62ac8-7f03-00ef-f1f0-83fb8bf332e2/41852f38-c875-4359-91f4-b45196a89245/PaizoPrintables_Welcome_Pack_1920x1080_renders.jpg\"\
  \ alt=\"PaizoPrintables: Growing Welcome Pack featuring 3D models of iconic heroes\
  \ and popular monsters\" data-v-a2f23fca>\n           </figure>\n           <div\
  \ class=\"blog__paragraph__text\" data-v-a2f23fca>\n            <p>To support the\
  \ Welcome Pack miniatures, we’re also including two new PDFs. The first is a demo\
  \ adventure that ties in with <a href=\"https://store.paizo.com/pathfinder-game-night-dawn-of-the-frogs/\"\
  >Pathfinder Game Night Dawn of the Frogs</a>, using the three boggard miniatures\
  \ present in the pack. The second PDF contains a plethora of details on the mirage\
  \ dragon, including segments from <a href=\"https://store.paizo.com/pathfinder-lost-omens-draconic-codex/\"\
  >Pathfinder Lost Omens Draconic Codex</a> and a whole section on tactics for running\
  \ a successful mirage dragon encounter.</p>\n            <p>We’ll also be “sweetening\
  \ the pot” by including digital copies of Pathfinder Player Core and the recently\
  \ remastered <a href=\"https://store.paizo.com/pathfinder-beginner-box/\">Pathfinder\
  \ Beginner Box</a>—many of the miniatures in the Welcome Pack being directly usable\
  \ with these products!</p>\n            <p>As time goes on and we accrue more backers,\
  \ the goal is to increase the Welcome Pack offerings with additional miniatures\
  \ and supporting contact. There might be some <a href=\"https://store.paizo.com/pathfinder-player-core-2/\"\
  ><em>Player Core 2</em></a><em> </em>iconics waiting in the wings, like our friend\
  \ Fumbus, who you can pick up right now by signing up for launch notification on\
  \ <a href=\"https://www.myminifactory.com/frontier/paizo-printables-tribe-5403\"\
  >MyMiniFactory</a>.</p>\n            <p><br></p>\n            <p><strong>Sign Up\
  \ Bonuses</strong></p>\n            <p>Finally, along with all these great miniatures,\
  \ we’re looking to provide several discount codes from Paizo and several of our\
  \ partners, such as Titan Forge, Turbo Dork, Wizkids, and more! Members who sign\
  \ up to the Tribe will receive a list of discount codes that they can use with a\
  \ select group of partners.</p>\n            <p>Paizo is providing a direct link\
  \ to MyMiniFactory that, if used, will provide an additional $10 store credit on\
  \ their storefront after backing the Tribe. More on the full array of these deals\
  \ at launch!</p>\n           </div>\n          </div>\n         </div>\n       \
