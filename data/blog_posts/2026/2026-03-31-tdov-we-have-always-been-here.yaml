            <div class="blog__paragraph" data-v-a2f23fca data-v-7a806b22>
             <div class="blog__paragraph__text" data-v-a2f23fca>
              <p>Hail and well met, ‘Finders! And happy Transgender Day of Visibility (TDOV) to all of my fellow trans, nonbinary, and gender nonconforming adventurers!</p>
              <p>Since 2009, TDOV has been celebrated on March 31<sup>st</sup> in the United States and around the world. As might be guessed from the name, this holiday is focused on acknowledging trans identity, the history of trans people, and the power of living your authentic life. Transgender Day of Visibility recognizes the stress, pressure, and in many cases danger, of coming out—while also celebrating the joy we experience when we are able to live our truths.</p>
              <p>Just as trans people have always existed throughout the world at large, the influence of trans people can be seen in TTRPGs and board games—back to their very beginnings. From the late, great Jennell Jaquays whose art and writing shaped foundational games like Dungeons &amp; Dragons and Rune Quest, to current indie designers like Avery Alder (Monsterhearts, The Quiet Year) and Rae Nedjadi (Apocalypse Keys), trans game designers and artists are at the heart of the stories we tell and the worlds we explore.</p>
              <p>One of my greatest joys about working here at Paizo is the breadth and depth of diversity in our stories—and the characters within them. Seeing myself in trans characters like Arhan and Mios was a part of what drew me to Pathfinder to begin with, and I am proud to be one part of the team that brings these characters to life.</p>
             </div>
             <figure class="blog__paragraph__image below" data-v-a2f23fca>
              <img src="https://cdn.paizo.com:443/a7d62ac8-7f03-00ef-f1f0-83fb8bf332e2/99bba661-54a8-4ec3-bf29-8a693ef746c4/PZO17002_BC_Genie.png?w=300" alt="Artist Gunship Revolution: A purple skinned and haired genie wearing purple clothing with gold accents, with a lamp hanging of their belt. They have gold tattoos under their eyes as well as under their pectorals over the top of top surgery scars." data-v-a2f23fca><img src="https://cdn.paizo.com:443/a7d62ac8-7f03-00ef-f1f0-83fb8bf332e2/71be1220-41f2-4809-afe0-b20cda028927/dae_solarian_1300x2000.png?w=300" alt="full body illustration of iconic Solarian, Dae. A cat-like Phatra with a cybernetic arm,pointing a smoking finger gun." data-v-a2f23fca><img src="https://cdn.paizo.com:443/a7d62ac8-7f03-00ef-f1f0-83fb8bf332e2/1d10773b-4229-466e-b1bf-c02b9bf8e66c/PZO2111_Thaumaturge_Mios.png?w=300" alt="Art by Wayne Reynolds. Mios, the iconic thaumaturge. Dressed is a large jacket covered in charms and talismans, holding a lantern." data-v-a2f23fca>
             </figure>
            </div>
           </div>
           <div class="blog__article--component_wrapper" data-v-7a806b22>
            <div class="blog__paragraph" style="clear:both;" data-v-a2f23fca data-v-7a806b22>
             <figure class="blog__paragraph__image left" data-v-a2f23fca>
              <img src="https://cdn.paizo.com:443/a7d62ac8-7f03-00ef-f1f0-83fb8bf332e2/d3a1321f-9992-4148-a9e5-837369a2a0fc/TTRPGsForTransRights_Idaho_2026.jpg?w=400" data-v-a2f23fca>
             </figure>
             <div class="blog__paragraph__text" data-v-a2f23fca>
              <p>I am also pleased to announce that Paizo is continuing our relationship with TTRPGs for Trans Rights by including the Pathfinder Beginner Box PDF in this year’s Trans Rights Bundle. <a href="https://itch.io/b/3525/ttrpgs-for-trans-rightsidaho">Live now on itch.io</a>, this year’s bundle benefits <a href="https://tccidaho.org/about-us/">The Community Center</a> and <a href="https://www.transaffirm.org/">TransAffirm Inc</a>., two grassroots charities working to improve the lives of trans people in Idaho.&nbsp;</p>
              <p>Playing characters of genders outside of your own in tabletop games is one of safest, most expressive way to explore gender—I can’t count the number of people I know who realized they were trans or nonbinary through tabletop games, myself at least partially included. By including trans voices in our stories, we make them richer, fuller, and more welcoming for all.</p>
              <p>To my fellow queer, trans, nonbinary, and gender nonconforming folks—you are welcome; you are wanted; you are loved. There is a seat for you at our table and a place for you in our worlds. To anyone questioning or exploring gender—have fun, be safe, and do what makes you happiest. Living your truth can be difficult and frightening, but you don’t have to crawl through the dungeon alone.</p>
              <p>We are here. We have always been here. And we will continue.</p>
              <p>In Solidarity,</p>
              <p><strong>Rue Dickey (they/he/xe) </strong><br><em>Associate Director of Marketing &amp; Media</em></p>
