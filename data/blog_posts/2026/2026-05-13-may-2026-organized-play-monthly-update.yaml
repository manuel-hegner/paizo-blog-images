           <div class="blog__article--component_wrapper" data-v-7a806b22>
            <div class="blog__paragraph" data-v-a2f23fca data-v-7a806b22>
             <figure class="blog__paragraph__image left" data-v-a2f23fca>
              <img src="https://cdn.paizo.com:443/a7d62ac8-7f03-00ef-f1f0-83fb8bf332e2/d8aae3c3-fa1c-4eda-942d-43cda27d79a3/051520_PaizoOP.png?w=350" alt="Organized Play logo, white text over blue golem graphic on orange background" data-v-a2f23fca>
             </figure>
             <div class="blog__paragraph__text" data-v-a2f23fca>
              <h1>Digital Adventure Releases</h1>
              <p>The following adventures will be released on June 3, 2026, and may be run at events beginning on that date.</p>
              <p><a href="https://store.paizo.com/pathfinder-society-scenario-7-19-the-lost-legacy/"><em>Pathfinder Society Scenario #7-19: The Lost Legacy</em></a><em><br></em><a href="https://store.paizo.com/pathfinder-society-scenario-7-20-the-strings-of-hell/"><em>Pathfinder Society Scenario #7-20: The Strings of Hell</em></a></p>
              <p><a href="https://store.paizo.com/starfinder-society-scenario-01-23/"><em>Starfinder Society Scenario #1-23: Psychic Echoes</em></a><em><br></em><a href="https://store.paizo.com/starfinder-society-scenario-1-24-final-gambit-part-one/"><em>Starfinder Society Scenario #1-24: Final Gambit: Part One</em></a></p>
             </div>
            </div>
           </div>
           <div class="blog__article--component_wrapper" data-v-7a806b22>
            <div class="blog__paragraph" style="clear:both;" data-v-a2f23fca data-v-7a806b22>
             <div class="blog__paragraph__text" data-v-a2f23fca>
              <h1>New Year, New Storylines</h1>
              <p>Last month we announced our upcoming storylines for the remainder of this year!</p>
              <p>Pathfinder Society will embark on the <a href="https://paizo.com/blog/pathfinder-society-year-of-clockwork-mystery"><strong>Year of Clockwork Mystery</strong></a>, tackling the unknown purpose of an artifact with the aid of Master of Spells Sorrina Westyr.</p>
              <p>In Starfinder Society, we’ll be heading <a href="https://paizo.com/blog/starfinder-society-beyond-the-blood-door"><strong>Beyond the Blood Door</strong></a>, as Absalom Station comes under attack from a mysterious new enemy bent on bloody destruction.</p>
              <p>Both seasons will launch later this year at Gen Con with four new scenarios, which you can preview now in our store. We’ve announced some program changes as well, with more to come prior to their launch. We hope you’ll join us for new adventures!</p>
             </div>
             <figure class="blog__paragraph__image below" data-v-a2f23fca>
              <img src="https://cdn.paizo.com:443/a7d62ac8-7f03-00ef-f1f0-83fb8bf332e2/0c38bec0-a5c7-434f-b511-51ef860b64da/PZO160800_YEAR8SYMBOL.png?w=450" alt="Year 8 Symbol, artist Felipe Fornitani: A collection of brass gears and mechanical works surround the symbol of the Open Road." data-v-a2f23fca><img src="https://cdn.paizo.com:443/a7d62ac8-7f03-00ef-f1f0-83fb8bf332e2/f6d1b0a8-e913-4b21-abab-62b55f1c2a30/SFS_S2SYMBOL_BeyondTheBlood.png?w=450" alt="Starfinder Society Year 2 Symbol Beyond the Blood Door, artist Nicolas Espinoza: A stylized image of Absalom Station has been vandalized with red graffiti that depicts monstrous teeth gnawing on the station. The graffiti drips, looking unsettlingly like blood." data-v-a2f23fca>
             </figure>
            </div>
           </div>
           <div class="blog__article--component_wrapper" data-v-7a806b22>
            <div class="blog__paragraph" data-v-a2f23fca data-v-7a806b22>
             <div class="blog__paragraph__text" data-v-a2f23fca>
              <h1>Sanctioning</h1>
              <p>At long last, our drought of adventure sanctioning is over! Thanks for your patience as we updated our template. Sanctioning documents for the following Pathfinder Society adventures are now available for download via their product pages:</p>
              <ul>
               <li><a href="https://store.paizo.com/pathfinder-adventure-path-hellbreakers/"><em>Pathfinder Hellbreakers Adventure Path</em></a></li>
               <li><a href="https://store.paizo.com/pathfinder-adventure-path-season-of-ghosts/"><em>Pathfinder Adventure Path: Season of Ghosts</em></a><em> </em><a href="https://store.paizo.com/pathfinder-adventure-path-season-of-ghosts/">Compilation</a></li>
               <li><a href="https://store.paizo.com/pathfinder-beginner-box-secrets-of-the-unlit-star/"><em>Pathfinder Beginner Box: Secrets of the Unlit Star</em></a></li>
               <li><a href="https://downloads.paizo.com/OP-Sanctioning/Paizo+Printables+Sanctioning.pdf"><em>Paizo Printables</em></a><a href="https://downloads.paizo.com/OP-Sanctioning/Paizo+Printables+Sanctioning.pdf"> adventures</a></li>
              </ul>
              <p>Those of you with good Perception modifiers will notice that these adventures <strong>are all repeatable</strong>, meaning they can be played multiple times as long as a different character earns credit each time. We do <strong>not</strong> intend to go back and make older adventures repeatable; however, going forward, sanctioned adventures will be repeatable, just as scenarios will be later this year.</p>
              <p>On the Starfinder Society side, the <a href="https://downloads.paizo.com/OP-Sanctioning/Starfinder+Generic+Sanctioning+Document.pdf"><strong>generic adventure sanctioning document</strong></a> is now available! This document may be used to award player and GM credit for playing through any Paizo-published adventure other than scenarios. This explicitly includes our Starfinder 2 playtest scenarios, Starfinder adventure paths and other adventures, and anything else we see fit to sanction. This document will be added to our Starfinder Society landing page, but we won’t be adding it to every adventure’s product page. You can assume all our adventures are sanctioned unless we specifically state otherwise.</p>
              <p><br></p>
              <h1>GM Recognition</h1>
              <h2>GM Ranks</h2>
              <p>Whether stars, novas, glyphs, or a secret fourth thing, achieving a 5 ranking in any program involves a substantial amount of time. To achieve the 5th milestone, a GM must run 150 games, of which at least 50 must be unique scenarios and 10 special scenarios as well as run between one and three games for venture-captains (program dependent). A conservative estimate of the time needed to reach the 5th milestone is 650 hours!</p>
              <p>This month we had two GMs reach their fifth rank across three programs!</p>
              <p><strong>5th Glyph (PFS2)</strong>: JC Sánchez<br><strong>5th Nova (SFS1)</strong>: Bret Indrelee<br><strong>5th Star (PFS1)</strong>: Bret Indrelee</p>
              <p>If you believe you’ve completed your 5th rank but haven’t been announced yet, please email me at <a href="mailto:organizedplay@paizo.com">organizedplay@paizo.com</a>.</p>
              <h1><br></h1>
              <h1>Convention Updates</h1>
              <p>Don’t forget that the Gen Con event catalog opens this Sunday! We’ve got hundreds of tables of Pathfinder, Starfinder, 13 Omens, and our board games on offer, so there’s something for everybody. If you can’t join us at Gen Con, find an event near you on <a href="https://paizo.com/conventions">our convention calendar</a>! If there aren’t any near you, why not join our online community at <a href="https://paizo.com/threads/rzs7r5lw?Announcing-Bridging-the-Gap-2026">Bridging the Gap 2026</a>? They’ve got over 100 tables in four different languages, as well as multiple author-run scenarios.</p>
              <p>Until next time - explore! report! cooperate! and prepare for a summer of fun!</p>
              <p><br></p>
              <p><strong>Alex Speidel<br></strong><em>Convention and Organized Play Manager</em></p>
              <h3><a href="https://paizo.com/threads/rzs85d68?NEW-BLOG-OP-Monthly-Update-May"><em>We have so much coming up this summer! Join the conversation over on the Paizo Forums!</em></a></h3>
             </div>
