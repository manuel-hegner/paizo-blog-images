             <h1 data-v-7a806b22>
              <p>The Cleric Remastered</p></h1>
             <div class="byline" data-v-7a806b22>
              <a href="/blog/a" title="More blog posts by Landon Winkler" class="name disabled" data-v-7a806b22>Landon Winkler</a><span class="postDate" data-v-7a806b22> - Oct 24, 2023, 6:00 pm</span>
