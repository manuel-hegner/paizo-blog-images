           <div class="blog__article--component_wrapper" data-v-7a806b22>
            <div class="blog__paragraph" data-v-a2f23fca data-v-7a806b22>
             <div class="blog__paragraph__text" data-v-a2f23fca>
              <p>To truly immerse oneself in the natural world, one must view it up close! Though our ultimate goal was to find the Wardens of the Wild, we couldn’t neglect the incredible opportunities for study we found over the course of our investigations, and we made frequent stops to survey the wilds on foot (or on fin or wheel, in Lythea’s case). I hesitate to call them “side expeditions,” for they were valuable in their own right; Chari’s notes and sketches filled several folios we’re still disseminating now that we’ve returned—ah, but I outpace myself.</p>
              <p>In any case, these excursions were where our scout, Telero, and our scribe, Charikleia, really had a chance to shine. One day, early in our voyage together, we were flying along a river that gradually carved the land into a breathtaking gorge, its cascading tributaries branching like the roots of a great tree in the rocky canyons spread out below us.</p>
              <p>“Professor!” called Telero from the starboard rail, his voice ringing bright and eager as always. “This could be the perfect place to look for more sage aconite!”</p>
              <p>(I feel I must pause to note, dear reader, lest it cause confusion: I am not, in fact, a professor in any official capacity! A lifelong scholar, certainly, and a dedicated librarian and archivist, but circumstances led me away from my university studies long before I advanced to any sort of teaching career. Nonetheless, I’ve been “the professor” to Telero since our first day aboard the&nbsp;<em>Zoetrope</em>, and I must say I find the epithet endearing, despite its inaccuracy.)</p>
              <p>Telero grew up among talented herbalists and knew botany was a special interest of both mine and the doctor’s; we also knew that where interesting flora grew, interesting fauna was sure to follow. Who could say what new discovery might lead us to the wardens? I set us down on the rocky riverbank—my landings were getting smoother with practice—and called our small crew together to prepare for the journey.</p>
              <p>We quickly decided that, due to the branching nature of the canyons, a group survey wasn’t the most efficient course of action. “Let me go, Professor,” said Telero, eying the lodestone in his staff and tying off a bearing. “I spotted a waterfall a few miles in when we flew over. I can find it and then come back for everyone else!”</p>
              <p>I could tell asking him to wait for someone who hiked at my speed—that is to say, glacial—would be futile. “A wonderful idea, Telero,” I said, smiling at his irrepressible enthusiasm. “But it did look like there were several possible routes. Why don’t you take Charikleia with you?” The two had already bonded over similarities in their childhoods, and the young nomad hung on the more seasoned adventurer’s every word when she shared tales of her exploits before our voyage. I also suspected Chari’s measured and experienced approach would be a good balance to Telero’s hastier decisions on the trail.</p>
              <p>My friend and fellow scholar nodded, already tucking her sketchbook into her bag. “I&nbsp;<em>am</em>&nbsp;quite familiar with mazes,” Chari teased, “and I’d love to sketch the falls—”</p>
              <p>“Last one there’s an egg full of broodpiercers!” Telero’s hooves thundered down the gangplank as he charged off into the gorge, no longer able to contain his zest for adventure.</p>
              <p>“Careful to boil those first!” Grefu warned after him. Chari laughed and waved to the rest of us as the two set off, the clatter of their hooves echoing off the mossy basalt walls of the gorge long after they faded from view.</p>
              <p>Dr. Pom and I had barely finished our second leisurely cups of tea when Telero came galloping back. My concern over his haste and Chari’s absence was quickly allayed by the exuberance on his face. “Professor, everyone, we found it! You’ve got to see this!”</p>
              <p>Our intrepid scout deftly guided us through the canyon, at times splashing through the river itself as the mossy rock walls closed in around us, only a line of blue sky visible far above. “How did you find it so quickly, Telero?” I asked, marveling at his surety as the canyon widened and the river diverged. He led us down the left-claw path, stopping often so those of us on two legs could keep up.</p>
              <p>“It’s easy,” said our young guide, his eyes earnest. “You just have to listen to the river and watch the wind.”</p>
             </div>
             <figure class="blog__paragraph__image below" data-v-a2f23fca>
              <img src="https://cdn.paizo.com:443/a7d62ac8-7f03-00ef-f1f0-83fb8bf332e2/a1ed6a7b-71b8-4073-9d86-633204ffc1f9/PZO2114_Charikleia_Photograph.png?w=400" alt="Illustration by Gunship Revolution : A light writer photograph plate of Charikleia the minotaur " data-v-a2f23fca><img src="https://cdn.paizo.com:443/a7d62ac8-7f03-00ef-f1f0-83fb8bf332e2/f4b2c981-3251-4734-8757-213bb03b8042/PZO2114_Telero_Photograph.png?w=400" alt="Illustration by Gunship Revolution : A light writer photograph plate of Telero the centaur " data-v-a2f23fca>
              <figcaption class="style--match_paragraph" data-v-a2f23fca>
               <p>Light writer plates of Charikleia and Telero, from official Zoetrope expedition logs.<br>
                 Art by Gunship Revolution.</p>
              </figcaption>
             </figure>
