             <h1 data-v-7a806b22>
              <p>Witch, Witch, You’re a Remastered Witch</p></h1>
             <div class="byline" data-v-7a806b22>
              <a href="/blog/author/JamesCase" title="More blog posts by James Case" class="name" data-v-7a806b22>James Case</a><span class="postDate" data-v-7a806b22> - Oct 13, 2023, 5:30 pm</span>
             </div>
            </div>
            <div class="blog--back" data-v-7a806b22>
             <a href="/blog" title="Back to Blog" class="back nuxt-link-active" data-v-7a806b22>
              <div data-v-7a806b22>
