           <div class="blog__article--component_wrapper" data-v-7a806b22>
            <div class="blog__paragraph" data-v-a2f23fca data-v-7a806b22>
             <figure class="blog__paragraph__image above" data-v-a2f23fca>
              <img src="https://cdn.paizo.com:443/a7d62ac8-7f03-00ef-f1f0-83fb8bf332e2/7b66b975-c2e2-478d-b9e4-1e3be2ce6be7/PZO22007_PrismaTouristArrival.jpg" alt="Art by Arthur Henrique Olivera Silva. Prisma, a yellow furred, six armed, fashionable skittermander, arrives on Absalom Station, looking around, excited for her new destination" data-v-a2f23fca>
              <figcaption class="style--match_paragraph" data-v-a2f23fca>
               <p>The fashionista luminary Prisma arrives on Absalom Station.<br>
                 Art by Arthur Henrique Olivera Silva.</p>
              </figcaption>
             </figure>
             <div class="blog__paragraph__text" data-v-a2f23fca>
              <p>A soldier can defend and a mystic comprehend, but without an audience to attend, isn’t their story a dead-end? The ability to inspire others to follow their example is what elevates an adventurer to a hero. And without a spotlight that can outshine a galaxy of wonder, that motivation to strive for greatness becomes just another sparkle in a sea of stars. But what if the key isn’t exaggerating past glory, but instead making events such an extravagant and tremendous performance that all eyes are drawn to your moment of triumph?</p>
              <p>The <strong>luminary</strong> is a multi-media superstar, as capable of producing their own show as they are being the celebrity in the spotlight. They use magical spotlights to overlay characters with special effects as you cast them in different roles. They switch between being a support and control class, supplementing these options with occult stagecraft spells!</p>
              <p>In addition to the luminary, this playtest document features two minibots that will appear in <a href="https://store.paizo.com/starfinder-tech-core/"><em>Starfinder Tech Core</em></a>. The camerabot allows a luminary to Livestream hands-free while performing other exploration activities. While the minibots are finalized, we’ve included them in the playtest as the luminary was designed under the assumption that they would have access to this useful tool. As an added bonus, the minibots can also be used by players still using the playtest technomancer.</p>
              <p>This playtest will run for 2 months, beginning May 11th (today!), and continuing through July 10th, 2026. Our friends at Demiplane are also hosting a free character builder for the luminary class, available at <a href="http://www.starfindernexus.com/playtest" data-new-window="true" target="_blank" rel="noopener noreferrer">www.starfindernexus.com/playtest</a>, for those of you interested in taking advantage of their digital toolset to generate your characters. You can also get the playtest as an add-on module for<a href="https://foundryvtt.com/packages/starfinder-field-test-for-pf2e" data-new-window="true" target="_blank" rel="noopener noreferrer"> Foundry Virtual Tabletop</a>.</p>
             </div>
            </div>
           </div>
           <div class="blog__article--component_wrapper" data-v-7a806b22>
            <div class="blog__paragraph" data-v-a2f23fca data-v-7a806b22>
             <figure class="blog__paragraph__image left" data-v-a2f23fca>
              <img src="https://cdn.paizo.com:443/a7d62ac8-7f03-00ef-f1f0-83fb8bf332e2/bc9e65e2-44c6-4f25-8bed-b1cda99965d7/PrismaIconic.png?w=400" alt="Starfinder iconic luminary, Prisma. A yellow furred, six armed, fashionista, skittermander, striking a pose with one hand pointed to the sky, another making a peace sign over her face, and her other hands on her hips" data-v-a2f23fca>
              <figcaption class="style--match_paragraph" data-v-a2f23fca>
               <p>The fashionista luminary Prisma striking a pose.<br>
                 Art by Ksenia Kozhevnikova.</p>
              </figcaption>
             </figure>
             <div class="blog__paragraph__text" data-v-a2f23fca>
              <h2><strong>Playtesting the Luminary</strong></h2>
              <p><strong>Starfinder Society<br></strong>Similarly to the Tech Playtest classes, you can play the playtest luminary in Starfinder Society games, until the full luminary class is released. Once the final version of the class is released, you must rebuild your playtest characters using the new version of the class in order to continue playing the character.</p>
              <p><strong>GM Opt-In<br></strong>Because playtests use additional rules that some GMs might not be comfortable with, each GM must opt-in for playtest characters to be used at their tables. Please consult your GM prior to the game, for both Starfinder Society and your home games!</p>
             </div>
            </div>
           </div>
           <div class="blog__article--component_wrapper" data-v-7a806b22>
            <div class="blog__paragraph" style="clear:both;" data-v-a2f23fca data-v-7a806b22>
             <figure class="blog__paragraph__image above" data-v-a2f23fca>
              <img src="https://cdn.paizo.com:443/a7d62ac8-7f03-00ef-f1f0-83fb8bf332e2/07bdc1af-d033-4061-a870-d85acaac80fe/051421_CAPTAIN-CARMINE.png?w=600" alt="lead singer of the Pact Worlds’ sugar-pop sensation, Strawberry Machine Cake. Art by Graey Erb" data-v-a2f23fca>
             </figure>
             <div class="blog__paragraph__text" data-v-a2f23fca>
              <h2>Survey Says</h2>
              <p>Once you’ve had a chance to get a feel for the luminary, you can submit your feedback in a few ways:</p>
              <p>• <strong>Surveys</strong>: Please be sure to leave your feedback at <a href="https://www.surveymonkey.com/r/starfinderplaytest" data-new-window="true" target="_blank" rel="noopener noreferrer">the class survey</a> to let us know what you think of the class and where you think it could be improved. This will be our primary vector for data analysis, and you can always change your answers until the end of the playtest!<br><br>
                • <strong>Forums</strong>: On paizo.com, you’ll find <a href="https://paizo.com/community/forums/starfinder/secondEditionPlaytest">playtest subforums</a> for the luminary, with threads for discussion and announcements. When you post, look for existing threads on your topic before staring new ones. Remember that every poster is trying to make the game better for everyone, so please be polite and respectful. We will attempt to monitor other channels online, such as subreddits and discord discussions, but paizo.com is the dedicated space where you can be sure we can see your reports.</p>
              <p><br>
                We’re looking forward to hearing what you have to say! We’d also love to read about your glamorous adventures with the luminary on social media!</p>
              <p><strong>Dustin Knight (he/him)<br></strong><em><strong>Lead Designer</strong></em></p>
              <p><strong>Aras Yazgan (he/him)<br></strong><em><strong>Designer</strong></em></p>
              <h2><a href="https://downloads.paizo.com/PZO22010_LuminaryClassPlaytest.pdf" data-new-window="true" target="_blank" rel="noopener noreferrer"><strong>Download The Luminary Class Playtest</strong></a></h2>
