           <div class="blog__article--component_wrapper" data-v-7a806b22>
            <div class="blog__paragraph" data-v-a2f23fca data-v-7a806b22>
             <div class="blog__paragraph__text" data-v-a2f23fca>
              <p>Hello, Starfinders!</p>
              <p>This month we’re diving deep into our metaplot with two new scenarios!</p>
              <p>Thanks to extensive surveillance, tireless exploration, and intelligence from a recently rescued ally, First Seeker Sarmak has finally pinpointed a secret entrance to the mysterious <em>Wreck of the Returned</em>. It’s up to you to navigate underground tunnels through the Sloughscar Hills on Akiton to gain entry to the <em>Wreck of the Returned </em>and secure an entry point without being discovered! If you’re lucky, you might even make a new friend along the way…</p>
              <p><a href="https://store.paizo.com/starfinder-society-scenario-1-21-breaching-the-wreck/"><em>Starfinder Society Scenario #1-21: Breaching the Wreck</em></a> is an Invasion’s Edge metaplot scenario for 3rd- through 4th-level characters written by Kyle T. Raes.</p>
             </div>
             <figure class="blog__paragraph__image below" data-v-a2f23fca>
              <img src="https://cdn.paizo.com:443/a7d62ac8-7f03-00ef-f1f0-83fb8bf332e2/9f8411f5-9b05-497e-a355-02ef70e386ce/PZO260121_GORRIK.png?w=450" alt="Gorrik, artist Bruno Cesar: An aged and scarred clangit gremlin raises a gloved hand to call for help, with a tool clutched in his other hand." data-v-a2f23fca><img src="https://cdn.paizo.com:443/a7d62ac8-7f03-00ef-f1f0-83fb8bf332e2/a9e40909-f88c-4fdf-93d4-fef91f6e31d5/PZO260122_Kivett.png?w=450" alt="Kivett the Functionary, artist Fabio Di Bernardi: Kivett, better known as the Functionary, stands ready to fight, clutching an arc rifle in her hands. Her face is covered by a half-mask, leaving her smirk visible, and her white hair is pulled back into a braid." data-v-a2f23fca>
              <figcaption class="style--match_paragraph" data-v-a2f23fca>
               <p>Left to right: Illustrations by Bruno Cesar and Fabio Di Bernardi.</p>
              </figcaption>
             </figure>
            </div>
           </div>
           <div class="blog__article--component_wrapper" data-v-7a806b22>
            <div class="blog__paragraph" data-v-a2f23fca data-v-7a806b22>
             <div class="blog__paragraph__text" data-v-a2f23fca>
              <p>After you’ve secured this entrance, it’s time to use it for a rescue mission! For months, the Functionary’s forces have abducted locals who refused to join them, including beloved Starfinder Zizenzi, magically transforming them into mindless servitors of the <em>Wreck</em> through a process called conversion. Now, First Seeker Sarmak is dispatching multiple teams of Starfinders to attack the <em>Wreck</em>’s conversion facility, and rescue as many people as possible. Are you ready to join the fight?</p>
              <p><a href="https://store.paizo.com/starfinder-society-scenario-1-22-rescue-in-the-wreck/"><em>Starfinder Society Scenario #1-22: Rescue in the Wreck</em></a> is an Invasion’s Edge metaplot scenario for 3rd- through 4th-level characters written by Matt Morris.</p>
              <p>Take care of each other out there, Starfinders!</p>
              <p><strong>Jessica Catalan<br></strong><em>Starfinder Society Developer</em></p>
             </div>
            </div>
           </div>
           <div class="blog__article--component_wrapper" data-v-7a806b22>
            <div class="blog__paragraph" data-v-a2f23fca data-v-7a806b22>
             <div class="blog__paragraph__text" data-v-a2f23fca>
              <p>Hey, Pathfinders!</p>
              <p>This month we’ll be deep into the Hellfire Crisis, with two separate scenarios addressing different locations within the war movement!</p>
              <p>First, we’ll be traveling into the Devil’s Perch to check in on the Windspire strix tribe that’s gone completely silent and stopped communicating with other tribes in the surrounding region. A Ravounel strix spy has requested that the Pathfinder Society look into this silence, worried that it may spell danger for the leader of the tribe, Kirii. While traveling to the Windspire, the Pathfinders stumble across a group of Hellknights illegally camped in the local silver mines, plotting an attack against the tribe. It’s up to the Pathfinders to reach the Devil’s Perch and help the Windspire tribe fight back against the Hellknights!</p>
              <p><a href="https://store.paizo.com/pathfinder-society-scenario-7-17-perch-of-liberty/"><em>Pathfinder Society Scenario #7-17: Perch of Liberty</em></a><em> </em>is a Battle’s Spark metaplot scenario for 3rd- through 4th-level characters written by Marlowe Miller.</p>
             </div>
             <figure class="blog__paragraph__image below" data-v-a2f23fca>
              <img src="https://cdn.paizo.com:443/a7d62ac8-7f03-00ef-f1f0-83fb8bf332e2/00b8dd0c-9fe1-4c18-a49a-0a1ca7465eb6/TSIPISTI_ARTWORK.png?w=450" alt="Tsipisti, artist Felipe Carneiro: A female strix stands confidently with one hand on her hip as her dark wings lift around her." data-v-a2f23fca><img src="https://cdn.paizo.com:443/a7d62ac8-7f03-00ef-f1f0-83fb8bf332e2/6b739c31-acf1-4fb9-9a09-72a7413d1e3c/PZO160718_VEDA-JACOBO.png?w=450" alt="Veda Jacobo, artist Leonardo Albuquerque: A Chelaxian naval captain stands tall, her hair pulled back in a severe bun and a haughty look on her face." data-v-a2f23fca>
              <figcaption class="style--match_paragraph" data-v-a2f23fca>
               <p>Left to right: illustrations by Felipe Carneiro and Leonardo Albuquerque</p>
              </figcaption>
             </figure>
            </div>
           </div>
           <div class="blog__article--component_wrapper" data-v-7a806b22>
            <div class="blog__paragraph" data-v-a2f23fca data-v-7a806b22>
             <div class="blog__paragraph__text" data-v-a2f23fca>
              <p>Meanwhile, just across the ocean, Venture-Captain Finze Bellaugh is settling in for a debrief with a group of Pathfinders when an explosion rocks the docks of Anthusis! Apparently a Chelaxian naval captain, still sore from being chased off during the Vidric Revolution, has chosen to launch a naval attack and invasion against the capital of Vidrian, both in hopes of taking revenge and proving herself in the Chelaxian navy. The Pathfinders will need to rush through ruined streets, help civilians, and show Cheliax that Vidrian is not up for grabs!</p>
              <p><a href="https://store.paizo.com/pathfinder-society-scenario-7-18-freedom-on-the-sea/"><em>Pathfinder Society Scenario #7-18: Freedom on the Sea</em></a><em> </em>is a Battle’s Spark metaplot scenario for 5th- through 6th-level characters written by Alexandria Bustion.</p>
              <p><br></p>
              <p>That’s all we have for you this month, Pathfinders! Make sure to keep your eyes peeled for Chelaxian spies and remember:</p>
              <p>Explore! Report! Cooperate!</p>
              <p><strong>Shay Snow<br></strong><em>Pathfinder Society Developer</em></p>
             </div>
            </div>
           </div>
