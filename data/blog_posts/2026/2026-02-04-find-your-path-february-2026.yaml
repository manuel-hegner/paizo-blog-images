           <div class="blog__article--component_wrapper" data-v-41cb3b80>
            <div class="blog__paragraph" data-v-a2f23fca data-v-41cb3b80>
             <div class="blog__paragraph__text" data-v-a2f23fca>
              <p>Hail and well met, ‘Finders! This month’s new releases invite you back to solve the mysteries of Willowshore, delve the depths of the Dark Archive, and fill the battlefield with adversaries!</p>
              <p>Never miss a release with our <a href="https://store.paizo.com/subscriptions">Paizo Subscriptions</a>—for everything from rulebooks to accessories! Subscribers get a free PDF with purchase, early access to game content, and exclusive discounts for members with four or more active subscriptions.</p>
             </div>
            </div>
           </div>
           <div class="blog__article--component_wrapper" data-v-41cb3b80>
            <div class="blog__paragraph" data-v-a2f23fca data-v-41cb3b80>
             <figure class="blog__paragraph__image left" data-v-a2f23fca>
              <img src="https://cdn.paizo.com:443/a7d62ac8-7f03-00ef-f1f0-83fb8bf332e2/654d18b4-7495-4d80-8f77-3cc845e90e6d/47_source_1762279900.jpg?w=350" alt="Pathfinder Second Edition Dark Archive. the cover art features the iconic Psychic and Thaumaturge as they face against a ghostly entity launching household objects at them " data-v-a2f23fca>
             </figure>
             <div class="blog__paragraph__text" data-v-a2f23fca>
              <h3><a href="https://store.paizo.com/pathfinder-dark-archive-remastered/" data-new-window="true" target="_blank" rel="noopener noreferrer">Pathfinder Dark Archive (Remastered)</a></h3>
              <p>From the fringes, the unknown beckons…</p>
              <p><em>Pathfinder Dark Archive </em>(Remastered)&nbsp;contains secrets that any player or GM can use to reveal the paranormal lurking in their Pathfinder games, all updated to work perfectly with the remastered Pathfinder Second Edition rules! This spine-tinglingly secretive&nbsp;<strong>224-page</strong>&nbsp;hardcover rulebook presents two new character classes perfect for delving into the unexplained: Unleash the untold power of your mind as the psychic or leverage supernatural secrets and mystic implements as the thaumaturge!</p>
              <p><em>Pathfinder Dark Archive</em> (Remastered) is available in standard hardcover, sketch hardcover, and special edition faux leatherette hardcover formats.</p>
             </div>
            </div>
           </div>
           <div class="blog__article--component_wrapper" data-v-41cb3b80>
            <div class="blog__paragraph" style="clear:both;" data-v-a2f23fca data-v-41cb3b80>
             <figure class="blog__paragraph__image left" data-v-a2f23fca>
              <img src="https://cdn.paizo.com:443/a7d62ac8-7f03-00ef-f1f0-83fb8bf332e2/74f41f72-3a49-4c2b-a9d7-a66ec7b1bce3/PZO20004-MC__72621.png?w=350" alt="Starfinder Second Edition Alien Core Token Box: the cover art features a large, red skinned, demon firing a large gun that's been implanted in their arm while gripping a smaller alien in their other hand." data-v-a2f23fca>
             </figure>
             <div class="blog__paragraph__text" data-v-a2f23fca>
              <h3><a href="https://store.paizo.com/starfinder-alien-core-token-box/" data-new-window="true" target="_blank" rel="noopener noreferrer">Starfinder Alien Core Token Box</a></h3>
              <p>From the farthest reaches of the galaxy straight to your tabletop, the creatures from&nbsp;<em>Starfinder Alien Core</em>&nbsp;are here! This collection includes hundreds of creature tokens for use with Starfinder Second Edition or any other science-fantasy tabletop RPG. Printed on sturdy cardstock, each double-sided token contains a beautiful full-color image of an alien enemy or ally from&nbsp;<em>Starfinder Alien Core</em>. The tokens fit perfectly on Starfinder and Pathfinder Flip-Mats or any other 1-inch-grid battle map for your game, making them easy to mix with other miniatures or pawns to bring the many alien creatures of your Starfinder campaign to life!</p>
             </div>
            </div>
           </div>
           <div class="blog__article--component_wrapper" data-v-41cb3b80>
            <div class="blog__video" data-v-41cb3b80>
             <div data-v-41cb3b80>
              <iframe type="text/html" src="https://www.youtube.com/embed/SIffCZu6POg" frameborder="0" data-v-41cb3b80></iframe>
             </div>
            </div>
           </div>
           <div class="blog__article--component_wrapper" data-v-41cb3b80>
            <div class="blog__paragraph" style="clear:both;" data-v-a2f23fca data-v-41cb3b80>
             <figure class="blog__paragraph__image left" data-v-a2f23fca>
              <img src="https://cdn.paizo.com:443/a7d62ac8-7f03-00ef-f1f0-83fb8bf332e2/5bb96d9c-dc27-46b6-89b5-0b981146f7cb/158_source_1762127060.webp?w=350" alt="Pathfinder Second Edition Season of Ghosts hard cover adventure. the cover art is of a humanoid ghost fighting a plant-like creature with no head, a body made of red butterflies, and multiple spindly stick-like arms." data-v-a2f23fca>
             </figure>
             <div class="blog__paragraph__text" data-v-a2f23fca>
              <h3><a href="https://store.paizo.com/pathfinder-adventure-path-season-of-ghosts/" data-new-window="true" target="_blank" rel="noopener noreferrer">Pathfinder Adventure Path Season of Ghosts (Compilation)</a></h3>
              <p>The small town of Willowshore has a big problem—it's cursed! When a group of heroes awaken in the woods after a festival to usher out the last day of spring and welcome in the summer—a time known locally as the "season of ghosts," they find their hometown has been invaded by monsters, strange weather, and horrifying ghosts. Yet theses manifestations of the ancient evil that threatens Willowshore are nothing compared to the harrowing secrets awaiting discovery in&nbsp;<em>Season of Ghosts</em>.</p>
             </div>
            </div>
           </div>
           <div class="blog__article--component_wrapper" data-v-41cb3b80>
            <div class="blog__paragraph" style="clear:both;" data-v-a2f23fca data-v-41cb3b80>
             <figure class="blog__paragraph__image left" data-v-a2f23fca>
              <img src="https://cdn.paizo.com:443/a7d62ac8-7f03-00ef-f1f0-83fb8bf332e2/48f8b068-8d7f-4567-b481-2fbf08cd7596/PZO22003-HC.png?w=350" alt="Starfinder Second Edition Alien Core: the cover art features a large, red skinned, demon firing a large gun that's been implanted in their arm while gripping a smaller alien in their other hand." data-v-a2f23fca>
             </figure>
             <div class="blog__paragraph__text" data-v-a2f23fca>
              <h3><a href="https://store.paizo.com/starfinder-2e-alien-core/" data-new-window="true" target="_blank" rel="noopener noreferrer">Starfinder Alien Core Pocket Edition</a></h3>
              <p><strong>Battles in outer space or on distant planets need aliens!</strong></p>
              <p>Inside&nbsp;<em>Starfinder Alien Core</em>, you'll find over 200 creatures, including science fantasy favorites like robots, spacefaring fey, and all-new dragons; alien beasts from friendly spiderlike empathnids to fearsome plantlike predator ksariks; and unique monsters that threaten the galaxy of Starfinder, like jinsul troopers and vicious Swarm subspecies. You'll also find legacy Pathfinder creatures with a scifi update, like nanite-infused algollthus, and Starfinder classics like akatas and laser wolves. These creatures cover all levels of play, from scavenging sluglike diathas to powerful Drift-dwelling spectra.</p>
              <p>The pocket edition contains the same content as <em>Starfinder Alien Core</em>, in a portable, affordable softcover.</p>
             </div>
            </div>
           </div>
           <div class="blog__article--component_wrapper" data-v-41cb3b80>
            <div class="blog__paragraph" style="clear:both;" data-v-a2f23fca data-v-41cb3b80>
             <figure class="blog__paragraph__image left" data-v-a2f23fca>
              <img src="https://cdn.paizo.com:443/a7d62ac8-7f03-00ef-f1f0-83fb8bf332e2/d68cae79-c35f-4703-8114-f2d94353aa53/PZO10012-MC__36741.png?w=350" alt="Pathfinder Battlecry! Pawn Box: the box art of a diverse army dressed in silver and gold plate armor runs forward with an orc leading the charge" data-v-a2f23fca>
             </figure>
             <div class="blog__paragraph__text" data-v-a2f23fca>
              <h3><a href="https://store.paizo.com/pathfinder-battlecry-pawn-box/" data-new-window="true" target="_blank" rel="noopener noreferrer">Pathfinder Battlecry! Pawn Box</a></h3>
              <p>Generals and goblins! Cavalry and clockworks! Angels and devils! The vast variety of soldiers from&nbsp;<em>Pathfinder Battlecry!</em>&nbsp;come alive on your tabletop with this collection of more than 225 creature pawns for use with the Pathfinder Roleplaying Game or any tabletop fantasy RPG!</p>
             </div>
            </div>
           </div>
           <div class="blog__article--component_wrapper" data-v-41cb3b80>
            <div class="blog__paragraph" style="clear:both;" data-v-a2f23fca data-v-41cb3b80>
             <figure class="blog__paragraph__image left" data-v-a2f23fca>
              <img src="https://cdn.paizo.com:443/a7d62ac8-7f03-00ef-f1f0-83fb8bf332e2/ad624a3f-57b0-456b-995b-81052ac6fe38/PZO11034__40275.jpg?w=350" alt="Pathfinder Flip-Mat: Boreal Forest: A square tiled map of a snowy forest with a river running through it." data-v-a2f23fca>
             </figure>
             <div class="blog__paragraph__text" data-v-a2f23fca>
              <h3><a href="https://store.paizo.com/pathfinder-flip-mat-boreal-forest/" data-new-window="true" target="_blank" rel="noopener noreferrer">Pathfinder Flip-Mat: Boreal Forest</a></h3>
              <p>Whether the player characters are trudging through a difficult winter or delving deep into an ancient snowy forest to uncover fey rites, no Game Master wants to spend time drawing out every snow-covered tree or snowbank. Fortunately, with&nbsp;<em>Pathfinder Flip-Mat: Boreal Forest</em>&nbsp;you don’t have to. One side of this double-sided Flip-Mat shows a deep forest locked in winter, with a frozen stream cutting through the woodland. The other side shows another part of the same forest welcoming the spring thaw. Spread this map on your table for some rugged wintry combat!</p>
             </div>
            </div>
           </div>
           <div class="blog__article--component_wrapper" data-v-41cb3b80>
            <div class="blog__paragraph" style="clear:both;" data-v-a2f23fca data-v-41cb3b80>
             <div class="blog__paragraph__text" data-v-a2f23fca>
              <h1>Digital Products</h1>
             </div>
            </div>
           </div>
           <div class="blog__article--component_wrapper" data-v-41cb3b80>
            <div class="blog__paragraph" style="clear:both;" data-v-a2f23fca data-v-41cb3b80>
             <figure class="blog__paragraph__image left" data-v-a2f23fca>
              <img src="https://cdn.paizo.com:443/a7d62ac8-7f03-00ef-f1f0-83fb8bf332e2/4c31d9d8-ec1f-4355-a605-55cac456f7bd/FVTT24005__85683.jpg?w=350" alt="Starfinder Second Edition Murder in Metal City Delux Adventure on Foundry Virtual Table Top. The cover art features art of a Ysoki with goggle on their head, hacks a drone in a street lit in neon lights. Behind them an android in a wide brimmed hat, holds a gun up and ready to fire at drones closing in overhead" data-v-a2f23fca>
             </figure>
             <div class="blog__paragraph__text" data-v-a2f23fca>
              <h3><a href="https://store.paizo.com/starfinder-adventure-murder-in-metal-city-foundry-vtt-code" data-new-window="true" target="_blank" rel="noopener noreferrer">Starfinder Murder in Metal City (Foundry VTT)</a></h3>
              <p><em>Murder in Metal City</em>&nbsp;is a deluxe introductory adventure for four 1st-level Starfinder Second Edition characters containing everything required for a premium adventure experience! Experience this Adventure Path using the full suite of Foundry VTT features, using maps, tiles, tokens, sounds, and much more to bring you content which truly cannot be experienced in the same way anywhere else.</p>
             </div>
            </div>
           </div>
           <div class="blog__article--component_wrapper" data-v-41cb3b80>
            <div class="blog__paragraph" style="clear:both;" data-v-a2f23fca data-v-41cb3b80>
             <figure class="blog__paragraph__image left" data-v-a2f23fca>
              <img src="https://cdn.paizo.com:443/a7d62ac8-7f03-00ef-f1f0-83fb8bf332e2/b9a5c9bf-16c1-42b8-8539-fbdd23c3dee0/PZO160711E__40956.jpg?w=350" alt="Pathfinder Society The Year of the Battle's Spark: The Darkness Within. The background art is of Zarta Dralneenm dressed in a smart red jacket, as she moves pieces around a battle map while her wayfinder illuminates the scene, with Pathfinders and Andoren soldiers moving in the background of a busy war camp. The overlaying art is of a dark orb wrapped in tree roots" data-v-a2f23fca>
             </figure>
             <div class="blog__paragraph__text" data-v-a2f23fca>
              <h3><a href="https://store.paizo.com/pathfinder-society-scenario-7-11-the-darkness-within/" data-new-window="true" target="_blank" rel="noopener noreferrer">Pathfinder Society Scenario #7-11: The Darkness Within</a></h3>
              <p>The deepest parts of the Pathfinder Society's collection of artifacts were once maintained by an entire faction: the Dark Archive. However, as factions changed and roles shifted, the Dark Archive shuttered, leaving the maintenance of this area to Zarta Dralneen, previous faction head and now head archivist of the Society. She's called upon a group of Pathfinders to enter the deepest areas of the archive not only in search of an artifact that may help in the war with Cheliax, but also to reseal the magical fortifications around the archive, though it seems as though someone is already aware of the weaknesses within the Society...</p>
             </div>
            </div>
           </div>
           <div class="blog__article--component_wrapper" data-v-41cb3b80>
            <div class="blog__paragraph" style="clear:both;" data-v-a2f23fca data-v-41cb3b80>
             <figure class="blog__paragraph__image left" data-v-a2f23fca>
              <img src="https://cdn.paizo.com:443/a7d62ac8-7f03-00ef-f1f0-83fb8bf332e2/74a0c8f0-445a-43a4-a4e9-d83559341a48/PZO260115E__22010.jpg?w=350" alt="Starfinder Society Invasion's Edge: Ruins of the World Soul. The background art is of First Seeker Sarmak and fellow Starfinder Zizenzi fight off robots in front of a massive, alien starship. It’s dark, and the Starfinders are illuminated by aerial spotlights from an unknown source" data-v-a2f23fca>
             </figure>
             <div class="blog__paragraph__text" data-v-a2f23fca>
              <h3><a href="https://store.paizo.com/starfinder-society-scenario-1-15-ruins-of-the-world-soul/" data-new-window="true" target="_blank" rel="noopener noreferrer">Starfinder Society Scenario #1-15: Ruins of the World Soul</a></h3>
              <p>Kor-Montak is an ancient ritual site where shobhads of old communed with the spirits of the planet Akiton itself. A place of power and pilgrimage, Kor-Montak was abandoned sometime during the Gap and is believed to be cursed. In the ensuing centuries, numerous mystics, leaders, and warriors attempted the pilgrimage up the glacier passes to Kor-Montak, but none returned and Kor-Montak remains a place of myth and memory, lost to time but never forgotten.<br><br>
                Impressed by the Starfinder Society’s dedication and ingenuity on a recent joint rescue mission, shobhad geomancer Aruk has invited the Starfinders to explore Kor-Montak and determine the cause of its long-standing curse. Aruk is hopeful the Starfinders can break the curse and return Kor-Montak to its people, as the Starfinder Society is known the galaxy over for their expertise in excavating ancient ruins and handling strange magic.<br><br>
                Will you survive the ruins of the world soul?</p>
             </div>
            </div>
           </div>
           <div class="blog__article--component_wrapper" data-v-41cb3b80>
            <div class="blog__paragraph" style="clear:both;" data-v-a2f23fca data-v-41cb3b80>
             <figure class="blog__paragraph__image left" data-v-a2f23fca>
              <img src="https://cdn.paizo.com:443/a7d62ac8-7f03-00ef-f1f0-83fb8bf332e2/f5eeba6c-ab85-4627-8f3a-d6ec82df702f/PZO160712E__41873.jpg?w=350" alt="Pathfinder Society Scenario #7-12: The Chitterwood Walks, Part 2: The Battle of Logras. The background art is of Zarta Dralneenm dressed in a smart red jacket, as she moves pieces around a battle map while her wayfinder illuminates the scene, with Pathfinders and Andoren soldiers moving in the background of a busy war camp. " data-v-a2f23fca>
             </figure>
             <div class="blog__paragraph__text" data-v-a2f23fca>
              <h3><a href="https://store.paizo.com/pathfinder-society-scenario-7-12-the-chitterwood-walks-part-2-the-battle-of-logas/" data-new-window="true" target="_blank" rel="noopener noreferrer">Pathfinder Society Scenario #7-12: The Chitterwood Walks, Part 2: The Battle of Logras</a></h3>
              <p>With the success of the Chitterwood Talks, the goblin tribes are ready to march on Logas and put a stop to the undead attacks, with support from the Pathfinder Society. As forces approach the city, rumors start to circle of a strange plague only affecting Hellknights, leaving the undead Hellknights covered in bizarre, circular scars and bearing the mark of an unknown order. Within Logas, a Hellknight necromancer has declared herself the head of a new Hellknight order and is using the city as her chance to prove its worth. Can the Pathfinders stand up to The Order of the Open Tomb?</p>
             </div>
            </div>
           </div>
           <div class="blog__article--component_wrapper" data-v-41cb3b80>
            <div class="blog__paragraph" style="clear:both;" data-v-a2f23fca data-v-41cb3b80>
             <figure class="blog__paragraph__image left" data-v-a2f23fca>
              <img src="https://cdn.paizo.com:443/a7d62ac8-7f03-00ef-f1f0-83fb8bf332e2/c217146e-446c-420a-a30a-0cf377d4ea62/PZO260116E__78741.jpg?w=350" alt="Starfinder Society Scenario #1-16: The Beasts of Bo: Part Two. The background art is of First Seeker Sarmak and fellow Starfinder Zizenzi fight off robots in front of a massive, alien starship. It’s dark, and the Starfinders are illuminated by aerial spotlights from an unknown source" data-v-a2f23fca>
             </figure>
             <div class="blog__paragraph__text" data-v-a2f23fca>
              <h3><a href="https://store.paizo.com/starfinder-society-scenario-1-16-the-beasts-of-bo-part-two/" data-new-window="true" target="_blank" rel="noopener noreferrer">Starfinder Society Scenario #1-16: The Beasts of Bo: Part Two</a></h3>
              <p>The Starfinder Society’s negotiations with Bo-Shek and the Beasts of Bo have been interrupted by a violent joint assault launched by agents of the Functionary and forces from the Wreck of the Returned. Amid chaos and explosions, the Starfinders on site team up with the Beasts of Bo to take down this greater threat and avoid their mutual destruction. Will you survive the assault?<br><br>
                This is an adventure in the ongoing Invasion’s Edge metaplot, and is part two of a two-part scenario series. This adventure is a direct sequel to&nbsp;<a href="https://store.paizo.com/starfinder-society-scenario-1-14-the-beasts-of-bo-part-one/"><em>Starfinder Society Scenario #1-14: The Beasts of Bo: Part One</em></a>.</p>
             </div>
            </div>
           </div>
           <div class="blog__article--component_wrapper" data-v-41cb3b80>
            <div class="blog__paragraph" style="clear:both;" data-v-a2f23fca data-v-41cb3b80>
             <div class="blog__paragraph__text" data-v-a2f23fca>
              <h1>From Our Partners:</h1>
             </div>
            </div>
           </div>
           <div class="blog__article--component_wrapper" data-v-41cb3b80>
            <div class="blog__paragraph" style="clear:both;" data-v-a2f23fca data-v-41cb3b80>
             <figure class="blog__paragraph__image left" data-v-a2f23fca>
              <img src="https://cdn.paizo.com:443/a7d62ac8-7f03-00ef-f1f0-83fb8bf332e2/48736e65-6196-4a2d-99b7-d26c4bfc49a6/WZK97575__31465.jpg?w=350" alt="A group of painted Pathfinder Battle miniatures including hellhounds, cultists, demons, and large wyrm-like monsters" data-v-a2f23fca>
             </figure>
             <div class="blog__paragraph__text" data-v-a2f23fca>
              <h3><a href="https://store.paizo.com/pathfinder-battles-planar-perils-booster/" data-new-window="true" target="_blank" rel="noopener noreferrer">Pathfinder Battles: Planar Perils</a></h3>
              <p>Give your players hell as they traverse the planes with Pathfinder Battles: Planar Perils! Find elementals, celestials, fiends, and the cultists foolish enough to summon them in this set of randomly assorted miniatures. But it’s not just low-level threats you’ll encounter from the Great Beyond, no, for this set features our first ever minis of the biggest bads from Hell itself—Mephistopheles and Asmodeus!</p>
              <p><em>Pathfinder Battles: Planar Perils – Booster&nbsp;</em>is loaded with devils, demons, and more; but be not afraid, for there are also a few holy archons that may prove to be allies against the evil forces that lurk within!</p>
             </div>
            </div>
           </div>
           <div class="blog__article--component_wrapper" data-v-41cb3b80>
            <div class="blog__paragraph" style="clear:both;" data-v-a2f23fca data-v-41cb3b80>
             <figure class="blog__paragraph__image left" data-v-a2f23fca>
              <img src="https://cdn.paizo.com:443/a7d62ac8-7f03-00ef-f1f0-83fb8bf332e2/e3cdc825-8a03-4f3d-b55a-ed504166194a/97577-Glam-10.jpg?w=350" alt="A large miniature sitting on a textured base in front of a lava field background. The miniatures is of a red scaled dragon with large horns wrapping around its head and under its chin" data-v-a2f23fca>
             </figure>
             <div class="blog__paragraph__text" data-v-a2f23fca>
              <h3><a href="https://store.paizo.com/pathfinder-battles-diabolic-dragon-boxed-miniature/" data-new-window="true" target="_blank" rel="noopener noreferrer">Pathfinder Battles: Diabolic Dragon</a></h3>
              <p>Expand your Pathfinder Battles collection&nbsp;with the Adult Diabolic Dragon! These dragons are theorized to be extensions of the living plane of Hell itself—creatures made manifest to enforce its sinister will. Whether this is true or whether diabolical dragons are simply the fiendish reborn souls of mortal dragons; the fact remains that these dragons are tyrannical powerhouses capable of unleashing a hellfire breath on any who dare oppose them.</p>
              <p>The Diabolic Dragon is also available as a <a href="https://store.paizo.com/pathfinder-battles-deep-cuts-diabolic-dragon-boxed-miniature/">premium unpainted miniature.</a></p>
              <p>Our partners at Archives of Nethys, Demiplane, Fantasy Grounds, Hero Lab Online, and Roll20* are dropping new content this month as well! Buy your PDF on paizo.com to get a discount via the PaizoConnect API. Or pay full price on their platforms, sync your account, and get a complimentary PDF on the Paizo Store.</p>
              <p>*Roll20 is no longer a part of PaizoConnect and discounts and complimentary PDFs do not apply.</p>
             </div>
            </div>
           </div>
           <div class="blog__article--component_wrapper" data-v-41cb3b80>
            <div class="blog__paragraph" style="clear:both;" data-v-a2f23fca data-v-41cb3b80>
             <div class="blog__paragraph__text" data-v-a2f23fca>
              <p>Bring Pathfinder and Starfinder to where you are, in person or online, and if you don’t have a favorite local game store, get books delivered to your door via a&nbsp;<a href="https://store.paizo.com/subscriptions">Paizo Subscription!</a> From rulebooks to adventures, accessories, and more, we’ve got subscriptions for every table! Subscribing to a line of books gets you the physical book and the PDF for one price! Subscribe to four lines or more to unlock exclusive discounts on subscriptions and added products.</p>
              <p>Thank you for playing Starfinder and Pathfinder!</p>
              <p>Shop the&nbsp;<a href="https://store.paizo.com/">Paizo Store</a>&nbsp;and your&nbsp;<a href="https://paizo.com/paizo/locator">favorite local game store</a>&nbsp;today!</p>
              <h3><a href="https://paizo.com/threads/rzs7onbg?NEW-RELEASES-BLOG-February-2026" data-new-window="true" target="_blank" rel="noopener noreferrer">Have questions? Want to learn more about today's releases? Join the conversation in the Paizo forums!</a></h3>
             </div>
            </div>
           </div>
