            </section>
           </div>
           <div class="blog__article--component_wrapper" data-v-7a806b22>
            <div class="blog__paragraph" data-v-a2f23fca data-v-7a806b22>
             <figure class="blog__paragraph__image left" data-v-a2f23fca>
              <img src="https://cdn.paizo.com:443/a7d62ac8-7f03-00ef-f1f0-83fb8bf332e2/c154ebd2-e9e5-457d-9db8-2a0cfa8d8489/P2_Iconic_Kyra_1200x1600.png?w=400" alt="Pathfinder 2e iconic cleric, Kyra" data-v-a2f23fca>
             </figure>
             <div class="blog__paragraph__text" data-v-a2f23fca>
              <p>Hi, this is Landon! As Halloween and the Remaster approaches, one question burns in our minds: who’s going to torch all these undead while simultaneously healing the entire party? As you can probably guess, that’s still going to be the party’s cleric, but let’s dive into some changes.</p>
              <p>The cleric remains defined by their god, so before we get into the cleric, we should talk about the Remaster’s changes to deities and the cosmos. While the Remaster sees the removal of the nine alignments, edicts and anathemas still provide descriptions of a god’s desires and prohibitions to guide their followers’ behavior at a much finer level than alignment. But there’s still an endless struggle over the souls of the planes. The new system of divine sanctification (whether holy or unholy) represents a dedication to join that fight. Some gods now allow for sanctification—even when serving a goddess like Sarenrae who rose through the angelic ranks, joining her in the fight is ultimately a personal choice—where some gods now require that their clerics swear allegiance actively, like Asmodeus and Iomedae.</p>
              <p>Alignment damage used to be a major tool here, but it sometimes got in the way of the cleric’s story. A cleric of Lamashtu might have dealt evil damage to scatter those standing up against the Mother of Monsters, but that often didn’t reflect the god’s will. Some gods were neutral, and all gods had enemies who opposed to their beliefs but weren’t of an opposite alignment. The Remaster’s new spirit damage type lets gods’ wrath manifest much more broadly, harming anything with a spirit, down to oozes that need to be scoured away. Clerics who undergo divine sanctification can infuse many of their spiritual abilities with holy or unholy power, so a&nbsp;<em>divine lance&nbsp;</em>cast by a holy character will still damage almost anyone, but it will also trigger the weaknesses of demons and devils. On the flip side of the coin,&nbsp;<em>divine wrath&nbsp;</em>excludes the allies who are helping a cleric do their god’s work, even if the alliance is a little peculiar.</p>
              <p>Beyond these changes, we also took the opportunity to smooth out some rough edges. All clerics will see their divine font simply give them a number of bonus&nbsp;<em>heal</em>&nbsp;(or&nbsp;<em>harm</em>) spells regardless of their Charisma score, giving clerics a little more flexibility in how they allocate their attributes. The warpriest got improved weapon proficiencies where it could, raising martial weapons to expert at 7th level and their deity’s favored weapon to master at 19th. Along with Focus Point recovery becoming a bit easier for everyone in the Remaster, quite a few domain spells were improved or replaced, like&nbsp;<em>pulse of civilization&nbsp;</em>now giving wide access to the lore of nearby cities rather than one public fact and&nbsp;<em>ignite ambition&nbsp;</em>working as a reaction that the target notices only on a critical success.</p>
              <p>A lot of the remastered classes have gotten a few new feats to help tell their stories better. Even with its changes, the cleric didn’t get left out on this front. As a powerful cleric, your god might protect you so dearly that they punish those who harm you, or you might reinforce your shield with the strength of your divine font. But there are also smaller miracles, like blessing the area around you to heal your allies out of combat or presenting your religious symbol to protect against the world’s varied hardships.</p>
             </div>
            </div>
           </div>
           <div class="blog__article--component_wrapper" data-v-7a806b22>
            <div class="blog__paragraph" data-v-a2f23fca data-v-7a806b22>
             <div class="blog__paragraph__text" data-v-a2f23fca>
              <p><br></p>
             </div>
            </div>
           </div>
           <div class="blog__article--component_wrapper" data-v-7a806b22>
            <div class="blog__paragraph" data-v-a2f23fca data-v-7a806b22>
             <div class="blog__paragraph__text" data-v-a2f23fca>
              <p>Even my personal favorite cleric feat, Channeled Succor, spent some time in the fires of the Remaster to rise again as Restorative Channel, which interacts with the new, broader curative spells like&nbsp;<em>cleanse affliction&nbsp;</em>and&nbsp;<em>clear mind</em>. I’m stoked to have a new toolbox to channel all my new healing goodies. Especially with those spells all still helping when the counteract check doesn’t quite come through, it’s a good time to be freeing your friends from vexing conditions.</p>
              <p>I hope you enjoy all these new options next month when&nbsp;<a href="https://paizo.com/products/btq02eoj?Pathfinder-Player-Core"><em>Pathfinder Player Core</em></a>&nbsp;is released. In the meantime, may your injured party be surrounded by a horde of low-level undead.</p>
              <p>Cheers!</p>
              <p><strong>Landon Winkler (they/them)</strong><br><em><strong>Developer</strong></em></p>
