             <h1 data-v-7a806b22>
              <p>Zoetrope Logs, Part One: Hooves on Stone</p></h1>
             <div class="byline" data-v-7a806b22>
              <a href="/blog/author/JamesCase" title="More blog posts by James Case" class="name" data-v-7a806b22>James Case</a><span class="postDate" data-v-7a806b22> - Mar 5, 2024, 6:30 pm</span>
