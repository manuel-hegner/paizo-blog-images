             </figure>
             <div class="blog__paragraph__text" data-v-a2f23fca>
              <h2><strong>A Feat for Cat Owners</strong></h2>
              <p>As authors and cat-parents, we know that sometimes the best content happens when we’re interrupted by a four-legged fur-baby walking in front of the computer, reclining on the keyboard, and using their rear end to dump a confused jumble of letters into an otherwise pristine Word document. Here’s one of these gems that never made it to print.</p>
              <p><strong>GGGHhhjjjJJK&nbsp;&nbsp;&nbsp;&nbsp; Feat 1<br>
                 General<br>
                 Prerequisites</strong> Pet</p>
              <p>You have JBNNNMBMM&lt;&lt;&lt;M thatEHERBEBNMDF&lt;……///.? And can FHERWHFEWRGNMN&lt;Ggmfmngr,m as an Interact action.</p>
             </div>
            </div>
           </div>
           <div class="blog__article--component_wrapper" data-v-7a806b22>
            <div class="blog__paragraph" style="clear:both;" data-v-a2f23fca data-v-7a806b22>
             <div class="blog__paragraph__text" data-v-a2f23fca>
              <p>Oh um oh dear, I believe there was more, but little peets across the keyboard seem to have erased the rest of te sdfja [[[]}sfJHfas. ascs .&gt;&gt;.</p>
              <p><br></p>
              <h3><a href="https://paizo.com/threads/rzs7y5x8?APRIL-FOOLS-DAY-BLOG-MAYBE">I'm not sure where the rest of the blog went, but you can join the conversation over on the Paizo Forums!</a></h3>
