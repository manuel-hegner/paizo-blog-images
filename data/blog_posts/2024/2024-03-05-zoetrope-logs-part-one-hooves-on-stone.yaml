           <div class="blog__article--component_wrapper" data-v-7a806b22>
            <div class="blog__paragraph" data-v-a2f23fca data-v-7a806b22>
             <div class="blog__paragraph__text" data-v-a2f23fca>
              <p>I’m afraid this surprisingly poetic insight has not yet improved my own sense of direction, but perhaps it will resonate with you, dear reader. If nothing else, the boy’s words remind us of the importance of being alert and appreciative of the world around us.</p>
              <p>The roar of the falls drowned out further conversation as we rounded a final bend and came to a large canyon pool, fed from the endless water cascading over the cliff ahead. Telero beamed as we silently took in the thunderous serenade, the mist covering our awed faces.</p>
              <p>It was nearly a full minute before I realized, with a shock, that Chari was sitting on a nearby rock, pencil in hand as she sketched the scene in front of us for our logs. She looked up and smiled as I took a seat next to her. Grefu and Dr. Pom began unpacking our picnic lunch while Lythea, Telero, and Ten charged into the pool, their laughter barely audible as they dove into the spray.</p>
              <p>Chari passed me several sketches. “Signs of stony bat spit, similar to those of other gorgon subspecies detailed in the Kirisiel report, but I thought I’d document the flora first and wait for you to investigate.”</p>
              <p>I paged through her neat drawings, all precisely labeled in her steady hand. “These are wonderful, Charikleia. How lucky we are to have you along. How was the trek?”</p>
              <p>She laughed. “Telero’s a natural. He’d be right at home in the training mazes back home. I’d love to see him race my siblings sometime.”</p>
              <p>Though I can’t fathom how he could have heard us over the waterfall, Telero bounded forward from the pool, narrowly avoiding soaking Chari’s sketchbook. “Chari could have found it first!” he protested, shaking water from his hair. “But she had to stop to draw everything.”</p>
              <p>I traded a smile with my fellow researcher as she restacked her notes and moved them away from the pool. “I’m glad you’re both so thorough in your own ways,” I said. “The smallest detail could be the clue that leads us to the wardens.” I sighed, equal parts grateful and wistful, the sun warm on my scales. “Now, if only I were as organized as you are, Charikleia. I don’t suppose you know where I placed volume three of&nbsp;<em>The Thrilling Tales of Spiridendra</em>, do you?”</p>
              <p>“You’re the librarian, Baranthet, not me,” she joked, standing and offering me her hand. “Care to join us by the falls? I think I saw some likely nesting spots in the rocks behind the water.”</p>
              <p>Telero leapt forward. “I saw that too! C’mon, Professor!”</p>
              <p>I accepted Chari’s hand with a smile as she helped me to my feet. “Lead the way!”</p>
             </div>
            </div>
           </div>
           <div class="blog__article--component_wrapper" data-v-7a806b22>
            <div class="blog__paragraph" data-v-a2f23fca data-v-7a806b22>
             <figure class="blog__paragraph__image left" data-v-a2f23fca>
              <img src="https://cdn.paizo.com:443/a7d62ac8-7f03-00ef-f1f0-83fb8bf332e2/3a660b19-d7d3-41ea-8559-21f2b26488bf/Baranthet_Author_300.png?w=250" alt="Headshot of Baranthet Zamendi " data-v-a2f23fca>
             </figure>
             <div class="blog__paragraph__text" data-v-a2f23fca>
              <p><strong>About the Author</strong><br>
                Baranthet Zamendi cultivated his love of the natural world at a young age, enamored with his grandmother’s awe-inspiring tales of the legendary Wardens of the Wild. He briefly attended Almas University before returning home to rebuild Droon’s public library, eventually becoming its head archivist. His upcoming book on the crew of the&nbsp;<em>Zoetrope</em>&nbsp;and their search for the wardens is his first, but he’s already planning his next adventure.</p>
              <p><strong>Support for Mr. Zamendi by</strong><br>
                Simone D. Sallé is a senior editor at Paizo and has written for numerous Pathfinder and Starfinder books, including more of Baranthet’s tale in<em>Pathfinder Howl of the Wild</em>, the primal treatise and witch journals in&nbsp;<em>Pathfinder Secrets of Magic</em>, and&nbsp;<em>Starfinder Bounty #12: Under Pressure</em>. When she’s not extolling the virtues of the en dash, she enjoys playing as many narrative games as her schedule allows and wandering the woods with her Disreputable Dog.</p>
             </div>
            </div>
           </div>
           <div class="blog__article--component_wrapper" data-v-7a806b22>
            <div class="blog__paragraph" data-v-a2f23fca data-v-7a806b22>
             <div class="blog__paragraph__text" data-v-a2f23fca>
              <p>Hi everyone—James here! As we get closer to Howl of the Wild’s May release date, we thought we’d share with you some logs of the wildlife expedition of the airship Zoetrope and its crew of naturalists as they seek the mythical Wardens of the Wild, which Simone has diligently sourced. As you may know, Howl of the Wild presents&nbsp;<a href="https://paizo.com/community/blog/v5748dyo6sibw&amp;page=1?Meet-the-Crew-of-the-Zoetrope">six new playable ancestries&nbsp;</a>, each of whom is represented by a different member of the airship’s crew—alongside Baranthet, the expedition’s iruxi leader.</p>
              <p>Since we got a look at Charikleia and Telero today, this seems like a good time to show off feats for the centaur and minotaur ancestries coming in the final book! Centaurs can be pretty competitive, and young Telero’s no exception:</p>
             </div>
            </div>
           </div>
           <div class="blog__article--component_wrapper" data-v-7a806b22>
            <div class="blog__paragraph" data-v-a2f23fca data-v-7a806b22>
             <div class="blog__paragraph__text" data-v-a2f23fca>
              <p><br></p>
             </div>
            </div>
           </div>
           <div class="blog__article--component_wrapper" data-v-7a806b22>
            <div class="blog__paragraph" style="clear:both;" data-v-a2f23fca data-v-7a806b22>
             <div class="blog__paragraph__text" data-v-a2f23fca>
              <p>You wouldn’t really expect someone as soft-spoken as Chari to be scary, but it turns out minotaurs are frighteningly good at disappearing into mazes and other cover.</p>
             </div>
            </div>
           </div>
           <div class="blog__article--component_wrapper" data-v-7a806b22>
            <div class="blog__paragraph" data-v-a2f23fca data-v-7a806b22>
             <div class="blog__paragraph__text" data-v-a2f23fca>
              <p><br></p>
             </div>
             <figure class="blog__paragraph__image below" data-v-a2f23fca>
              <img src="https://cdn.paizo.com:443/a7d62ac8-7f03-00ef-f1f0-83fb8bf332e2/96062f7c-938b-424a-808b-48bc8d5bdc25/PZO2114_Charikleia_FullBody_1500x2100.png?w=350" alt="Illustration Gunship Revolution : A full body illustration of the Charikleia, a minotaur scribe" data-v-a2f23fca><img src="https://cdn.paizo.com:443/a7d62ac8-7f03-00ef-f1f0-83fb8bf332e2/74715382-fc07-47ad-b229-73bfdc4cffa1/PZO2114_Telero_FullBody_1500x2100.png?w=350" alt="Illustration Gunship Revolution : A full body illustration of the Telero, a centaur scout holding a spyglass" data-v-a2f23fca>
              <figcaption class="style--match_paragraph" data-v-a2f23fca>
               <p>The minotaur ancestry is embodied by the ship’s scribe, Charikleia, and the centaur ancestry by its scout, Telero! <br>
                 Art by Gunship Revolution.</p>
              </figcaption>
             </figure>
            </div>
           </div>
           <div class="blog__article--component_wrapper" data-v-7a806b22>
            <div class="blog__paragraph" data-v-a2f23fca data-v-7a806b22>
             <div class="blog__paragraph__text" data-v-a2f23fca>
              <p>We’ll be checking back in with Baranthet and the crew over the next few weeks, so look forward to getting to meet the rest of our intrepid naturalists in greater detail in the future!</p>
              <p><strong>James Case</strong><br><em><strong>Senior Designer</strong></em></p>
             </div>
            </div>
           </div>
           <div class="blog__article--component_wrapper" data-v-7a806b22>
