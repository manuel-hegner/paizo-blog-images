             <h1 data-v-7a806b22>
              <p>Player Core 2 Preview: The Oracle, Remastered</p></h1>
             <div class="byline" data-v-7a806b22>
              <a href="/blog/author/JamesCase" title="More blog posts by James Case" class="name" data-v-7a806b22>James Case</a><span class="postDate" data-v-7a806b22> - Jul 10, 2024, 6:00 pm</span>
             </div>
            </div>
            <div class="blog--back" data-v-7a806b22>
             <a href="/blog" title="Back to Blog" class="back nuxt-link-active" data-v-7a806b22>
              <div data-v-7a806b22>
               <svg aria-hidden="true" focusable="false" data-prefix="fas" data-icon="chevron-left" role="img" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 512" class="fa-lg svg-inline--fa fa-chevron-left fa-w-10" data-v-7a806b22>
                <path fill="currentColor" d="M34.52 239.03L228.87 44.69c9.37-9.37 24.57-9.37 33.94 0l22.67 22.67c9.36 9.36 9.37 24.52.04 33.9L131.49 256l154.02 154.75c9.34 9.38 9.32 24.54-.04 33.9l-22.67 22.67c-9.37 9.37-24.57 9.37-33.94 0L34.52 272.97c-9.37-9.37-9.37-24.57 0-33.94z" data-v-7a806b22></path>
               </svg>
              </div><span data-v-7a806b22>Back to Blog</span></a>
            </div>
            <section class="tags" data-v-7a806b22>
             <svg aria-hidden="true" focusable="false" data-prefix="fas" data-icon="tags" role="img" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 512" class="fa-lg svg-inline--fa fa-tags fa-w-20" data-v-7a806b22>
              <path fill="currentColor" d="M497.941 225.941L286.059 14.059A48 48 0 0 0 252.118 0H48C21.49 0 0 21.49 0 48v204.118a48 48 0 0 0 14.059 33.941l211.882 211.882c18.744 18.745 49.136 18.746 67.882 0l204.118-204.118c18.745-18.745 18.745-49.137 0-67.882zM112 160c-26.51 0-48-21.49-48-48s21.49-48 48-48 48 21.49 48 48-21.49 48-48 48zm513.941 133.823L421.823 497.941c-18.745 18.745-49.137 18.745-67.882 0l-.36-.36L527.64 323.522c16.999-16.999 26.36-39.6 26.36-63.64s-9.362-46.641-26.36-63.64L331.397 0h48.721a48 48 0 0 1 33.941 14.059l211.882 211.882c18.745 18.745 18.745 49.137 0 67.882z" data-v-7a806b22></path>
             </svg><a href="/blog/tags/pathfinder" class="link--tag" data-v-7a806b22>Pathfinder</a><a href="/blog/tags/pathfinder_remaster" class="link--tag" data-v-7a806b22>Pathfinder Remaster</a><a href="/blog/tags/pathfinder_roleplaying_game" class="link--tag" data-v-7a806b22>Pathfinder Roleplaying Game</a><a href="/blog/tags/pathfinder_second_edition" class="link--tag" data-v-7a806b22>Pathfinder Second Edition</a>
            </section>
           </div>
           <div class="blog__article--component_wrapper" data-v-7a806b22>
            <div class="blog__paragraph" data-v-a2f23fca data-v-7a806b22>
             <div class="blog__paragraph__text" data-v-a2f23fca>
              <p>I see it in the flickering of my monitor. I hear it in the cawing of the seagulls fighting over a bagel outside my window. I smell it in my coffee from down the street (not the coffee from up the street—the coffee from the other street, or the coffee from the corner; this is Seattle, after all). For the oracle, coming in&nbsp;<a href="https://paizo.com/products/btq02ej5?Pathfinder-Player-Core-2"><em>Pathfinder Player Core 2</em></a>, is Remastered.</p>
              <p>Oracles are divine spellcasters who draw their power not from prayer or devotion to a deity, but from a firsthand connection to the great mysteries of the universe. This connection is a double-edged sword, though, as gazing too deeply into these mysteries results in terrible backlash in the form of a divine curse. While this unique relationship with the divine and its “power at a price” theme offer strong and appealing roleplaying hooks that are very Golarion (what&nbsp;<em>is</em>&nbsp;the role of an oracle in a world where prophecy is lost?), the original oracle was often thought of as intimidatingly complex or as a class that made the player jump through hoops to unlock its potential. The Remastered oracle has been changed in ways both large and small to reduce its complexity and pain points, while still allowing players who want to risk fate to draw upon their curse to gain power.</p>
              <p>The big change: instead of an oracle’s curse giving them a large suite of abilities, some of which are buffs, some of which are debuffs, and some of which might go either way, the oracle’s curse now just strictly debuffs the player. We’ve done it—no, no, no, come back; I promise this made the class stronger!</p>
             </div>
             <figure class="blog__paragraph__image below" data-v-a2f23fca>
              <img src="https://cdn.paizo.com:443/a7d62ac8-7f03-00ef-f1f0-83fb8bf332e2/f0feafe2-d7eb-4430-bb98-0dce123f1bb2/Korakai_FinalSacrifice_2000.png" alt="Art by Christoph Peters. The iconic oracle, Korakai, fends off a giant squid with his Remastered magical power." data-v-a2f23fca>
              <figcaption class="style--match_paragraph" data-v-a2f23fca>
               <p>Art by Christoph Peters.</p>
              </figcaption>
             </figure>
            </div>
           </div>
           <div class="blog__article--component_wrapper" data-v-7a806b22>
            <div class="blog__paragraph" data-v-a2f23fca data-v-7a806b22>
             <div class="blog__paragraph__text" data-v-a2f23fca>
              <p>Because the classic oracle’s curses boosted some stats while lowering others, it could be unclear whether being cursed was a benefit you were trying to get ASAP or a price you had to strategically work around. In the Remaster, they’re always a price, which lets us significantly dial up the power that you get for paying it and keeps the trade-off simple to understand: “Cheat the rules of creation for power, and you get cursed.” The new oracle’s<strong>&nbsp;cursebound trait</strong>&nbsp;appears not on their focus spells, but instead on specific feats and other actions that have a notable advantage over similarly leveled feats, like cheating the action economy, letting you automatically learn about your target without a skill check, or other similar benefits. Each mystery grants a cursebound ability at level 1 to let them draw on this power, like Foretell Harm.</p>
             </div>
            </div>
           </div>
           <div class="blog__article--component_wrapper" data-v-7a806b22>
            <div class="blog__paragraph" style="clear:both;" data-v-a2f23fca data-v-7a806b22>
             <div class="blog__paragraph__text" data-v-a2f23fca>
              <h3>Other Changes</h3>
              <p>We’ve also made several smaller changes throughout the oracle! In no particular order:</p>
              <ul>
               <li>We’ve made it easier to tailor your oracle's spell list to your mystery. Each mystery now grants three thematic spells to an oracle’s repertoire, and all oracles automatically gain a divine access class feature about halfway through their career that lets them expand this list further.</li>
               <li>We’ve doubled the number of available domains for oracles who want to harness domain magic. All mysteries now grant four related domains—now your battle oracle might gain the destruction domain, or your cosmos oracle the star domain!</li>
               <li>We’ve added dashes of ominous, portentous, delirious flavor throughout the class to really make you feel like you’re channeling otherworldly powers.</li>
               <li>With more streamlined mysteries and curses, we had room to add a greater number of unique oracle feats, a thing that was often cited as lacking in the classic oracle. Take a look at a unique feat for ancestors or battle oracles: The Dead Walk!</li>
              </ul>
             </div>
            </div>
           </div>
           <div class="blog__article--component_wrapper" data-v-7a806b22>
            <div class="blog__paragraph" data-v-a2f23fca data-v-7a806b22>
             <div class="blog__paragraph__text" data-v-a2f23fca>
              <p>We’re getting close to the release of&nbsp;<em>Player Core 2</em>, with ancestries, archetypes, and more, so be sure to subscribe to the Rulebook line, pre-order the book, or make a note to swing by our booth at Gen Con to check things out—and keep an eye on the future for the last of our Remaster class previews!</p>
              <p><strong>James Case (he/him)</strong><br><em><strong>Lead Developer, Rules and Lore</strong></em></p>
             </div>
            </div>
