            <section class="tags" data-v-7a806b22>
             <svg aria-hidden="true" focusable="false" data-prefix="fas" data-icon="tags" role="img" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 512" class="fa-lg svg-inline--fa fa-tags fa-w-20" data-v-7a806b22>
              <path fill="currentColor" d="M497.941 225.941L286.059 14.059A48 48 0 0 0 252.118 0H48C21.49 0 0 21.49 0 48v204.118a48 48 0 0 0 14.059 33.941l211.882 211.882c18.744 18.745 49.136 18.746 67.882 0l204.118-204.118c18.745-18.745 18.745-49.137 0-67.882zM112 160c-26.51 0-48-21.49-48-48s21.49-48 48-48 48 21.49 48 48-21.49 48-48 48zm513.941 133.823L421.823 497.941c-18.745 18.745-49.137 18.745-67.882 0l-.36-.36L527.64 323.522c16.999-16.999 26.36-39.6 26.36-63.64s-9.362-46.641-26.36-63.64L331.397 0h48.721a48 48 0 0 1 33.941 14.059l211.882 211.882c18.745 18.745 18.745 49.137 0 67.882z" data-v-7a806b22></path>
             </svg><a href="/blog/tags/pathfinder" class="link--tag" data-v-7a806b22>Pathfinder</a><a href="/blog/tags/pathfinder_remaster" class="link--tag" data-v-7a806b22>Pathfinder Remaster</a><a href="/blog/tags/pathfinder_roleplaying_game" class="link--tag" data-v-7a806b22>Pathfinder Roleplaying Game</a><a href="/blog/tags/pathfinder_second_edition" class="link--tag" data-v-7a806b22>Pathfinder Second Edition</a><a href="/blog/tags/wizard" class="link--tag" data-v-7a806b22>Wizard</a>
            </section>
           </div>
           <div class="blog__article--component_wrapper" data-v-7a806b22>
            <div class="blog__paragraph" data-v-a2f23fca data-v-7a806b22>
             <div class="blog__paragraph__text" data-v-a2f23fca>
              <p>Hi everyone! James here to talk a little bit about the Remaster project. We're getting closer and closer to&nbsp;<em>Pathfinder Player Core</em>&nbsp;and&nbsp;<em>GM Core</em>releasing in November. To shine a little more light on what's coming, the marketing team and us thought we would kick off a blog series going into some of our changes in a little more depth. We'll start things off with a class, the wizard!</p>
              <p>The wizard is the classic arcane spellcaster who learns magic in the most academic way: institutions, tomes, tutors and the like, and we wanted this to come through in how the class feels to build and play, so expect to see some more references to training, incantations, runes, spell formulas, and the like in the feats and features.</p>
              <p><br></p>
             </div>
            </div>
           </div>
           <div class="blog__article--component_wrapper" data-v-7a806b22>
            <div class="blog__paragraph" data-v-a2f23fca data-v-7a806b22>
             <figure class="blog__paragraph__image left" data-v-a2f23fca>
              <img src="https://cdn.paizo.com:443/a7d62ac8-7f03-00ef-f1f0-83fb8bf332e2/785cbfea-1212-4d3e-bfcf-da716e1cfb8f/P2_Iconic_Ezren_1000x1500.png?w=350" alt="Pathfinder Iconic, human wizard, Ezren" data-v-a2f23fca>
              <figcaption class="style--match_paragraph" data-v-a2f23fca>
               <p>Ezren, the iconic wizard. Art by Wayne Reynolds</p>
              </figcaption>
             </figure>
             <div class="blog__paragraph__text" data-v-a2f23fca>
              <p>While the wizard was generally already providing a satisfying play experience at the table, it was also a class that interacts very heavily with one of the larger changes we’re making in the Remaster, which is the removal of the eight schools of magic that were deeply tied to rules we were using via the OGL. Though this presented a big challenge in remastering the class, it also let us solve one of the biggest frustrations of the wizard, which is that there wasn't a whole lot of space left for them to expand. One of the most commonly requested expansions for any class is additional major paths to build your characters along, but because the wizard schools already had all eight schools of magic that could ever exist in the setting (plus universalist), we could never increase the number of wizard schools or explore more interesting options beyond those preset themes.</p>
              <p>The new role for arcane schools is as just that: actual mages' curricula in Golarion. This allows us to make much more tightly focused schools that really let you sell the theme of your wizard, from the tactical spells of the School of Battle Magic (<em>fireball</em>,&nbsp;<em>resist energy</em>,&nbsp;<em>weapon storm</em>,&nbsp;<em>true target</em>&nbsp;and the like) to the infrastructure-focused spells of the School of Civic Wizardry (<em>hydraulic push</em>&nbsp;for firefighting,&nbsp;<em>summon construct</em>&nbsp;and&nbsp;<em>wall of stone</em>&nbsp;for construction,&nbsp;<em>pinpoint</em>&nbsp;and&nbsp;<em>water walk</em>&nbsp;for search and rescue, and&nbsp;<em>earthquake</em>&nbsp;and&nbsp;<em>disintegrate</em>&nbsp;for controlled demolitions). We've also rearranged the existing wizard focus spells and, in some places, changed them a little bit to fit their new locations—the School of Mentalism's&nbsp;<em>charming push</em>&nbsp;focus spell functions much like the original enchanter's&nbsp;<em>charming words</em>, but the new spell doesn't have the auditory or linguistic traits, since the School of Mentalism is much more about direct mind magic.</p>
              <p>This also opens the door to create more schools in the future based on the specific schools of magic in the setting, and I know my colleagues in the Lost Omens line have already started thinking of what some of these might be (they have, as yet, sadly rejected my suggestion for a goblin-themed wizard school containing mostly fire and pickling spells).</p>
              <p>We haven't just remastered the schools; we wanted to go through the feats as well and give the wizard a few fun toys to underscore&nbsp;how they're nerds&nbsp;their academic mastery of magic. Some of these are tools originally developed in other places that make perfect sense for a wizard to have, like the Knowledge Is Power magus feat (with a few wizard-specific adjustments). We also gave the wizards some new feats, like the following:</p>
             </div>
            </div>
           </div>
           <div class="blog__article--component_wrapper" data-v-7a806b22>
            <div class="blog__paragraph" style="clear:both;" data-v-a2f23fca data-v-7a806b22>
             <div class="blog__paragraph__text" data-v-a2f23fca>
              <p>This feat ties into some of the flavor tweaks we've made to wizards to have them talk about their abilities a little more academically, and it's burst of damage is one that requires a little bit of forethought in strategy to get the most out of, something that a spellcaster whose key attribute is Intelligence might gravitate toward.</p>
              <p>That's our look at the wizard! Of course, what would a wizard be without their spells? Check back in on Thursday, where we'll go over some of the updates to magic coming in the remaster, from new spells to some of the new rules for spellcasting!</p>
              <p><strong>James Case (he / him)</strong><br><em><strong>Senior Designer</strong></em></p>
             </div>
            </div>
