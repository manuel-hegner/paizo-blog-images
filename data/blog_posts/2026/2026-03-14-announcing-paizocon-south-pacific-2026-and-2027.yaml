           <div class="blog__article--component_wrapper" data-v-41cb3b80>
            <div class="blog__paragraph" data-v-a2f23fca data-v-41cb3b80>
             <div class="blog__paragraph__text" data-v-a2f23fca>
              <p>It’s that time of the year when we start making the plans for this year’s PaizoCon South Pacific and we’ve got the logos to prove it. We’re here on the blog to tell you about two year’s worth of conventions because this time we are properly ahead of the convention announcing game.</p>
             </div>
            </div>
           </div>
           <div class="blog__article--component_wrapper" data-v-41cb3b80>
            <div class="blog__paragraph" data-v-a2f23fca data-v-41cb3b80>
             <figure class="blog__paragraph__image above" data-v-a2f23fca>
              <img src="https://cdn.paizo.com:443/a7d62ac8-7f03-00ef-f1f0-83fb8bf332e2/10d478bf-1464-4ced-9cf6-9311773b6bac/PaizoConSouthPacific2026_1500.png?w=550" alt="PaizoCon South Pacific 2026" data-v-a2f23fca>
             </figure>
             <div class="blog__paragraph__text" data-v-a2f23fca>
              <h2>Save the Date for PaizoCon South Pacific this year</h2>
              <p>One thing at a time, let’s have a chat about the plans for 2026. We are looking at the weekend of the 14th, 15th, and 16th of August in Queensland Australia, just a few weeks after GenCon is all said and done. With any luck, we’ll be in the sun and great weather in case anyone wants to make a family weekend of it. We’ve got a whole lot of plans for the weekend, but to whet your appetite here are a few things that are in the cards…</p>
              <ul>
               <li>All the Organized Play specials that have been released in 2026. This will be the premiere time to play these in person with other Pathfinders and Starfinders from across the region.</li>
               <li>Plenty of opportunities to play the new and old Pathfinder and Starfinder second edition scenarios with peeps from across the South Pacific.</li>
               <li>Premiering a no-holds barred Pathfinder kill-it-keep-it pre-gen-slaughterhouse extravaganza. If you’re wondering what all that means, please sign up for updates below. We can assure you there will be photos and explanations in the coming months.</li>
               <li>Making, painting, and other hands-on opportunities for when you’re at your crushing dice limit for the day.</li>
              </ul>
              <p>If you want a regional, chill, and bespoke PaizoCon South Pacific experience, this is probably the event for you and we’d love to see you there. We’ll be announcing the exact location in late March and calling out for GMs/ Volunteers in April ahead of tickets going live in May. To keep in the loop, <a href="https://mailchi.mp/ab7b96498356/sign-up-for-more-information">sign up for the PaizoCon South Pacific Newsletter here</a> and you will be looped in on everything. You can also email us at <a href="mailto:pcsp2026@creakingchair.com">pcsp2026@creakingchair.com</a> if you have specific questions.</p>
             </div>
            </div>
           </div>
           <div class="blog__article--component_wrapper" data-v-41cb3b80>
            <div class="blog__paragraph" data-v-a2f23fca data-v-41cb3b80>
             <figure class="blog__paragraph__image above" data-v-a2f23fca>
              <img src="https://cdn.paizo.com:443/a7d62ac8-7f03-00ef-f1f0-83fb8bf332e2/d1054b50-f260-48f3-bb07-8626b1a8cead/PaizoConSouthPacific2027_1500.png?w=550" alt="PaizoCon South Pacific 2027" data-v-a2f23fca>
             </figure>
             <div class="blog__paragraph__text" data-v-a2f23fca>
              <h2><strong>Start planning for PaizoCon South Pacific 2027</strong></h2>
              <p>We mentioned above that we’ve got two years of PaizoCon South Pacifics planned and for 2027 the Venture Officers in New Zealand have got a heck of an event planned.&nbsp;</p>
              <p>Nine years ago, we gathered outside of Matamata to play some Pathfinder in Hobbiton at the Green Dragon Inn for a multi-table special, and in 2027 we’re ... there and back again.&nbsp;</p>
              <p>If you want to be a part of the shenanigans, you’ll want to be in Matamata New Zealand between the 14th and 17th of October 2027 and you’ll want to consider purchasing tickets for this once in a lifetime opportunity to game where they made the movies. Take it from people that attended last time: you really want to be there, and tickets are limited due to capacity.</p>
              <p>For more information head to <a href="https://warhorn.net/events/paizocon-south-pacific-2027">https://warhorn.net/events/paizocon-south-pacific-2027</a>. If you have any specific questions about the PaizoCon South Pacific 2027 Matamata/Hobbiton experience please email <a href="mailto:paizoconsp2027@gmail.com?subject=PaizoCon%20South%20Pacific%202027%20enquiry">paizoconsp2027@gmail.com</a></p>
             </div>
            </div>
           </div>
           <div class="blog__article--component_wrapper" data-v-41cb3b80>
            <div class="blog__paragraph" data-v-a2f23fca data-v-41cb3b80>
             <figure class="blog__paragraph__image above" data-v-a2f23fca>
              <img src="https://cdn.paizo.com:443/a7d62ac8-7f03-00ef-f1f0-83fb8bf332e2/97d66045-8ca5-4303-a1bd-d17671912e78/PaizoCon_SouthPacific_Panorama.jpg" alt="A panorama shot of a group of pathfinder and starfinder society players filling up a cozy tavern and playing at multiple tables" data-v-a2f23fca>
             </figure>
             <div class="blog__paragraph__text" data-v-a2f23fca>
              <p>We hope to see you at PaizoCon South Pacific!</p>
              <p><strong>Daniel Flood<br></strong>Regional Venture-Coordinator, South Pacific Region</p>
