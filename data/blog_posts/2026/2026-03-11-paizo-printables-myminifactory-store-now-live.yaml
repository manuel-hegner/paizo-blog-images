           <div class="blog__article--component_wrapper" data-v-41cb3b80>
            <div class="blog__paragraph" data-v-a2f23fca data-v-41cb3b80>
             <div class="blog__paragraph__text" data-v-a2f23fca>
              <p>Today, we’re pleased to announce the opening of the <a href="https://www.myminifactory.com/users/PaizoPrintables?show=store">MyMiniFactory store for Paizo Printables</a>.</p>
              <p>This store has a hoard of Pathfinder miniatures related to the recently completed Pathfinder Quest crowdfunder campaign, miniatures for the ongoing Hellfire Crisis event first seen last Gen Con, as well as Starfinder iconic characters from <a href="https://store.paizo.com/starfinder-2e-player-core/"><em>Starfinder Player Core</em></a> and <a href="https://store.paizo.com/starfinder-2e-murder-in-metal-city-deluxe/"><em>Starfinder Game Night: Murder in Metal City</em></a>. As time goes on, we’ll be adding more miniatures to the storefront.</p>
              <p>This is a major step for Paizo into the 3D-print market, with a focus on bringing our two beloved brands to our audience in an entirely new way. Whether it’s printing a host of Hellknights to battle in your Hellfire Crisis campaign, or printing off a set of Starfinder Iconics to bring to your Organized Play night, Paizo Printables has you covered!</p>
              <h3><strong>To celebrate the launch of our MyMiniFactory storefront, use code PATH50 for 50% off ALL PAIZO PRINTABLES MODELS through April 10th.</strong></h3>
             </div>
             <figure class="blog__paragraph__image below" data-v-a2f23fca>
              <img src="https://cdn.paizo.com:443/a7d62ac8-7f03-00ef-f1f0-83fb8bf332e2/708b098b-c09d-4ed4-82cc-31ce9b454887/PaizoPrintables_SFIconics.jpg?w=325" alt="a lineup of Starfinder iconic miniatures including, Chk Chk, Obozaya, Zemir, Iseph, Navasi, Dae, and skittermander popstar, Prisma" data-v-a2f23fca><img src="https://cdn.paizo.com:443/a7d62ac8-7f03-00ef-f1f0-83fb8bf332e2/fb0ab53c-6c9e-49c7-8d05-0d7c115ccd6c/PaizoPrintables_DiabolicDragon.jpg?w=325" alt="A3D miniature of a pathfinder diabolic dragon. A large dragon covers in sharp spines down its back and two large horns growing out of its temple down around to its jaw." data-v-a2f23fca><img src="https://cdn.paizo.com:443/a7d62ac8-7f03-00ef-f1f0-83fb8bf332e2/2563c83f-b99f-43d4-ba80-f62092c2409c/PaizoPrintables_leshy_melee.jpg?w=325" alt="A3D miniature of a pathfinder of a small flower leshy dragging a club as large as its body and waving to passersby " data-v-a2f23fca>
             </figure>
            </div>
           </div>
           <div class="blog__article--component_wrapper" data-v-41cb3b80>
            <div class="blog__paragraph" data-v-a2f23fca data-v-41cb3b80>
             <div class="blog__paragraph__text" data-v-a2f23fca>
              <p>Along with the launch of this store, we’ll also be launching the Paizo Printables Tribe + Patreon in the coming weeks. This monthly subscription includes regular new miniature releases, a Paizo-made PDF including statblocks and a new encounter using the miniatures, and a whole lot of unannounced bonuses for backers.</p>
              <p>Expect to hear more about this new subscription in the coming weeks, but you can already follow us on <a href="https://www.myminifactory.com/users/PaizoPrintables">MyMiniFactory</a> or on <a href="https://patreon.com/PaizoPrintables">Patreon</a> for the latest news and updates.</p>
              <h3><a href="https://paizo.com/threads/rzs7v2sp?New-Blog-Paizo-Printables-Store-Live-on#1">Excited for minis?! Join the conversation on the Paizo Forums!</a></h3>
             </div>
             <figure class="blog__paragraph__image below" data-v-a2f23fca>
              <img src="https://cdn.paizo.com:443/a7d62ac8-7f03-00ef-f1f0-83fb8bf332e2/e0a5bbc0-dd18-43c9-bfc7-9fa38c172b05/PaizoPrintables_Vordine.png?w=450" alt="A 3D miniatures of a horned nephilim dressed in armor, wielding a tridant." data-v-a2f23fca><img src="https://cdn.paizo.com:443/a7d62ac8-7f03-00ef-f1f0-83fb8bf332e2/2af14a76-e348-46e7-b017-613598041d56/PaizoPrintables_SarglagonMini.png?w=450" alt="A 3D miniature of a Sarglagon. A large aquatic, winged serpent with a horned, snake-like head and two muscled arms with tentacles for hands" data-v-a2f23fca>
             </figure>
